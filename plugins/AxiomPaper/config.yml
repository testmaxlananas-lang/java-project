max-chunk-sends-per-tick: 0         # Illimité
max-chunk-relights-per-tick: 0      # Illimité
max-chunk-load-distance: 512        # Augmenté : Axiom peut charger loin
allow-teleport-between-worlds: true
blueprint-sharing: true             # Activé : partage de blueprints entre joueurs
allow-large-chunk-data-request: true    # Autorisé : serveur privé build
allow-large-payload-for-all-packets: true  # ACTIVÉ : serveur privé, grosses opérations
incompatible-data-version: "warn"
unsupported-axiom-version: "warn"
max-block-buffer-packet-size: 0x400000   # 4MB au lieu de 1MB
whitelist-world-regex: ""
blacklist-world-regex: ""
block-buffer-rate-limit: 0          # Aucune limite
log-large-block-buffer-changes: false
whitelist-entities: []
blacklist-entities: []
disable-entity-sanitization: true   # Serveur privé, pas besoin de sanitization
send-markers: true                  # Envoie les markers aux clients
allow-annotations: true             # Annotations activées
disallowed-blocks: []
infinite-reach-limit: 2048          # Reach très loin
log-core-protect-changes: false     # Pas de CoreProtect

limits:
  example:
    block-buffer-rate-limit: 0
