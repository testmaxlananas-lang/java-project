build:
  version: '25'
  prefix: '§8[§5§oEXP-Build§8] §l>§l§7 '

  server_1:
    statserver: false
    name: server_1
  server_2:
    statserver: false
    name: server_2
  server_3:
    statserver: false
    name: server_3
  server_4:
    statserver: false
    name: server_4

  max_file_size: -1             # Aucune limite de taille de fichier
  max_brush_rayon: 500          # Brush énorme autorisé
  default_brush_rayon: 10
  default_pattern_brush: 1
  default_air_brush: 10
  max_brush_distance: 500       # Distance max augmentée
  display_bezier_curve: true
  particle_bezier_curve_type: FLAME
  coefficient_particle_number: 3
  display_convex_line: true
  particle_convex_type_line: FLAME
  spacing_between_particles: 1
  period_particle: 10
  wand_click_in_air: true
  default_on_the_fly_selection: true
  sihft_click_with_wand: false
  logShortcut: false            # Pas besoin de logger les raccourcis
  max_point_saved: 50           # Augmenté pour les lignes complexes
  terraforming_tool_1: SPECTRAL_ARROW
  terraforming_tool_2: CLAY_BALL
  share_clipboard_saved: false
  timelapse_max_block_per_tick: 500   # Augmenté massivement
  max_timelapse_in_same_time: 5       # Plus de timelapses simultanés
  send_message_builder_register: false  # Réduit le spam

  GOHA:
    arm_correction_factor: 1.5
    default_material: STONE
    default_orga_height: 50

  lang: en
