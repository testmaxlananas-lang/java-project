limits:
  max-blocks-changed:
    default: -1
    maximum: -1
  max-polygonal-points:
    default: -1
    maximum: -1             # Illimité
  max-radius: -1
  max-super-pickaxe-size: 5
  max-brush-radius: -1      # Illimité, géré par FAWE
  butcher-radius:
    default: -1
    maximum: -1
  disallowed-blocks: []     # Aucun bloc interdit

use-inventory:
  enable: false
  allow-override: true
  creative-mode-overrides: true   # Activé en créatif

logging:
  log-commands: false       # Pas de log des commandes (gain perf)
  file: worldedit.log
  format: "[%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$s]: %5$s%6$s%n"

super-pickaxe:
  drop-items: false         # Pas de drop en serveur build
  many-drop-items: false

snapshots:
  directory:

navigation-wand:
  item: minecraft:compass
  max-distance: 500         # Portée augmentée

scripting:
  timeout: 30000            # 30s au lieu de 3s pour les scripts complexes
  dir: craftscripts

saving:
  dir: schematics

files:
  allow-symbolic-links: false

history:
  size: 50                  # Plus d'historique en mémoire
  expiration: 60            # 60min d'expiration

calculation:
  timeout: 30000            # 30s pour les calculs

debugging:
  trace-unflushed-sessions: false

wand-item: minecraft:wooden_axe
shell-save-type:
no-double-slash: false
no-op-permissions: false
debug: false
show-help-on-first-use: true
server-side-cui: true
command-block-support: true   # Activé pour les command blocks
