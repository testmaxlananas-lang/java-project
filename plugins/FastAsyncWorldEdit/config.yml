# FAWE - Config optimisée pour build server 16GB / 4 CPU
# Basée sur la config officielle + tweaks performance

region-restrictions: false
max-memory-percent: 95
slower-memory-percent: 80

enabled-components:
  commands: true
  debug: false
  snapshot-update-notifications: false
  release-update-notifications: false
  notify-update-ingame: false
  lighting-fixer: false
  default-locale: en

clipboard:
  use-disk: true
  compression-level: 1
  delete-after-days: 7
  delete-on-logout: false
  save-clipboard-nbt-to-disk: true
  lock-clipboard-file: false

lighting:
  delay-packet-sending: true
  async: true
  mode: 1          # Optimal : relight seulement les blocs changés
  remove-first: true

tick-limiter:
  enabled: false   # Pas de limite sur un serveur build dédié

web:
  url: "https://schem.intellectualsites.com/fawe/"
  arkitektonika-backend-url: "https://api.schematic.cloud/"
  arkitektonika-download-url: "https://schematic.cloud/download/{key}"
  arkitektonika-delete-url: "https://schematic.cloud/delete/{key}"
  max-image-load-time: 5
  max-image-size: 8294400
  allowed-image-hosts:
    - "i.imgur.com"

extent:
  allowed-plugins: []
  debug: false

experimental:
  undo-batch-size: 256        # Augmenté pour moins d'overhead
  anvil-queue-mode: false
  dynamic-chunk-rendering: -1
  persistent-brushes: true
  keep-entities-in-blocks: true
  remove-entity-from-world-on-chunk-fail: true
  improved-entity-edits: true
  other: false
  allow-tick-fluids: false
  use-vector-api: true        # ACTIVÉ : accélère certaines opérations vectorielles

queue:
  progress:
    display: "chat"
    interval: 1
    delay: 3000
  parallel-threads: 4          # = nproc exact du runner (4 CPU)
  target-size: 4096            # 64 × parallel-threads, bon équilibre
  extra-time-ms: 0
  preload-chunk-count: 2048    # 128 × 16GB / 1 joueur
  pool: true
  async-chunk-load-write: true
  thread-target-size-percent: 100  # Max par thread (1 joueur à la fois)

history:
  use-disk: true
  use-database: false          # Pas besoin d'inspection/rollback
  combine-stages: true
  send-before-history: true
  compression-level: 3         # Compression rapide sur disque
  buffer-size: 1048576         # 1MB buffer
  delete-after-days: 3
  delete-on-logout: false
  delete-disk-on-logout: false
  enable-for-console: true
  store-redo: true
  small-edits: false

paths:
  textures: "textures"
  heightmap: "heightmap"
  history: "history"
  clipboard: "clipboard"
  per-player-schematics: false

limits:
  default:
    max-actions: -1
    max-changes: -1
    max-checks: -1
    max-fails: -1
    max-iterations: -1
    max-entities: -1
    max-radius: -1
    max-super-pickaxe-size: 5
    max-brush-radius: -1
    max-butcher-radius: -1
    max-blockstates: -1
    max-history-mb: -1
    schem-file-size-limit: -1
    schem-file-num-limit: -1
    max-expression-ms: 5000
    speed-reduction: 0
    fast-placement: true
    inventory-mode: 0
    confirm-large: false        # Pas de confirmation sur serveur build
    restrict-history-to-regions: false
    strip-nbt: []
    universal-disallowed-blocks: false
    allow-legacy: true
    skip-creature-spawn-events: true  # Plus rapide, pas de spawn en creative
    disallowed-blocks: []
    remap-properties: []

general:
  unstuck-on-generate: true
  limit-unlimited-confirms: false
  limit-unlimited-skips-creature-spawn-events: true

region-restrictions-options:
  mode: "MEMBER"
  allow-blacklists: false
  exclusive-managers: []
  worldguard-region-blacklist: false
  restrict-to-safe-range: true
