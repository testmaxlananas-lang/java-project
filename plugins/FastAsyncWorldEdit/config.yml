# ═══════════════════════════════════════════════════════════════
# FAWE - Config optimisée Build Server
# 16GB RAM / 4 CPU / Serveur privé / Opérations massives
# ═══════════════════════════════════════════════════════════════

issues: "https://github.com/IntellectualSites/FastAsyncWorldEdit/issues"
wiki: "https://intellectualsites.github.io/fastasyncworldedit-documentation/"
date: "Tue Feb 10 00:00:00 UTC 2026"
build: "https://ci.athion.net/job/FastAsyncWorldEdit/0"
commit: "https://github.com/IntellectualSites/FastAsyncWorldEdit/commit/fa6c8d3b"
platform: "Bukkit"

# Pas de restrictions de région sur un serveur build privé
region-restrictions: false

# Annulation automatique si mémoire trop basse (sécurité)
max-memory-percent: 95
slower-memory-percent: 85

enabled-components:
  commands: true
  debug: false
  snapshot-update-notifications: false
  release-update-notifications: false
  notify-update-ingame: false

clipboard:
  # Sur disque → libère la RAM pour les opérations
  use-disk: true
  # Niveau 1 = compression rapide, bon équilibre vitesse/taille
  compression-level: 1
  delete-after-days: 14
  delete-on-logout: false
  save-clipboard-nbt-to-disk: true
  lock-clipboard-file: false

lighting:
  delay-packet-sending: true
  async: true
  # Mode 1 = Optimal : relight seulement les blocs modifiés
  mode: 1
  remove-first: true

tick-limiter:
  # Désactivé : serveur build dédié, pas d'abus possible
  enabled: false
  interval: 20
  falling: 64
  physics-ms: 10
  items: 256

web:
  url: "https://schem.intellectualsites.com/fawe/"
  arkitektonika-backend-url: "https://api.schematic.cloud/"
  arkitektonika-download-url: "https://schematic.cloud/download/{key}"
  arkitektonika-delete-url: "https://schematic.cloud/delete/{key}"
  max-image-load-time: 10
  max-image-size: 8294400
  allowed-image-hosts:
    - "i.imgur.com"
    - "imgur.com"

extent:
  allowed-plugins: []
  debug: false

experimental:
  # Taille des batches d'undo → plus grand = moins d'overhead
  undo-batch-size: 512
  # NE PAS activer : risque de corruption monde
  anvil-queue-mode: false
  # Désactivé : on gère view-distance manuellement
  dynamic-chunk-rendering: -1
  # Brosse persistante entre les sessions
  persistent-brushes: true
  # Garde les entités dans les blocs lors d'éditions
  keep-entities-in-blocks: true
  remove-entity-from-world-on-chunk-fail: true
  improved-entity-edits: true
  other: false
  # Désactivé : les fluides qui coulent = lag potentiel
  allow-tick-fluids: false
  # ACTIVÉ : accélération vectorielle (Java 17+)
  use-vector-api: true

queue:
  progress:
    display: "chat"
    interval: 1
    # 3s de délai avant d'afficher le progrès (évite le spam)
    delay: 3000

  # ── Threads ─────────────────────────────────────────────────
  # = nombre exact de CPU disponibles sur le runner
  parallel-threads: 4

  # ── Target size ─────────────────────────────────────────────
  # Recommandation FAWE : >= 4x parallel-threads
  # 4096 chunks = bonne taille pour des opérations massives
  # avec 16GB de RAM, on peut se permettre large
  target-size: 4096

  # Pas de délai artificiel → vitesse maximale
  extra-time-ms: 0

  # ── Preload ─────────────────────────────────────────────────
  # Formule FAWE : 128 × GB_RAM / nb_joueurs_simultanés
  # 128 × 16 / 1 = 2048 (1 joueur principal)
  preload-chunk-count: 2048

  # Pool d'objets → réduit le GC, utilise plus de RAM
  pool: true

  # Chargement de chunks async pour écriture → plus rapide
  async-chunk-load-write: true

  # 100% = target-size entier par thread → performance max
  # Acceptable car 1 joueur à la fois sur ce serveur
  thread-target-size-percent: 100

history:
  # Sur disque → RAM libérée pour les opérations
  use-disk: true
  # Pas besoin d'inspection/rollback sur serveur build privé
  use-database: false
  # Dispatch history → beaucoup plus rapide
  combine-stages: true
  # Envoie les blocs avant que l'historique soit sauvé
  send-before-history: true
  # Niveau 3 = 3 passes fast compressor
  # Bon équilibre vitesse/taille sur disque
  compression-level: 3
  # 2MB buffer → meilleur ratio compression
  buffer-size: 2097152
  delete-after-days: 7
  delete-on-logout: false
  delete-disk-on-logout: false
  enable-for-console: true
  store-redo: true
  small-edits: false

paths:
  textures: "textures"
  heightmap: "heightmap"
  history: "history"
  clipboard: "clipboard"
  per-player-schematics: false

region-restrictions-options:
  mode: "MEMBER"
  allow-blacklists: false
  exclusive-managers: []
  worldguard-region-blacklist: false
  restrict-to-safe-range: true

general:
  unstuck-on-generate: true
  # Pas de confirmation nécessaire sur un serveur build privé
  limit-unlimited-confirms: false
  limit-unlimited-skips-creature-spawn-events: true

limits:
  default:
    # ── Aucune limite sur un serveur build privé ─────────────
    max-actions: -1
    max-changes: -1
    max-checks: -1
    max-fails: -1
    max-iterations: -1
    max-entities: -1
    max-radius: -1
    max-super-pickaxe-size: 5
    max-brush-radius: -1
    max-butcher-radius: -1
    max-blockstates: -1
    max-history-mb: -1
    schem-file-size-limit: -1
    schem-file-num-limit: -1
    # 30s pour les expressions complexes (//calc)
    max-expression-ms: 30000
    # Pas de délai artificiel → vitesse max
    speed-reduction: 0
    # Placement par chunks → bien plus rapide que bloc par bloc
    fast-placement: true
    # Mode créatif → pas de vérification inventaire
    inventory-mode: 0
    # Pas de confirmation → fluidité maximale
    confirm-large: false
    # Pas de restriction historique aux régions
    restrict-history-to-regions: false
    strip-nbt: []
    universal-disallowed-blocks: false
    allow-legacy: true
    # Évite les events de spawn → plus rapide en créatif
    skip-creature-spawn-events: true
    # Aucun bloc interdit
    disallowed-blocks: []
    remap-properties: []
