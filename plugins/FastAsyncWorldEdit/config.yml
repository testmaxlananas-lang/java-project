enabled-components:
  commands: true
  default-locale: en
  lighting-fixer: false

queue:
  # 500M blocs = besoin de queues massives
  target-size: 262144        # 256K blocs par batch (max)
  parallel-threads: 8        # tous les threads dispo
  discard-after-ms: 3600000  # 1h de timeout
  light-queue-size: 65536
  chunk-activations: true
  async-dissipate: true

history:
  use-disk: true             # CRITIQUE : évite OOM sur 500M blocs
  use-database: false
  max-changes-per-second: 0  # pas de limite
  chunk-bound-history: false
  combine-stages: true
  linear-expiry: 0           # jamais expirer

clipboard:
  use-disk: true             # clipboard sur disque
  compression-level: 1       # compression rapide

lighting:
  async: true
  delay: 0
  relight: false             # désactiver relight sur grosses ops

limits:
  # AUCUNE limite sur rien
  max-actions: -1
  max-changes: -1
  max-fails: -1
  max-checks: -1
  max-iterations: -1
  max-blockstates: -1
  max-entities: -1
  max-history: -1

progress:
  delay: 1000
  interval: 1
  enabled: true

extent:
  clipboard-class: com.fastasyncworldedit.core.extent.clipboard.DiskOptimizedClipboard
