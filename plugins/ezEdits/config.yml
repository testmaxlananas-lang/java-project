## Do not edit file version
file-version: 14

updates:
  check: false # Désactivé : évite les requêtes HTTP au démarrage
  inform-admins: false

files:
  directory:
    noise: noise
    palette: palettes
    selection: selections

metrics:
  enabled: false # Désactivé : économise des ressources

generic:
  player:
    # 1024 blocs de portée → suffisant pour tous les outils
    max-block-trace: 1024

palettes:
  player:
    max-saved-palettes: 4096 # Large pour un builder intensif
    max-length: 512 # Palettes très longues autorisées

noise:
  player:
    max-saved-presets: 4096
  parameters:
    max-octaves: 16 # Doublé : plus de détail dans les noises

voronoialize2:
  args:
    max-cells: 65536.0 # 16x plus que défaut → motifs complexes

flowfield:
  args:
    max-lines: 16777216 # 4x plus → flowfields massifs
    max-line-iterations: 262144 # 4x plus → plus de précision

flowline:
  args:
    max-length: 4096 # 4x plus long

vines:
  args:
    max-length: 1280 # 4x plus long

structure:
  args:
    max-total-size: 1024.0 # 8x plus grand

scatter:
  args:
    max-total-count: 10000 # 33x plus
    max-uniformity-iterations: 200

array:
  max-snap-range: 320 # Max absolu selon le code source

spline:
  args:
    max-radius: 200.0 # 4x plus grand

stainedglassgradient:
  args:
    max-length: 256 # 4x plus long
    max-quality: 6 # Limite hardware : ne peut pas dépasser 16
    max-layers: 11 # Limite physique du jeu

stainedglassimage:
  args:
    max-quality: 6
    max-layers: 11
    max-size: 7680 # 8K resolution supportée

smoothblocks:
  max-blocks: 33554432 # 16x plus (32M blocs)
  args:
    max-radius: 32 # 4x plus grand
    max-iterations: 128 # 2x plus

smooth:
  args:
    max-iterations: 256 # 4x plus

sharpen:
  args:
    max-iterations: 256 # 4x plus

inflate:
  args:
    max-radius: 256.0 # 4x plus

deflate:
  args:
    max-radius: 256.0 # 4x plus

symmetry:
  args:
    max-copies: 512 # 4x plus

texture:
  cells:
    args:
      max-cells: 65536.0 # 16x plus
  flow:
    args:
      max-lines: 16777216 # 4x plus
      max-iterations: 262144 # 4x plus

selections:
  player:
    max-saved-selections: 4096 # Large

brushes:
  stroke:
    max-points: 512 # 4x plus de points par stroke

visualisations:
  enable-visualisations: true
  update-interval: 1 # Chaque tick → feedback immédiat

masks:
  near-mask:
    enabled: true
    max-range: 64 # 4x plus de portée
  noise-mask:
    enabled: true
    defaults:
      voronoiedge:
        enabled: true
      ridged:
        enabled: true
      smoothcells:
        enabled: true
  aim-mask:
    enabled: true
  vectorgradient-mask:
    enabled: true
  attached-mask:
    enabled: true
  fullblock-mask:
    enabled: true
  palette-mask:
    enabled: true
  light-mask:
    enabled: true
  selection-mask:
    enabled: true
  hotbar-mask:
    enabled: true
  current-mask:
    enabled: true
  infested-mask:
    enabled: true
  lightsource-mask:
    enabled: true

patterns:
  noise-pattern:
    enabled: true
    defaults:
      voronoiedge:
        enabled: true
      ridged:
        enabled: true
      smoothcells:
        enabled: true
  aim-pattern:
    enabled: true
  vectorgradient-pattern:
    enabled: true
  selection-pattern:
    enabled: true
  palette-pattern:
    enabled: true
  hotbar-pattern:
    enabled: true

memory:
  # 1M blocs avant chunking (au lieu de 5M)
  # Plus petit = chunking plus tôt = mémoire mieux gérée
  # sur des opérations de 100M+ blocs
  chunking-activation-threshold: 1000000
  safety-check:
    enabled: true
    # Sensibilité réduite → moins de faux positifs
    # sur les grosses opérations légitimes
    sensitivity: 1.0
