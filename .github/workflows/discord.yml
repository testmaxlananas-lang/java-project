name: discord-webhook

on:
  workflow_run:
    workflows: ["server"]
    types: [requested, completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notification Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS:  ${{ github.event.action }}
          RESULT:  ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "$STATUS" = "requested" ]; then
            COLOR=3066993
            TITLE="🟢 Serveur démarré"
            DESC="Le serveur Minecraft est en cours de démarrage."
          else
            case "$RESULT" in
              success)
                COLOR=3066993
                TITLE="🔵 Serveur arrêté proprement"
                DESC="Le serveur s'est arrêté normalement (/stop)."
                ;;
              cancelled)
                COLOR=10181046
                TITLE="⚪ Serveur arrêté"
                DESC="Le workflow a été annulé."
                ;;
              *)
                COLOR=15158332
                TITLE="🔴 Serveur crashé"
                DESC="Le workflow s'est terminé de façon inattendue."
                ;;
            esac
          fi

          curl -sf -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${TITLE}\",
                \"description\": \"${DESC}\",
                \"color\": ${COLOR},
                \"footer\": {
                  \"text\": \"$(date '+%d/%m/%Y %H:%M:%S')\"
                }
              }]
            }"
