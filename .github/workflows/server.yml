name: server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.FINE_GRAINED_PAT }}

      - name: Setup
        run: |
          sudo ln -sf /bin/true /usr/bin/mandb
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo systemctl disable unattended-upgrades 2>/dev/null || true

          curl -fsSL "https://downloads.rclone.org/rclone-current-linux-amd64.zip" \
            -o /tmp/rclone.zip
          unzip -jo /tmp/rclone.zip "*/rclone" -d /tmp/
          sudo mv /tmp/rclone /usr/local/bin/rclone
          sudo chmod +x /usr/local/bin/rclone
          rm /tmp/rclone.zip

          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

          sudo sysctl -w \
            net.core.rmem_max=134217728 \
            net.core.wmem_max=134217728 \
            net.ipv4.tcp_rmem="4096 87380 134217728" \
            net.ipv4.tcp_wmem="4096 65536 134217728" \
            net.core.netdev_max_backlog=250000 \
            vm.swappiness=10 \
            vm.dirty_ratio=15 \
            vm.dirty_background_ratio=5 2>/dev/null || true

          # Swap — uniquement si pas déjà actif
          if ! swapon --show | grep -q /swapfile; then
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 4G /swapfile 2>/dev/null \
                || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=none
            fi
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile 2>/dev/null || true
            sudo swapon /swapfile 2>/dev/null || true
            echo "Swap 4G activé ✓"
          else
            echo "Swap déjà actif ✓"
          fi

          # RAM disponible réelle
          RAM_MB=$(grep MemTotal /proc/meminfo | awk '{print int($2/1024)}')
          echo "RAM totale détectée : ${RAM_MB}MB"

      - name: Restore world + plugins + server.jar
        run: |
          rclone copy rclone-mc:mc-backup/world.tar.zst . \
            --transfers=8 --multi-thread-streams=8 \
            --buffer-size=256M --ignore-errors &
          PID_W=$!

          rclone copy rclone-mc:mc-backup/plugins.tar.zst . \
            --transfers=8 --multi-thread-streams=8 \
            --buffer-size=256M --ignore-errors &
          PID_P=$!

          rclone copy rclone-mc:mc-backup/server.jar . \
            --multi-thread-streams=4 --ignore-errors &
          PID_J=$!

          wait $PID_W $PID_P $PID_J

          if [ -f world.tar.zst ]; then
            zstd -d -T0 --stdout world.tar.zst | tar -x &
            PID_EW=$!
            echo "World : extraction..."
          else
            PID_EW=""
            echo "World : fresh start"
          fi

          if [ -f plugins.tar.zst ]; then
            zstd -d -T0 --stdout plugins.tar.zst | tar -x &
            PID_EP=$!
            echo "Plugins .jar : extraction..."
          else
            PID_EP=""
            echo "Plugins : fresh start"
          fi

          [ -n "$PID_EW" ] && wait $PID_EW
          [ -n "$PID_EP" ] && wait $PID_EP
          echo "Restore terminé ✓"

      - name: Download Paper
        run: |
          if [ -f server.jar ]; then
            echo "server.jar depuis le cache ✓"
          else
            echo "Téléchargement Paper 1.21.10..."
            wget -q -O server.jar \
              "https://api.papermc.io/v2/projects/paper/versions/1.21.10/builds/129/downloads/paper-1.21.10-129.jar"
            rclone copy server.jar rclone-mc:mc-backup/ --ignore-errors &
            disown
          fi

      - name: Appliquer configs du repo
        run: |
          # spigot.yml → racine serveur
          [ -f config/spigot.yml ] && cp config/spigot.yml spigot.yml && echo "spigot.yml ✓"

          # Vérifications
          for f in server.properties ops.json eula.txt config/paper-global.yml; do
            echo "$f : $([ -f "$f" ] && echo 'OK ✓' || echo 'ABSENT ⚠️')"
          done

          # Configs plugins depuis le repo (déjà dans le workdir via git checkout)
          # Les .jar viennent du drive, les .yml viennent du repo
          echo "Configs plugins : déjà en place via git ✓"

          # paper-global.yml doit être dans le dossier config/
          # Paper le lira automatiquement
          ls -la config/ 2>/dev/null || true

          echo "=== server.properties actuel ==="
          cat server.properties 2>/dev/null || true

      - name: Start playit
        run: |
          chmod +x ./playit-linux-amd64
          printf '%s' '${{ secrets.PLAYIT_SECRET }}' > playit.toml

          RUST_LOG=warn ./playit-linux-amd64 --secret_path playit.toml \
            > playit.log 2>&1 &
          PLAYIT_PID=$!

          for i in $(seq 1 30); do
            sleep 1
            if grep -qiE "connected|tunnel|ready|online|agent" playit.log 2>/dev/null; then
              echo "Playit prêt en ${i}s ✓"
              break
            fi
            if ! kill -0 $PLAYIT_PID 2>/dev/null; then
              echo "[WARN] Playit mort"
              cat playit.log
              break
            fi
          done
          echo "=== PLAYIT LOG ==="
          cat playit.log

      - name: Start server + watchdog + monitoring
        env:
          FINE_GRAINED_PAT: ${{ secrets.FINE_GRAINED_PAT }}
          REPO: ${{ github.repository }}
        run: |
          REPO_DIR="/home/runner/work/java-project/java-project"

          # ══════════════════════════════════════════
          # CALCUL RAM DYNAMIQUE
          # On laisse 2.5G pour l'OS, plugins natifs,
          # FAWE disk cache, et le reste du système
          # ══════════════════════════════════════════
          RAM_TOTAL_KB=$(grep MemTotal /proc/meminfo | awk '{print $2}')
          RAM_TOTAL_MB=$((RAM_TOTAL_KB / 1024))
          # Réserver 2500MB pour l'OS + overhead
          JVM_MB=$((RAM_TOTAL_MB - 2500))
          # Clamp entre 8G et 13G
          [ $JVM_MB -gt 13312 ] && JVM_MB=13312
          [ $JVM_MB -lt 8192  ] && JVM_MB=8192
          JVM_XMX="${JVM_MB}M"
          echo "RAM totale: ${RAM_TOTAL_MB}MB | JVM allouée: ${JVM_XMX}"

          # ══════════════════════════════════════════
          # MONITORING — données propres dans un fichier
          # Format strict : champ1=val1;champ2=val2
          # ══════════════════════════════════════════
          MONITOR_FILE="/tmp/mc_stats.txt"
          MONITOR_LOG="/tmp/mc_monitor.log"

          monitor_loop() {
            while true; do
              local TS=$(date '+%H:%M:%S')
              local MEM_FREE=$(grep MemAvailable /proc/meminfo | awk '{print $2}')
              local MEM_USED_MB=$(( (RAM_TOTAL_KB - MEM_FREE) / 1024 ))
              local MEM_PCT=$(( (RAM_TOTAL_KB - MEM_FREE) * 100 / RAM_TOTAL_KB ))
              local SWAP_MB=$(free -m 2>/dev/null | awk '/Swap/{print $3}')
              local DISK=$(df -h . 2>/dev/null | tail -1 | awk '{print $5}')

              # CPU via /proc/stat (plus fiable que top)
              local CPU_LINE1=$(grep '^cpu ' /proc/stat)
              sleep 1
              local CPU_LINE2=$(grep '^cpu ' /proc/stat)
              local IDLE1=$(echo $CPU_LINE1 | awk '{print $5}')
              local TOTAL1=$(echo $CPU_LINE1 | awk '{s=0;for(i=2;i<=NF;i++)s+=$i;print s}')
              local IDLE2=$(echo $CPU_LINE2 | awk '{print $5}')
              local TOTAL2=$(echo $CPU_LINE2 | awk '{s=0;for(i=2;i<=NF;i++)s+=$i;print s}')
              local CPU_PCT=0
              if [ $((TOTAL2 - TOTAL1)) -gt 0 ]; then
                CPU_PCT=$(( 100 - (IDLE2 - IDLE1) * 100 / (TOTAL2 - TOTAL1) ))
              fi

              # TPS depuis mc.log
              local TPS=$(grep -oP '\[Server thread/INFO\].*TPS.*: \K[\d.]+' \
                mc.log 2>/dev/null | tail -1)
              [ -z "$TPS" ] && TPS="N/A"

              # Écrire données propres
              printf "TS=%s;CPU=%s%%;RAM=%s/%sMB(%s%%);SWAP=%sMB;DISK=%s;TPS=%s\n" \
                "$TS" "$CPU_PCT" "$MEM_USED_MB" "$RAM_TOTAL_MB" \
                "$MEM_PCT" "$SWAP_MB" "$DISK" "$TPS" \
                > "$MONITOR_FILE"

              # Log historique
              printf "[%s] CPU:%s%% RAM:%s/%sMB(%s%%) SWAP:%sMB DISK:%s TPS:%s\n" \
                "$TS" "$CPU_PCT" "$MEM_USED_MB" "$RAM_TOTAL_MB" \
                "$MEM_PCT" "$SWAP_MB" "$DISK" "$TPS" \
                >> "$MONITOR_LOG"

              # Alerte RAM > 92%
              if [ "$MEM_PCT" -gt 92 ] 2>/dev/null; then
                echo "[⚠️  RAM CRITIQUE ${MEM_PCT}%] ${MEM_USED_MB}MB / ${RAM_TOTAL_MB}MB" \
                  >> "$MONITOR_LOG"
              fi

              sleep 9  # + 1s CPU = 10s total
            done
          }

          display_stats() {
            echo "╔══════════════════════════════════════════╗"
            echo "║         STATS SERVEUR MC                 ║"
            echo "╠══════════════════════════════════════════╣"

            if [ -f "$MONITOR_FILE" ]; then
              local DATA=$(cat "$MONITOR_FILE")
              local TS=$(echo  "$DATA" | grep -oP 'TS=\K[^;]+')
              local CPU=$(echo "$DATA" | grep -oP 'CPU=\K[^;]+')
              local RAM=$(echo "$DATA" | grep -oP 'RAM=\K[^;]+')
              local SWP=$(echo "$DATA" | grep -oP 'SWAP=\K[^;]+')
              local DSK=$(echo "$DATA" | grep -oP 'DISK=\K[^;]+')
              local TPS=$(echo "$DATA" | grep -oP 'TPS=\K[^;]+')

              echo "║ 🕐 Heure    : $TS"
              echo "║ 🖥️  CPU      : $CPU"
              echo "║ 🧠 RAM      : $RAM"
              echo "║ 🔄 Swap     : $SWP"
              echo "║ 💾 Disque   : $DSK"
              echo "║ ⚡ TPS      : $TPS"
              echo "║ ☕ JVM      : $JVM_XMX alloués"
            else
              echo "║ Monitoring en démarrage..."
            fi

            echo "╠══════════════════════════════════════════╣"
            echo "║ 📋 MC LOG (8 dernières lignes)           ║"
            echo "╠══════════════════════════════════════════╣"
            tail -8 mc.log 2>/dev/null | while IFS= read -r line; do
              # Tronquer les lignes trop longues
              printf "║ %.80s\n" "$line"
            done
            echo "╚══════════════════════════════════════════╝"
          }

          # ══════════════════════════════════════════
          # BACKUP
          # World  → zstd -1 (vitesse max)
          # Plugins jars → zstd -3 (seulement si modifié)
          # ══════════════════════════════════════════
          backup() {
            local LABEL="${1:-periodic}"
            echo "[BACKUP:$LABEL] Start..."
            local T0=$(date +%s)

            if [ -d world ]; then
              tar -cf - \
                --exclude='world/session.lock' \
                --exclude='world/poi' \
                world/ 2>/dev/null \
              | zstd -1 -T0 -fo world.tar.zst

              rclone copy world.tar.zst rclone-mc:mc-backup/ \
                --transfers=8 --multi-thread-streams=8 \
                --buffer-size=256M --ignore-errors &
              local UP_W=$!
            fi

            if [ -d plugins ]; then
              local CHANGED=0
              if [ -f plugins.tar.zst ]; then
                CHANGED=$(find plugins -maxdepth 1 -name "*.jar" \
                  -newer plugins.tar.zst 2>/dev/null | wc -l)
              else
                CHANGED=1
              fi

              if [ "$CHANGED" -gt 0 ]; then
                echo "[BACKUP] Plugins .jar modifiés → recompression"
                find plugins -maxdepth 1 -name "*.jar" -print0 \
                  | tar -cf - --null -T - 2>/dev/null \
                  | zstd -3 -T0 -fo plugins.tar.zst
                rclone copy plugins.tar.zst rclone-mc:mc-backup/ \
                  --transfers=4 --multi-thread-streams=4 \
                  --buffer-size=128M --ignore-errors &
                local UP_P=$!
              else
                echo "[BACKUP] Plugins .jar inchangés → skip"
              fi
            fi

            wait ${UP_W:-} ${UP_P:-} 2>/dev/null
            echo "[BACKUP:$LABEL] Done en $(( $(date +%s) - T0 ))s ✓"
          }

          # ══════════════════════════════════════════
          # COMMIT CONFIGS → GIT
          # ══════════════════════════════════════════
          commit_configs() {
            echo "[GIT] Sync configs plugins..."
            cd "$REPO_DIR"
            git config user.name  "MC Server Bot"
            git config user.email "bot@mc-server.local"

            # Ajouter configs plugins (sous-dossiers uniquement)
            find plugins -mindepth 2 -type f \
              \( -name "*.yml" -o -name "*.yaml" \
              -o -name "*.json" -o -name "*.conf" \
              -o -name "*.properties" -o -name "*.toml" \) \
              ! -name "plugin.yml" ! -name "plugin.yaml" \
              2>/dev/null | while IFS= read -r f; do
                git add "$f" 2>/dev/null || true
              done

            git add config/ server.properties ops.json 2>/dev/null || true

            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "🔧 [bot] sync configs $(date '+%H:%M:%S')" \
                --no-verify 2>/dev/null \
              && git push \
                "https://x-access-token:$FINE_GRAINED_PAT@github.com/$REPO.git" \
                HEAD:main 2>/dev/null \
              && echo "[GIT] Push ✓" \
              || echo "[GIT] Push échoué (ignoré)"
            else
              echo "[GIT] Rien à committer"
            fi

            cd - >/dev/null
          }

          # ══════════════════════════════════════════
          # START MC
          # RAM dynamique calculée plus haut
          # ══════════════════════════════════════════
          start_mc() {
            /usr/lib/jvm/temurin-21-jdk-amd64/bin/java \
              -Xms${JVM_XMX} -Xmx${JVM_XMX} \
              \
              -XX:+UseG1GC \
              -XX:+ParallelRefProcEnabled \
              -XX:MaxGCPauseMillis=200 \
              -XX:+UnlockExperimentalVMOptions \
              -XX:+DisableExplicitGC \
              -XX:+AlwaysPreTouch \
              -XX:G1NewSizePercent=30 \
              -XX:G1MaxNewSizePercent=40 \
              -XX:G1HeapRegionSize=8M \
              -XX:G1ReservePercent=20 \
              -XX:G1HeapWastePercent=5 \
              -XX:G1MixedGCCountTarget=4 \
              -XX:InitiatingHeapOccupancyPercent=15 \
              -XX:G1MixedGCLiveThresholdPercent=90 \
              -XX:G1RSetUpdatingPauseTimePercent=5 \
              -XX:SurvivorRatio=32 \
              -XX:MaxTenuringThreshold=1 \
              -XX:+PerfDisableSharedMem \
              -XX:ConcGCThreads=4 \
              -XX:ParallelGCThreads=8 \
              -XX:+UseStringDeduplication \
              -XX:ReservedCodeCacheSize=512m \
              \
              -XX:+HeapDumpOnOutOfMemoryError \
              -XX:HeapDumpPath=/tmp/mc-oom.hprof \
              -XX:+ExitOnOutOfMemoryError \
              \
              -Dpaper.watchdog.earlyWarningDelay=60000 \
              -Dpaper.watchdog.earlyWarningEvery=10000 \
              -Djava.net.preferIPv4Stack=true \
              -Dfile.encoding=UTF-8 \
              -Dusing.aikars.flags=https://mcflags.emc.gs \
              -Daikars.new.flags=true \
              \
              -jar server.jar nogui \
              > mc.log 2>&1 &
            echo $!
          }

          # ══════════════════════════════════════════
          # BOUCLE PRINCIPALE
          # ══════════════════════════════════════════
          MC_PID=$(start_mc)
          START_TIME=$(date +%s)
          LAST_BACKUP=$(date +%s)
          LAST_CONFIG_COMMIT=$(date +%s)
          CRASH_COUNT=0
          LOOP=0

          echo "MC démarré (PID=$MC_PID, RAM=$JVM_XMX) ✓"

          monitor_loop &
          MONITOR_PID=$!
          echo "Monitoring démarré (PID=$MONITOR_PID) ✓"

          while true; do
            sleep 20
            LOOP=$((LOOP + 1))
            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))
            SINCE_BACKUP=$((NOW - LAST_BACKUP))
            SINCE_CONFIG=$((NOW - LAST_CONFIG_COMMIT))

            # Stats toutes les 2min
            if [ $((LOOP % 6)) -eq 0 ]; then
              display_stats
            fi

            # Backup toutes les 5min
            if [ $SINCE_BACKUP -ge 300 ]; then
              backup "periodic"
              LAST_BACKUP=$(date +%s)
            fi

            # Commit configs toutes les 15min
            if [ $SINCE_CONFIG -ge 900 ]; then
              commit_configs
              LAST_CONFIG_COMMIT=$(date +%s)
            fi

            # Watchdog crash
            if ! kill -0 $MC_PID 2>/dev/null; then
              CRASH_COUNT=$((CRASH_COUNT + 1))
              echo "════════════════════════════════════"
              echo "⚠️  CRASH #$CRASH_COUNT DÉTECTÉ à $(date '+%H:%M:%S')"
              echo "════════════════════════════════════"
              display_stats
              echo "=== MC LOG (50 dernières lignes) ==="
              tail -50 mc.log 2>/dev/null || true

              if grep -qiE "OutOfMemoryError|java.lang.OutOfMemory" mc.log 2>/dev/null; then
                echo "💀 CAUSE : OutOfMemoryError"
              elif grep -qiE "Watchdog|Server thread" mc.log 2>/dev/null | tail -5 | grep -qiE "Watchdog"; then
                echo "💀 CAUSE : Watchdog timeout"
              else
                echo "💀 CAUSE : Arrêt normal ou inconnu"
                echo "(Vérifier si /stop a été exécuté)"
              fi

              if [ $CRASH_COUNT -ge 5 ]; then
                echo "[ERROR] 5 crashs/stops, abandon"
                backup "crash-final"
                kill $MONITOR_PID 2>/dev/null
                exit 1
              fi

              sleep 10
              MC_PID=$(start_mc)
              echo "Redémarré PID=$MC_PID ✓"
            else
              CRASH_COUNT=0
            fi

            # Relance workflow avant limite (340min = 20400s)
            if [ $ELAPSED -ge 20400 ]; then
              echo "[INFO] Relance workflow à $(( ELAPSED/60 ))min..."
              backup "pre-restart"
              commit_configs
              kill $MONITOR_PID 2>/dev/null

              curl -s -X POST \
                -H "Authorization: token $FINE_GRAINED_PAT" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/workflows/server.yml/dispatches" \
                -d '{"ref":"main"}'

              sleep 10
              kill $MC_PID 2>/dev/null || true
              exit 0
            fi
          done

      - name: Backup final
        if: always()
        run: |
          echo "[BACKUP FINAL] Démarrage..."

          if [ -d world ]; then
            tar -cf - \
              --exclude='world/session.lock' \
              world/ 2>/dev/null \
            | zstd -1 -T0 -fo world.tar.zst
            rclone copy world.tar.zst rclone-mc:mc-backup/ \
              --transfers=8 --multi-thread-streams=8 \
              --buffer-size=256M --ignore-errors &
            PID_W=$!
          fi

          if [ -d plugins ]; then
            find plugins -maxdepth 1 -name "*.jar" -print0 \
              | tar -cf - --null -T - 2>/dev/null \
              | zstd -3 -T0 -fo plugins.tar.zst
            rclone copy plugins.tar.zst rclone-mc:mc-backup/ \
              --transfers=4 --multi-thread-streams=4 \
              --ignore-errors &
            PID_P=$!
          fi

          wait ${PID_W:-} ${PID_P:-} 2>/dev/null
          echo "Backup final Done ✓"
