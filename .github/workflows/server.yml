name: server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MC_VERSION: "1.21.4"
  JVM_MAX_MB: "14848"
  JVM_MIN_MB: "4096"
  JVM_RESERVE_MB: "512"
  SWAP_SIZE_GB: "16"

concurrency:
  group: minecraft-server
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main

      - name: Snapshot repo
        run: |
          set -euo pipefail
          mkdir -p /tmp/repo-snapshot
          cp -ra . /tmp/repo-snapshot/
          echo "[SNAPSHOT] $(find /tmp/repo-snapshot -type f | wc -l) fichiers"

      - name: Setup système
        run: |
          set -euo pipefail

          sudo systemctl stop unattended-upgrades apt-daily apt-daily-upgrade 2>/dev/null || true
          sudo systemctl disable unattended-upgrades apt-daily apt-daily-upgrade 2>/dev/null || true
          sudo pkill -f unattended-upgrades 2>/dev/null || true
          sudo ln -sf /bin/true /usr/bin/mandb 2>/dev/null || true
          sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock 2>/dev/null || true

          curl -fsSL "https://downloads.rclone.org/rclone-current-linux-amd64.zip" -o /tmp/rclone.zip
          unzip -jo /tmp/rclone.zip "*/rclone" -d /tmp/
          sudo mv /tmp/rclone /usr/local/bin/rclone
          sudo chmod +x /usr/local/bin/rclone
          rm -f /tmp/rclone.zip
          echo "[RCLONE] $(rclone --version | head -1)"

          mkdir -p ~/.config/rclone
          printf '%s' "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf

          sudo sysctl -w \
            net.core.rmem_max=268435456 \
            net.core.wmem_max=268435456 \
            net.core.rmem_default=524288 \
            net.core.wmem_default=524288 \
            net.core.netdev_max_backlog=500000 \
            net.core.somaxconn=65535 \
            net.core.netdev_budget=600 \
            net.ipv4.tcp_congestion_control=bbr \
            net.core.default_qdisc=fq \
            net.ipv4.tcp_fastopen=3 \
            net.ipv4.tcp_tw_reuse=1 \
            net.ipv4.tcp_fin_timeout=10 \
            net.ipv4.tcp_keepalive_time=300 \
            net.ipv4.tcp_keepalive_intvl=30 \
            net.ipv4.tcp_keepalive_probes=3 \
            net.ipv4.tcp_max_syn_backlog=65535 \
            net.ipv4.tcp_max_tw_buckets=2000000 \
            net.ipv4.tcp_mtu_probing=1 \
            net.ipv4.tcp_window_scaling=1 \
            net.ipv4.tcp_timestamps=1 \
            net.ipv4.ip_local_port_range="1024 65535" \
            vm.swappiness=1 \
            vm.dirty_ratio=90 \
            vm.dirty_background_ratio=3 \
            vm.dirty_expire_centisecs=1500 \
            vm.dirty_writeback_centisecs=300 \
            vm.vfs_cache_pressure=30 \
            vm.overcommit_memory=1 \
            vm.overcommit_ratio=99 \
            vm.max_map_count=4194304 \
            vm.min_free_kbytes=131072 \
            vm.zone_reclaim_mode=0 \
            vm.page-cluster=0 \
            kernel.sched_migration_cost_ns=5000000 \
            kernel.sched_autogroup_enabled=0 \
            kernel.sched_wakeup_granularity_ns=15000000 \
            kernel.sched_min_granularity_ns=10000000 \
            kernel.pid_max=4194304 \
            kernel.numa_balancing=0 \
            kernel.randomize_va_space=0 \
            fs.file-max=2097152 \
            fs.inotify.max_user_watches=524288 \
            fs.inotify.max_user_instances=512 \
            fs.aio-max-nr=1048576 \
            2>/dev/null || true

          echo madvise       | sudo tee /sys/kernel/mm/transparent_hugepage/enabled           >/dev/null 2>&1 || true
          echo defer+madvise | sudo tee /sys/kernel/mm/transparent_hugepage/defrag            >/dev/null 2>&1 || true
          echo 0             | sudo tee /sys/kernel/mm/transparent_hugepage/khugepaged/defrag >/dev/null 2>&1 || true

          for f in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
            [ -f "$f" ] && echo performance | sudo tee "$f" >/dev/null 2>&1 || true
          done

          for dev in /sys/block/sda /sys/block/sdb /sys/block/nvme0n1 /sys/block/xvda; do
            if [ -d "$dev" ]; then
              echo "none"  | sudo tee "${dev}/queue/scheduler"     >/dev/null 2>&1 || true
              echo "32768" | sudo tee "${dev}/queue/read_ahead_kb" >/dev/null 2>&1 || true
              echo "0"     | sudo tee "${dev}/queue/rotational"    >/dev/null 2>&1 || true
              echo "512"   | sudo tee "${dev}/queue/nr_requests"   >/dev/null 2>&1 || true
              echo "0"     | sudo tee "${dev}/queue/add_random"    >/dev/null 2>&1 || true
              echo "2"     | sudo tee "${dev}/queue/rq_affinity"   >/dev/null 2>&1 || true
            fi
          done

          ulimit -n 1048576 2>/dev/null || true
          ulimit -s unlimited 2>/dev/null || true
          ulimit -u unlimited 2>/dev/null || true

          if ! swapon --show | grep -q /swapfile 2>/dev/null; then
            sudo fallocate -l "${SWAP_SIZE_GB}G" /swapfile 2>/dev/null \
              || sudo dd if=/dev/zero of=/swapfile bs=1M count=$(( SWAP_SIZE_GB * 1024 )) status=none
            sudo chmod 600 /swapfile
            sudo mkswap -L mc-swap /swapfile >/dev/null
            sudo swapon --priority=100 /swapfile
            echo "[SWAP] $(free -h | awk '/Swap/{print $2}')"
          fi

          JAVA_BIN="/usr/lib/jvm/temurin-21-jdk-amd64/bin/java"
          if [ ! -f "$JAVA_BIN" ]; then
            wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public \
              | sudo gpg --dearmor \
              | sudo tee /etc/apt/trusted.gpg.d/adoptium.gpg >/dev/null
            . /etc/os-release
            echo "deb https://packages.adoptium.net/artifactory/deb ${VERSION_CODENAME} main" \
              | sudo tee /etc/apt/sources.list.d/adoptium.list
            sudo apt-get update -qq
            sudo apt-get install -y -qq temurin-21-jdk
          fi
          echo "[JAVA] $("$JAVA_BIN" -version 2>&1 | head -1)"

          command -v zstd >/dev/null 2>&1 || sudo apt-get install -y -qq zstd
          pip3 install -q --no-cache-dir discord.py aiohttp psutil 2>/dev/null || true

          RAM_KB=$(awk '/MemTotal/{print $2}' /proc/meminfo)
          echo "[SYS] RAM=$(( RAM_KB / 1024 ))MB CPUs=$(nproc) Swap=$(free -h | awk '/Swap/{print $2}') Disk=$(df -h . | awk 'NR==2{print $4}')"

      - name: Restore Drive
        run: |
          set -uo pipefail

          rclone_dl() {
            local src="$1" dst="${2:-.}"
            rclone copy "rclone-mc:mc-backup/${src}" "${dst}" \
              --transfers=16 --multi-thread-streams=16 \
              --multi-thread-cutoff=10M --buffer-size=512M \
              --retries=5 --low-level-retries=10 \
              --timeout=120s --fast-list 2>/dev/null \
              && echo "[DL] OK: ${src}" \
              || echo "[DL] ABSENT: ${src}"
          }

          rclone_dl "worlds.tar.zst" & P1=$!
          rclone_dl "server.jar"     & P2=$!
          wait $P1 $P2

          if [ -f worlds.tar.zst ]; then
            SIZE=$(stat -c%s worlds.tar.zst 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 1000 ]; then
              echo "[WORLDS] Extraction $(du -sh worlds.tar.zst | cut -f1)..."
              if zstd -d -T0 --stdout worlds.tar.zst | tar -x --ignore-zeros 2>/dev/null; then
                echo "[WORLDS] OK"
                find . -maxdepth 1 -mindepth 1 -type d 2>/dev/null | while read -r d; do
                  [ -f "$d/level.dat" ] && echo "  monde: $(basename "$d")"
                done || true
              else
                echo "[WORLDS] Extraction echouee"
              fi
            else
              echo "[WORLDS] Archive invalide (${SIZE}B)"
            fi
            rm -f worlds.tar.zst
          else
            echo "[WORLDS] Aucun backup"
          fi

      - name: Paper JAR
        run: |
          set -uo pipefail
          MIN_SIZE=10000000

          if [ -f server.jar ]; then
            SIZE=$(stat -c%s server.jar 2>/dev/null || echo 0)
            if [ "$SIZE" -gt "$MIN_SIZE" ]; then
              echo "[JAR] Cache OK ($(( SIZE / 1048576 ))MB)"
              echo "eula=true" > eula.txt
              exit 0
            fi
            rm -f server.jar
          fi

          BUILDS_JSON=$(curl -sf --max-time 30 \
            "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds" \
            || echo '{"builds":[]}')

          LATEST_BUILD=$(printf '%s' "$BUILDS_JSON" | python3 -c "
          import sys, json
          builds = json.load(sys.stdin).get('builds', [])
          stable = [b for b in builds if b.get('channel','') == 'default']
          print((stable or builds or [{'build':225}])[-1]['build'])
          " 2>/dev/null || echo "225")

          JAR_NAME="paper-${MC_VERSION}-${LATEST_BUILD}.jar"
          DL_URL="https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds/${LATEST_BUILD}/downloads/${JAR_NAME}"
          echo "[JAR] Build #${LATEST_BUILD}"

          wget -q --show-progress --tries=3 --timeout=120 -O server.jar "$DL_URL" 2>/dev/null \
            || wget -q --tries=3 -O server.jar \
              "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds/225/downloads/paper-${MC_VERSION}-225.jar"

          SIZE=$(stat -c%s server.jar 2>/dev/null || echo 0)
          if [ "$SIZE" -gt "$MIN_SIZE" ]; then
            echo "[JAR] OK — $(du -sh server.jar | cut -f1)"
            rclone copy server.jar rclone-mc:mc-backup/ \
              --transfers=4 --retries=3 2>/dev/null &
            disown
          else
            echo "[JAR] Echec (${SIZE}B)"
            exit 1
          fi
          echo "eula=true" > eula.txt

      - name: Appliquer repo
        run: |
          set -uo pipefail
          mkdir -p plugins

          find /tmp/repo-snapshot -maxdepth 1 -name "*.jar" \
            ! -name "server.jar" ! -name "playit*" 2>/dev/null \
          | while IFS= read -r jar; do
            name="$(basename "$jar")"
            cp -f "$jar" "plugins/${name}"
            echo "[JAR] ${name}"
          done

          find /tmp/repo-snapshot -type f 2>/dev/null \
          | while IFS= read -r src; do
            rel="${src#/tmp/repo-snapshot/}"
            case "$rel" in
              ""|.git/*|*.tar.zst|*.tar.gz|*.zip) continue ;;
            esac
            if [[ "$rel" == *.jar ]] && [[ "$(dirname "$rel")" == "." ]]; then
              continue
            fi
            dst_dir="$(dirname "$rel")"
            [ -n "$dst_dir" ] && [ "$dst_dir" != "." ] && mkdir -p "$dst_dir"
            cp -f "$src" "$rel" 2>/dev/null || true
          done

          echo "eula=true" > eula.txt

          echo "[PLUGINS]"
          find plugins -maxdepth 1 -name "*.jar" 2>/dev/null | sort | while read -r f; do
            echo "  $(basename "$f") — $(du -sh "$f" | cut -f1)"
          done

      - name: Playit
        run: |
          set -uo pipefail

          PLAYIT_BIN="./playit-linux-amd64"
          if [ ! -f "$PLAYIT_BIN" ]; then
            curl -fsSL \
              "https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64" \
              -o "$PLAYIT_BIN" 2>/dev/null || true
          fi
          chmod +x "$PLAYIT_BIN" 2>/dev/null || true
          printf '%s' '${{ secrets.PLAYIT_SECRET }}' > playit.toml

          RUST_LOG=warn "$PLAYIT_BIN" --secret_path playit.toml > /tmp/playit.log 2>&1 &
          PLAYIT_PID=$!
          echo "[PLAYIT] PID=${PLAYIT_PID}"

          for i in $(seq 1 45); do
            sleep 1
            if grep -qiE "connected|tunnel|ready|online|agent" /tmp/playit.log 2>/dev/null; then
              echo "[PLAYIT] Connecte en ${i}s"
              break
            fi
            if ! kill -0 "$PLAYIT_PID" 2>/dev/null; then
              echo "[PLAYIT] Process mort"
              cat /tmp/playit.log || true
              break
            fi
          done

      - name: Minecraft + Bot + Dashboard
        env:
          FINE_GRAINED_PAT: ${{ secrets.FINE_GRAINED_PAT }}
          GITHUB_PAT: ${{ secrets.FINE_GRAINED_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATS_GIST_ID: ${{ secrets.STATS_GIST_ID }}
          MC_EVENT_FILE: /tmp/mc_events.jsonl
          MC_PIPE: /tmp/mc_input
          MC_STATS_FILE: /tmp/mc_stats.txt
          MC_LOG: /home/runner/work/java-project/java-project/mc.log
        run: |
          set -uo pipefail

          JAVA="/usr/lib/jvm/temurin-21-jdk-amd64/bin/java"
          MC_LOG_REL="mc.log"
          MC_LOG_ABS="/home/runner/work/java-project/java-project/mc.log"
          MC_PIPE="/tmp/mc_input"
          STATS_FILE="/tmp/mc_stats.txt"
          EVENT_FILE="/tmp/mc_events.jsonl"
          LOCK_BACKUP="/tmp/backup.lock"
          LOCK_GIT="/tmp/git.lock"
          STOPPED_CLEANLY="/tmp/mc_stopped_cleanly"
          WORLD_REF="/tmp/world_ref.txt"
          MC_PID_FILE="/tmp/mc_pid.txt"
          WORLD_BLACKLIST="plugins logs cache config libraries .git .paper-remapped crash-reports debug discord_bot dashboard"

          CPUS=$(nproc)
          RAM_KB=$(awk '/MemTotal/{print $2}' /proc/meminfo)
          RAM_MB=$(( RAM_KB / 1024 ))
          JVM_MB=$(( RAM_MB - JVM_RESERVE_MB ))
          [ "$JVM_MB" -gt "$JVM_MAX_MB" ] && JVM_MB=$JVM_MAX_MB
          [ "$JVM_MB" -lt "$JVM_MIN_MB" ] && JVM_MB=$JVM_MIN_MB
          JVM="${JVM_MB}M"
          GC_THREADS=$(( CPUS > 8 ? 8 : CPUS ))
          ASYNC_THREADS=$(( CPUS * 2 ))
          REGION_SIZE=32
          [ "$JVM_MB" -ge 12288 ] && REGION_SIZE=64

          T_START=$(date +%s)
          T_BACKUP=$T_START
          T_GIT=$T_START
          T_GIST=$T_START

          CRASHES=0
          LOOP=0
          WARNED=0
          BOT_RESTARTS=0
          WATCHER_RESTARTS=0

          MC_PID=0
          BOT_PID=0
          MONITOR_PID=0
          LIVE_PID=0
          WATCHER_PID=0

          echo "[INIT] RAM=${RAM_MB}MB JVM=${JVM} CPUs=${CPUS} GC=${GC_THREADS} REGION=${REGION_SIZE}M"

          log()        { printf '[%s] %s\n' "$(date '+%H:%M:%S')" "$*"; }
          mc_cmd()     { printf '%s\n' "$*" > "$MC_PIPE" 2>/dev/null || true; }
          emit_event() { printf '%s\n' "$1" >> "$EVENT_FILE" 2>/dev/null || true; }

          mc_alive() {
            local PID
            PID=$(cat "$MC_PID_FILE" 2>/dev/null || echo 0)
            [ "$PID" -gt 0 ] 2>/dev/null && kill -0 "$PID" 2>/dev/null
          }

          mc_get_pid() {
            cat "$MC_PID_FILE" 2>/dev/null || echo 0
          }

          was_graceful() {
            tail -80 "$MC_LOG_REL" 2>/dev/null \
              | grep -qiE "All dimensions are saved|Stopping server|Saving players"
          }

          webhook_send() {
            [ -z "${DISCORD_WEBHOOK:-}" ] && return 0
            curl -sf -X POST "${DISCORD_WEBHOOK}" \
              -H "Content-Type: application/json" \
              -d "{\"content\":\"$1\"}" \
              >/dev/null 2>&1 || true
          }

          gh_dispatch() {
            curl -sf -X POST \
              -H "Authorization: token ${FINE_GRAINED_PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/actions/workflows/server.yml/dispatches" \
              -d '{"ref":"main"}' >/dev/null 2>&1 \
              && log "[GH] Dispatch OK" || log "[GH] Dispatch echoue"
          }

          gh_cancel() {
            curl -sf -X POST \
              -H "Authorization: token ${FINE_GRAINED_PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/cancel" \
              >/dev/null 2>&1 || true
          }

          push_gist() {
            [ -z "${STATS_GIST_ID:-}" ] && return 0
            local SL="" STATUS="$1"
            [ -f "$STATS_FILE" ] && SL=$(cat "$STATS_FILE" 2>/dev/null || true)
            python3 - <<PYEOF 2>/dev/null || true
          import json, os, urllib.request, datetime
          gist_id = os.environ.get('STATS_GIST_ID','')
          pat     = os.environ.get('FINE_GRAINED_PAT','')
          if not gist_id or not pat: exit(0)
          sl = '${SL}'
          ef = '${EVENT_FILE}'
          parts = {}
          for p in sl.split(';'):
            if '=' in p:
              k,v = p.split('=',1); parts[k]=v
          players = []
          try:
            pset = set()
            with open(ef) as f:
              for line in f:
                try:
                  ev = json.loads(line.strip())
                  t  = ev.get('type','')
                  if t=='join':    pset.add(ev.get('player',''))
                  elif t=='quit':  pset.discard(ev.get('player',''))
                  elif t=='start': pset.clear()
                except: pass
            players = sorted(pset)
          except: pass
          stats = {
            'status':  '${STATUS}',
            'ts':      parts.get('TS','N/A'),
            'cpu':     parts.get('CPU','N/A'),
            'ram':     parts.get('RAM','N/A'),
            'swap':    parts.get('SWAP','N/A'),
            'disk':    parts.get('DISK','N/A'),
            'tps':     parts.get('TPS','N/A'),
            'online':  len(players),
            'players': players,
            'updated': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
          }
          payload = json.dumps({
            'files': {'mc-stats.json': {'content': json.dumps(stats, ensure_ascii=False)}}
          }).encode()
          req = urllib.request.Request(
            f'https://api.github.com/gists/{gist_id}',
            data=payload, method='PATCH',
            headers={
              'Authorization': f'token {pat}',
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json',
            }
          )
          try: urllib.request.urlopen(req, timeout=10)
          except Exception as e: print(f'[GIST] {e}')
          PYEOF
          }

          get_world_dirs() {
            local DIRS=""
            while IFS= read -r dir; do
              local name skip=0
              name="$(basename "$dir")"
              for bl in $WORLD_BLACKLIST; do
                [ "$name" = "$bl" ] && skip=1 && break
              done
              [ "$skip" = "1" ] && continue
              [ -f "$dir/level.dat" ] || continue
              DIRS="$DIRS $name"
            done < <(find . -maxdepth 1 -mindepth 1 -type d 2>/dev/null)
            echo "$DIRS"
          }

          world_changed() {
            local DIRS="$1"
            [ -z "$DIRS" ] && echo "0" && return
            find $DIRS -name "*.mca" -newer "$WORLD_REF" 2>/dev/null | wc -l
          }

          backup() {
            local LABEL="${1:-periodic}" FORCE="${2:-0}"
            [ -f "$LOCK_BACKUP" ] && log "[BACKUP] En cours — skip" && return 0
            touch "$LOCK_BACKUP"
            local T0
            T0=$(date +%s)
            mc_cmd "save-all flush" 2>/dev/null || true
            sleep 3
            local WORLD_DIRS
            WORLD_DIRS=$(get_world_dirs)
            if [ -z "$WORLD_DIRS" ]; then
              log "[BACKUP] Aucun monde"
              rm -f "$LOCK_BACKUP"
              return 0
            fi
            local CHANGED
            CHANGED=$(world_changed "$WORLD_DIRS")
            if [ "$FORCE" = "0" ] && [ "$CHANGED" -eq 0 ]; then
              log "[BACKUP] Pas de changement — skip"
              rm -f "$LOCK_BACKUP"
              return 0
            fi
            local ARCHIVE="/tmp/worlds_$$.tar.zst"
            if tar -cf - \
                --exclude='*/session.lock' \
                --exclude='*/poi/*' \
                --exclude='level.dat_old' \
                --exclude='*.lck' \
                $WORLD_DIRS 2>/dev/null \
              | zstd -19 -T$(nproc) --long=27 -fo "$ARCHIVE" 2>/dev/null; then
              local SZ
              SZ=$(du -sh "$ARCHIVE" | cut -f1)
              log "[BACKUP] ${SZ} — Upload..."
              if rclone copy "$ARCHIVE" rclone-mc:mc-backup/ \
                  --transfers=16 --multi-thread-streams=16 \
                  --multi-thread-cutoff=10M \
                  --buffer-size=512M --retries=5 --checksum \
                  2>/dev/null; then
                rclone moveto \
                  "rclone-mc:mc-backup/$(basename "$ARCHIVE")" \
                  "rclone-mc:mc-backup/worlds.tar.zst" \
                  2>/dev/null || true
                touch "$WORLD_REF"
                log "[BACKUP:${LABEL}] OK en $(( $(date +%s) - T0 ))s"
              else
                log "[BACKUP] Upload echoue"
              fi
            else
              log "[BACKUP] Compression echouee"
            fi
            rm -f "$ARCHIVE" "$LOCK_BACKUP"
          }

          git_sync() {
            [ -f "$LOCK_GIT" ] && log "[GIT] En cours — skip" && return 0
            touch "$LOCK_GIT"
            git config user.name  "MC Server Bot"
            git config user.email "bot@mc-server.local"
            git remote set-url origin \
              "https://x-access-token:${FINE_GRAINED_PAT}@github.com/${REPO}.git" 2>/dev/null || true
            local SYNC_DIRS=(
              plugins/Essentials plugins/spark plugins/bStats
              plugins/CustomNPCs plugins/HeadDatabase
              plugins/Multiverse-Core plugins/TAB
              plugins/Chunky plugins/WorldManager
              plugins/LuckPerms plugins/PlaceholderAPI
            )
            for dir in "${SYNC_DIRS[@]}"; do
              [ -d "$dir" ] || continue
              find "$dir" -type f \
                \( -name "*.db" -o -name "*.csv" -o -name "*.json" \) \
                2>/dev/null | while IFS= read -r f; do
                  git add "$f" 2>/dev/null || true
                done
            done
            git add ops.json whitelist.json banned-players.json \
              banned-ips.json server.properties 2>/dev/null || true
            if ! git diff --cached --quiet 2>/dev/null; then
              local STAMP
              STAMP=$(date '+%Y-%m-%d %H:%M:%S')
              git commit -m "runtime-sync ${STAMP}" --no-verify 2>/dev/null \
                && git push origin HEAD:main --force 2>/dev/null \
                && log "[GIT] Push OK" \
                || log "[GIT] Push echoue"
            else
              log "[GIT] Rien a committer"
            fi
            rm -f "$LOCK_GIT"
          }

          monitor_loop() {
            local RAM_TOTAL_KB
            RAM_TOTAL_KB=$(awk '/MemTotal/{print $2}' /proc/meminfo)
            local RAM_TOTAL_MB=$(( RAM_TOTAL_KB / 1024 ))
            while true; do
              local L1 L2
              L1=$(grep '^cpu ' /proc/stat 2>/dev/null || echo "cpu 0 0 0 0 0 0 0")
              sleep 2
              L2=$(grep '^cpu ' /proc/stat 2>/dev/null || echo "cpu 0 0 0 0 0 0 0")
              local CPU
              CPU=$(awk -v l1="$L1" -v l2="$L2" 'BEGIN{
                n=split(l1,a," "); split(l2,b," ")
                id1=a[5]+0; id2=b[5]+0; t1=0; t2=0
                for(i=2;i<=n;i++){t1+=a[i]+0; t2+=b[i]+0}
                dt=t2-t1; di=id2-id1
                printf "%d",(dt>0)?100-int(di*100/dt):0
              }')
              local MF MU MP SW
              MF=$(awk '/MemAvailable/{print $2+0}' /proc/meminfo)
              MU=$(( (RAM_TOTAL_KB - MF) / 1024 ))
              MP=$(( (RAM_TOTAL_KB - MF) * 100 / RAM_TOTAL_KB ))
              SW=$(free -m 2>/dev/null | awk '/Swap/{print $3+0}')
              local DK
              DK=$(df -h . 2>/dev/null | awk 'NR==2{print $5}')
              local TP
              TP=$(grep -oP '(?<=TPS from last 1m, 5m, 15m: )[\d.]+' \
                "$MC_LOG_REL" 2>/dev/null | tail -1 || echo "N/A")
              [ -z "$TP" ] && TP="N/A"
              local ONL=0
              if [ -f "$EVENT_FILE" ]; then
                ONL=$(python3 -c "
          import json; players=set()
          try:
            with open('${EVENT_FILE}') as f:
              for line in f:
                try:
                  ev=json.loads(line.strip()); t=ev.get('type','')
                  if t=='join':    players.add(ev.get('player',''))
                  elif t=='quit':  players.discard(ev.get('player',''))
                  elif t=='start': players.clear()
                except: pass
          except: pass
          print(len(players))
          " 2>/dev/null || echo 0)
              fi
              printf 'TS=%s;CPU=%s%%;RAM=%sMB/%sMB(%s%%);SWAP=%sMB;DISK=%s;TPS=%s;ONL=%s\n' \
                "$(date '+%H:%M:%S')" "$CPU" "$MU" "$RAM_TOTAL_MB" \
                "$MP" "$SW" "$DK" "$TP" "$ONL" > "$STATS_FILE"
              sleep 8
            done
          }

          live_logs() {
            while [ ! -f "$MC_LOG_REL" ]; do sleep 1; done
            tail -f "$MC_LOG_REL" 2>/dev/null | while IFS= read -r L; do
              printf '[MC] %s\n' "$L"
            done
          }

          show_stats() {
            [ -f "$STATS_FILE" ] || return 0
            local D
            D=$(cat "$STATS_FILE")
            printf '[STATS] CPU=%-5s RAM=%-22s TPS=%-6s ONL=%s UPTIME=%smin\n' \
              "$(echo "$D" | grep -oP 'CPU=\K[^;]+')" \
              "$(echo "$D" | grep -oP 'RAM=\K[^;]+')" \
              "$(echo "$D" | grep -oP 'TPS=\K[^;]+')" \
              "$(echo "$D" | grep -oP 'ONL=\K[^;]+')" \
              "$(( ($(date +%s) - T_START) / 60 ))"
          }

          warn_restart() {
            mc_cmd "say §6§l[Serveur] §cRedemarrage automatique dans 60 secondes !"
            webhook_send ":warning: Redemarrage dans 60s" &
            sleep 30
            mc_cmd "say §6§l[Serveur] §cRedemarrage dans 30 secondes !"
            sleep 20
            mc_cmd "say §6§l[Serveur] §cRedemarrage dans 10 secondes !"
            sleep 1
            for N in 9 8 7 6 5 4 3 2 1; do
              mc_cmd "say §c${N}..."
              sleep 1
            done
            mc_cmd "say §c§lRedemarrage !"
          }

          start_mc() {
            log "[MC] Demarrage JVM=${JVM} CPUs=${CPUS} GC=${GC_THREADS} REGION=${REGION_SIZE}M"
            rm -f "$MC_PID_FILE"
            tail -f "$MC_PIPE" 2>/dev/null | \
            "$JAVA" \
              -Xms${JVM} -Xmx${JVM} \
              -XX:+UseG1GC \
              -XX:+ParallelRefProcEnabled \
              -XX:MaxGCPauseMillis=150 \
              -XX:+UnlockExperimentalVMOptions \
              -XX:+UnlockDiagnosticVMOptions \
              -XX:+DisableExplicitGC \
              -XX:+AlwaysPreTouch \
              -XX:G1NewSizePercent=28 \
              -XX:G1MaxNewSizePercent=40 \
              -XX:G1HeapRegionSize=${REGION_SIZE}M \
              -XX:G1ReservePercent=20 \
              -XX:G1HeapWastePercent=5 \
              -XX:G1MixedGCCountTarget=8 \
              -XX:InitiatingHeapOccupancyPercent=10 \
              -XX:G1MixedGCLiveThresholdPercent=85 \
              -XX:G1RSetUpdatingPauseTimePercent=5 \
              -XX:G1SATBBufferEnqueueingThresholdPercent=30 \
              -XX:G1ConcMarkStepDurationMillis=5 \
              -XX:SurvivorRatio=32 \
              -XX:MaxTenuringThreshold=1 \
              -XX:+PerfDisableSharedMem \
              -XX:ConcGCThreads=${GC_THREADS} \
              -XX:ParallelGCThreads=${GC_THREADS} \
              -XX:+UseStringDeduplication \
              -XX:StringDeduplicationAgeThreshold=3 \
              -XX:ReservedCodeCacheSize=512m \
              -XX:NonNMethodCodeHeapSize=12m \
              -XX:ProfiledCodeHeapSize=256m \
              -XX:NonProfiledCodeHeapSize=244m \
              -XX:+SegmentedCodeCache \
              -XX:+OptimizeStringConcat \
              -XX:+UseCompressedOops \
              -XX:+UseCompressedClassPointers \
              -XX:CompressedClassSpaceSize=512m \
              -XX:+HeapDumpOnOutOfMemoryError \
              -XX:HeapDumpPath=/tmp/mc-oom-$$.hprof \
              -XX:+ExitOnOutOfMemoryError \
              -Dpaper.watchdog.earlyWarningDelay=300000 \
              -Dpaper.watchdog.earlyWarningEvery=60000 \
              -Dpaper.maxChunkThreads=${CPUS} \
              -Dpaper.log-level=INFO \
              -DPaper.WorkerThreadCount=${ASYNC_THREADS} \
              -Djava.net.preferIPv4Stack=true \
              -Dfile.encoding=UTF-8 \
              -Duser.timezone=UTC \
              -Daikars.new.flags=true \
              -Djava.util.concurrent.ForkJoinPool.common.parallelism=${CPUS} \
              -jar server.jar nogui \
              >> "$MC_LOG_REL" 2>&1 &
            local PID=$!
            echo "$PID" > "$MC_PID_FILE"
            MC_PID=$PID
            log "[MC] PID=${MC_PID}"
          }

          graceful_shutdown() {
            local REASON="${1:-manual}"
            log "[SHUTDOWN] Arret propre (${REASON})..."
            webhook_send ":white_check_mark: Serveur arrete: ${REASON}" &
            backup "shutdown-${REASON}" "1" &
            local BP=$!
            git_sync &
            local GP=$!
            push_gist "offline" &
            wait $BP $GP 2>/dev/null || true
            emit_event '{"type":"stop"}'
            for PID in "$MONITOR_PID" "$LIVE_PID" "$WATCHER_PID" "$BOT_PID"; do
              [ "$PID" -gt 0 ] && kill "$PID" 2>/dev/null || true
            done
            echo "GRACEFUL" > "$STOPPED_CLEANLY"
            sleep 5
            gh_cancel
            sleep 3
            exit 0
          }

          rm -f "$MC_PIPE" "$STOPPED_CLEANLY" "$LOCK_BACKUP" "$LOCK_GIT" "$MC_PID_FILE"
          mkfifo "$MC_PIPE"
          > "$MC_LOG_REL"
          touch "$WORLD_REF" "$EVENT_FILE"

          if [ -f discord_bot/bot.py ]; then
            log "[BOT] Demarrage..."
            python3 discord_bot/bot.py > /tmp/bot.log 2>&1 &
            BOT_PID=$!
            log "[BOT] PID=${BOT_PID}"
            for i in $(seq 1 15); do
              sleep 1
              if grep -q "Connecte:" /tmp/bot.log 2>/dev/null; then
                log "[BOT] Connecte en ${i}s"
                break
              fi
              if ! kill -0 "$BOT_PID" 2>/dev/null; then
                log "[BOT] Mort au demarrage — erreur:"
                tail -10 /tmp/bot.log 2>/dev/null || true
                BOT_PID=0
                break
              fi
            done
          fi

          start_mc
          webhook_send ":rocket: Serveur demarre (JVM=${JVM} CPUs=${CPUS})" &

          MC_READY=0
          for i in $(seq 1 240); do
            sleep 2
            if grep -q "Done" "$MC_LOG_REL" 2>/dev/null; then
              log "[MC] Pret en $(( i * 2 ))s"
              MC_READY=1
              webhook_send ":white_check_mark: Serveur pret en $(( i * 2 ))s" &
              break
            fi
            if ! mc_alive; then
              log "[MC] Mort pendant le demarrage ($(( i * 2 ))s)"
              tail -20 "$MC_LOG_REL" 2>/dev/null || true
              break
            fi
            [ $(( i % 30 )) -eq 0 ] && log "[MC] Demarrage... $(( i * 2 ))s"
          done

          monitor_loop & MONITOR_PID=$!
          live_logs    & LIVE_PID=$!

          if [ -f discord_bot/discord_watcher.py ]; then
            MC_EVENT_FILE="$EVENT_FILE" \
              python3 discord_bot/discord_watcher.py "$MC_LOG_ABS" \
              >> /tmp/watcher.log 2>&1 &
            WATCHER_PID=$!
          fi

          emit_event "{\"type\":\"start\",\"jvm\":\"${JVM}\",\"cpus\":\"${CPUS}\"}"
          push_gist "online" &

          log "[MAIN] Boucle principale"

          while true; do
            sleep 20
            LOOP=$(( LOOP + 1 ))
            NOW=$(date +%s)
            ELAPSED=$(( NOW - T_START ))
            ELAPSED_MIN=$(( ELAPSED / 60 ))

            [ $(( LOOP % 9 )) -eq 0 ] && show_stats

            if [ $(( NOW - T_GIST )) -ge 15 ]; then
              push_gist "online" &
              T_GIST=$NOW
            fi

            if [ "$BOT_PID" -gt 0 ] && ! kill -0 "$BOT_PID" 2>/dev/null; then
              BOT_RESTARTS=$(( BOT_RESTARTS + 1 ))
              log "[BOT] Relance #${BOT_RESTARTS}"
              python3 discord_bot/bot.py >> /tmp/bot.log 2>&1 &
              BOT_PID=$!
            fi

            if [ "$WATCHER_PID" -gt 0 ] && ! kill -0 "$WATCHER_PID" 2>/dev/null; then
              WATCHER_RESTARTS=$(( WATCHER_RESTARTS + 1 ))
              log "[WATCHER] Relance #${WATCHER_RESTARTS}"
              MC_EVENT_FILE="$EVENT_FILE" \
                python3 discord_bot/discord_watcher.py "$MC_LOG_ABS" \
                >> /tmp/watcher.log 2>&1 &
              WATCHER_PID=$!
            fi

            if ! kill -0 "$MONITOR_PID" 2>/dev/null; then
              log "[MONITOR] Relance..."
              monitor_loop & MONITOR_PID=$!
            fi

            if [ $(( NOW - T_BACKUP )) -ge 300 ]; then
              backup "periodic" "0" &
              T_BACKUP=$NOW
            fi

            if [ $(( NOW - T_GIT )) -ge 900 ]; then
              git_sync &
              T_GIT=$NOW
            fi

            if [ "$ELAPSED" -ge 20220 ] && [ "$WARNED" -eq 0 ]; then
              WARNED=1
              warn_restart &
            fi

            if ! mc_alive; then
              if was_graceful; then
                log "[MC] Arret propre detecte"
                show_stats
                graceful_shutdown "stop-command"
              else
                CRASHES=$(( CRASHES + 1 ))
                log "[MC] CRASH #${CRASHES}"
                show_stats
                CRASH_CAUSE="Inconnue"
                grep -qiE "OutOfMemoryError"   "$MC_LOG_REL" 2>/dev/null && CRASH_CAUSE="OOM"
                grep -qiE "StackOverflowError" "$MC_LOG_REL" 2>/dev/null && CRASH_CAUSE="StackOverflow"
                grep -qiE "Watchdog"           "$MC_LOG_REL" 2>/dev/null && CRASH_CAUSE="Watchdog"
                grep -qiE "java.lang.Error"    "$MC_LOG_REL" 2>/dev/null && CRASH_CAUSE="JavaError"
                log "[MC] Cause: ${CRASH_CAUSE}"
                tail -20 "$MC_LOG_REL" 2>/dev/null || true
                emit_event "{\"type\":\"crash\",\"count\":${CRASHES},\"cause\":\"${CRASH_CAUSE}\"}"
                webhook_send ":skull: CRASH \#${CRASHES} — ${CRASH_CAUSE}" &
                push_gist "crash" &
                if [ "$CRASHES" -ge 5 ]; then
                  log "[MC] CRASH FATAL"
                  backup "crash-fatal" "1"
                  git_sync
                  emit_event '{"type":"crash_fatal"}'
                  webhook_send ":x: CRASH FATAL — 5 crashs" &
                  push_gist "offline" &
                  for PID in "$MONITOR_PID" "$LIVE_PID" "$WATCHER_PID" "$BOT_PID"; do
                    [ "$PID" -gt 0 ] && kill "$PID" 2>/dev/null || true
                  done
                  exit 1
                fi
                backup "pre-restart-${CRASHES}" "1"
                log "[MC] Redemarrage dans 10s..."
                sleep 10
                WARNED=0
                > "$MC_LOG_REL"
                start_mc
                T_START=$(date +%s)
              fi
            else
              CRASHES=0
            fi

            if [ "$ELAPSED" -ge 20400 ]; then
              log "[MAIN] Relance auto apres ${ELAPSED_MIN}min"
              emit_event "{\"type\":\"restart\",\"minutes\":\"${ELAPSED_MIN}\"}"
              webhook_send ":arrows_counterclockwise: Relance auto apres ${ELAPSED_MIN}min" &
              backup "pre-auto-restart" "1"
              git_sync
              push_gist "restarting" &
              sleep 3
              for PID in "$MONITOR_PID" "$LIVE_PID" "$WATCHER_PID" "$BOT_PID"; do
                [ "$PID" -gt 0 ] && kill "$PID" 2>/dev/null || true
              done
              gh_dispatch
              mc_cmd "say §c[Serveur] Redemarrage automatique dans 2min !"
              mc_cmd "stop"
              for i in $(seq 1 90); do
                sleep 1
                mc_alive || break
                [ $(( i % 15 )) -eq 0 ] && log "[MC] Attente arret ${i}s"
              done
              if mc_alive; then
                kill -9 "$(mc_get_pid)" 2>/dev/null || true
              fi
              log "[MAIN] Relance terminee"
              exit 0
            fi

          done

      - name: Backup final
        if: always()
        env:
          FINE_GRAINED_PAT: ${{ secrets.FINE_GRAINED_PAT }}
          REPO: ${{ github.repository }}
          STATS_GIST_ID: ${{ secrets.STATS_GIST_ID }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -uo pipefail

          if [ -n "${STATS_GIST_ID:-}" ]; then
            python3 - <<'PYEOF'
          import json, os, urllib.request, datetime
          gist_id = os.environ.get('STATS_GIST_ID','')
          pat     = os.environ.get('FINE_GRAINED_PAT','')
          if not gist_id or not pat: exit(0)
          payload = json.dumps({'files':{'mc-stats.json':{'content':json.dumps({
            'status':'offline',
            'updated':datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
            'players':[],'online':0,
          })}}}).encode()
          req = urllib.request.Request(
            f'https://api.github.com/gists/{gist_id}',
            data=payload, method='PATCH',
            headers={
              'Authorization':f'token {pat}',
              'Accept':'application/vnd.github.v3+json',
              'Content-Type':'application/json',
            }
          )
          try:
            urllib.request.urlopen(req, timeout=10)
            print('[GIST] Offline marque')
          except Exception as e:
            print(f'[GIST] {e}')
          PYEOF
          fi

          if [ -n "${DISCORD_WEBHOOK:-}" ]; then
            curl -sf -X POST "${DISCORD_WEBHOOK}" \
              -H "Content-Type: application/json" \
              -d '{"content":":zzz: Workflow termine — serveur offline"}' \
              >/dev/null 2>&1 || true
          fi

          if [ -f /tmp/mc_stopped_cleanly ]; then
            echo "[BACKUP] Deja sauvegarde"
            rclone size rclone-mc:mc-backup/ 2>/dev/null || true
            exit 0
          fi

          BLACKLIST="plugins logs cache config libraries .git .paper-remapped crash-reports debug discord_bot dashboard"
          WORLD_DIRS=""
          while IFS= read -r dir; do
            name="$(basename "$dir")"
            skip=0
            for bl in $BLACKLIST; do
              [ "$name" = "$bl" ] && skip=1 && break
            done
            [ "$skip" = "1" ] && continue
            [ -f "$dir/level.dat" ] || continue
            WORLD_DIRS="$WORLD_DIRS $name"
          done < <(find . -maxdepth 1 -mindepth 1 -type d 2>/dev/null)

          if [ -n "$WORLD_DIRS" ]; then
            echo "[WORLDS]${WORLD_DIRS}"
            tar -cf - \
              --exclude='*/session.lock' \
              --exclude='*/poi/*' \
              --exclude='level.dat_old' \
              --exclude='*.lck' \
              $WORLD_DIRS 2>/dev/null \
            | zstd -19 -T$(nproc) --long=27 -fo /tmp/worlds_final.tar.zst
            echo "[ARCHIVE] $(du -sh /tmp/worlds_final.tar.zst | cut -f1)"
            rclone copyto /tmp/worlds_final.tar.zst \
              rclone-mc:mc-backup/worlds.tar.zst \
              --transfers=16 --multi-thread-streams=16 \
              --multi-thread-cutoff=10M \
              --buffer-size=512M --retries=5 --checksum \
              2>/dev/null \
              && echo "[UPLOAD] OK" \
              || echo "[UPLOAD] Echoue"
            rm -f /tmp/worlds_final.tar.zst
          else
            echo "[BACKUP] Aucun monde"
          fi

          rclone size rclone-mc:mc-backup/ 2>/dev/null || true
