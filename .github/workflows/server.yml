name: server

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - name: Force Java 21
        run: |
          sudo update-alternatives --set java /usr/lib/jvm/java-21-openjdk-amd64/bin/java
          java -version

      - name: Setup rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf
          cat ~/.config/rclone/rclone.conf

      - name: Restore world
        run: |
          rclone copy rclone-mc:mc-backup/world.tar.zst . --ignore-errors || true
          rclone copy rclone-mc:mc-backup/plugins.tar.zst . --ignore-errors || true
          [ -f world.tar.zst ] && tar --zstd -xf world.tar.zst && echo "World restored" || echo "Fresh start"
          [ -f plugins.tar.zst ] && tar --zstd -xf plugins.tar.zst && echo "Plugins restored" || true

      - name: Download Paper 1.21.10
        run: |
          wget -q -O server.jar \
            "https://api.papermc.io/v2/projects/paper/versions/1.21.10/builds/129/downloads/paper-1.21.10-129.jar"

      - name: Tunnel TCP via serveo
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=9999 \
              -R 0:localhost:25565 \
              serveo.net 2>&1 | tee tunnel.log &
          sleep 12
          cat tunnel.log
          IP=$(grep -oP 'Forwarding TCP connections from \K\S+' tunnel.log | head -1)
          echo "==============================="
          echo "  IP MINECRAFT : ${IP}"
          echo "==============================="

      - name: Start server
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          java \
            -Xms6G -Xmx6G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:+AlwaysPreTouch \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:G1HeapWastePercent=5 \
            -XX:G1MixedGCCountTarget=4 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:G1RSetUpdatingPauseTimePercent=5 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -Dusing.aikars.flags=https://mcflags.emc.gs \
            -Daikars.new.flags=true \
            -jar server.jar nogui

      - name: Backup
        if: always()
        run: |
          [ -d world ] && tar --zstd -cf world.tar.zst world/ && rclone copy world.tar.zst rclone-mc:mc-backup/ || true
          [ -d plugins ] && tar --zstd -cf plugins.tar.zst plugins/ && rclone copy plugins.tar.zst rclone-mc:mc-backup/ || true
          echo "Backup done"
