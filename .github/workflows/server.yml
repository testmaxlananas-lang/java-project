name: server

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - name: Java
        run: sudo apt-get install -y openjdk-21-jre-headless

      - name: Setup rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf

      - name: Restore world
        run: |
          rclone copy gdrive:mc-backup/world.tar.zst . --ignore-errors || true
          if [ -f world.tar.zst ]; then
            tar --zstd -xf world.tar.zst
            echo "World restored"
          else
            echo "No backup found, fresh start"
          fi

      - name: Download Paper
        run: |
          wget -q -O server.jar \
            "https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/latest/downloads/paper-1.21.4-latest.jar"

      - name: Install & start ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y ngrok
          ngrok authtoken ${{ secrets.NGROK_TOKEN }}
          ngrok tcp 25565 --log=stdout > ngrok.log &
          sleep 8
          # Affiche l'IP dans les logs
          curl -s http://localhost:4040/api/tunnels \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          addr = data['tunnels'][0]['public_url']
          print('=== TON IP MINECRAFT ===')
          print(addr.replace('tcp://', ''))
          print('========================')
          "

      - name: Start server
        run: |
          java -Xmx5G -Xms2G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -jar server.jar nogui

      - name: Backup world
        if: always()
        run: |
          if [ -d world ]; then
            tar --zstd -cf world.tar.zst world/
            rclone copy world.tar.zst gdrive:mc-backup/
            echo "Backup done"
          fi
