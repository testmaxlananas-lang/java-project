name: server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.FINE_GRAINED_PAT }}

      - name: Setup
        run: |
          sudo ln -sf /bin/true /usr/bin/mandb
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo systemctl disable unattended-upgrades 2>/dev/null || true

          # rclone
          curl -fsSL "https://downloads.rclone.org/rclone-current-linux-amd64.zip" \
            -o /tmp/rclone.zip
          unzip -jo /tmp/rclone.zip "*/rclone" -d /tmp/
          sudo mv /tmp/rclone /usr/local/bin/rclone
          sudo chmod +x /usr/local/bin/rclone
          rm /tmp/rclone.zip

          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

          # Tuning OS
          sudo sysctl -w \
            net.core.rmem_max=134217728 \
            net.core.wmem_max=134217728 \
            net.ipv4.tcp_rmem="4096 87380 134217728" \
            net.ipv4.tcp_wmem="4096 65536 134217728" \
            net.core.netdev_max_backlog=250000 \
            vm.swappiness=1 \
            vm.dirty_ratio=15 \
            vm.dirty_background_ratio=5 2>/dev/null || true

          # Swap
          if ! swapon --show | grep -q /swapfile; then
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 4G /swapfile 2>/dev/null \
                || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=none
            fi
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile 2>/dev/null || true
            sudo swapon /swapfile 2>/dev/null || true
            echo "Swap 4G activé ✓"
          else
            echo "Swap déjà actif ✓"
          fi

          # Dépendances monitoring
          sudo apt-get install -y --quiet sysstat bc 2>/dev/null || true

      - name: Restore world + plugins + server.jar
        run: |
          rclone copy rclone-mc:mc-backup/world.tar.zst . \
            --transfers=8 --multi-thread-streams=8 \
            --buffer-size=256M --ignore-errors &
          PID_W=$!

          rclone copy rclone-mc:mc-backup/plugins.tar.zst . \
            --transfers=8 --multi-thread-streams=8 \
            --buffer-size=256M --ignore-errors &
          PID_P=$!

          rclone copy rclone-mc:mc-backup/server.jar . \
            --multi-thread-streams=4 --ignore-errors &
          PID_J=$!

          wait $PID_W $PID_P $PID_J

          if [ -f world.tar.zst ]; then
            zstd -d -T0 --stdout world.tar.zst | tar -x &
            PID_EW=$!
            echo "World : extraction..."
          else
            PID_EW=""
            echo "World : fresh start"
          fi

          if [ -f plugins.tar.zst ]; then
            zstd -d -T0 --stdout plugins.tar.zst | tar -x &
            PID_EP=$!
            echo "Plugins : extraction..."
          else
            PID_EP=""
            echo "Plugins : fresh start"
          fi

          [ -n "$PID_EW" ] && wait $PID_EW
          [ -n "$PID_EP" ] && wait $PID_EP
          echo "Restore terminé ✓"

      - name: Download Paper
        run: |
          if [ -f server.jar ]; then
            echo "server.jar depuis le cache ✓"
          else
            wget -q -O server.jar \
              "https://api.papermc.io/v2/projects/paper/versions/1.21.10/builds/129/downloads/paper-1.21.10-129.jar"
            rclone copy server.jar rclone-mc:mc-backup/ --ignore-errors &
            disown
          fi

      - name: Appliquer configs
        run: |
          if [ -f config/spigot.yml ]; then
            cp config/spigot.yml spigot.yml
            echo "spigot.yml → racine ✓"
          fi
          echo "server.properties : $([ -f server.properties ] && echo 'OK ✓' || echo 'absent')"
          echo "ops.json          : $([ -f ops.json ] && echo 'OK ✓' || echo 'absent')"
          echo "eula.txt          : $([ -f eula.txt ] && echo 'OK ✓' || echo 'absent')"

      - name: Générer configs FAWE + Paper anti-crash
        run: |
          # ── FAWE config : limits pour 100M+ blocs sans crash ──
          mkdir -p plugins/FastAsyncWorldEdit
          cat > plugins/FastAsyncWorldEdit/config.yml << 'EOF'
          enabled-components:
            commands: true
            default-locale: en
          queue:
            # Nombre de blocs traités par tick (élevé = plus rapide)
            target-size: 65536
            # Pas de limite sur les opérations
            parallel-threads: 8
            # Timeout très long pour les grosses opérations
            discard-after-ms: 600000
          history:
            # Désactiver l'historique pour les très grosses ops
            # (évite l'OOM sur 100M blocs)
            use-disk: true
            use-database: false
            max-changes-per-second: 0
          clipboard:
            use-disk: true
          lighting:
            async: true
            delay: 0
          limits:
            # Pas de limite de blocs
            max-actions: -1
            max-changes: -1
            max-fails: -1
            max-checks: -1
            max-iterations: -1
            max-blockstates: -1
            max-entities: -1
          EOF

          # ── Paper : désactiver le watchdog qui crash ──
          mkdir -p config
          # paper-global.yml : timeouts très longs
          if [ -f config/paper-global.yml ]; then
            # Patch watchdog timeout
            sed -i 's/watchdog-print-early-warning-delay:.*/watchdog-print-early-warning-delay: 60000/' \
              config/paper-global.yml 2>/dev/null || true
            sed -i 's/watchdog-print-early-warning-every:.*/watchdog-print-early-warning-every: 10000/' \
              config/paper-global.yml 2>/dev/null || true
          fi

          # ── spigot.yml : timeouts ──
          if [ -f spigot.yml ]; then
            sed -i 's/timeout-time:.*/timeout-time: 120/' spigot.yml 2>/dev/null || true
            sed -i 's/restart-on-crash:.*/restart-on-crash: false/' spigot.yml 2>/dev/null || true
          fi

          # ── server.properties : optimisé build ──
          if [ -f server.properties ]; then
            sed -i 's/^view-distance=.*/view-distance=10/'           server.properties
            sed -i 's/^simulation-distance=.*/simulation-distance=6/' server.properties
            sed -i 's/^max-tick-time=.*/max-tick-time=-1/'           server.properties
            sed -i 's/^sync-chunk-writes=.*/sync-chunk-writes=false/' server.properties
          fi

          echo "Configs anti-crash appliquées ✓"

      - name: Start playit
        run: |
          chmod +x ./playit-linux-amd64
          printf '%s' '${{ secrets.PLAYIT_SECRET }}' > playit.toml

          RUST_LOG=warn ./playit-linux-amd64 --secret_path playit.toml \
            > playit.log 2>&1 &
          PLAYIT_PID=$!

          for i in $(seq 1 30); do
            sleep 1
            if grep -qiE "connected|tunnel|ready|online|agent" playit.log 2>/dev/null; then
              echo "Playit prêt en ${i}s ✓"
              break
            fi
            if ! kill -0 $PLAYIT_PID 2>/dev/null; then
              echo "[WARN] Playit mort"
              cat playit.log
              break
            fi
          done

          echo "=== PLAYIT LOG ==="
          cat playit.log

      - name: Start server + watchdog + monitoring
        env:
          FINE_GRAINED_PAT: ${{ secrets.FINE_GRAINED_PAT }}
          REPO: ${{ github.repository }}
        run: |
          REPO_DIR="/home/runner/work/java-project/java-project"
          MONITOR_LOG="$REPO_DIR/monitor.log"
          RAM_TOTAL=$(grep MemTotal /proc/meminfo | awk '{print $2}')

          # ══════════════════════════════════════
          # MONITORING EN TEMPS RÉEL
          # Écrit dans monitor.log toutes les 10s
          # ══════════════════════════════════════
          monitor_loop() {
            while true; do
              local NOW=$(date '+%H:%M:%S')
              local TIMESTAMP=$(date +%s)

              # RAM
              local MEM_FREE=$(grep MemAvailable /proc/meminfo | awk '{print $2}')
              local MEM_USED=$(( (RAM_TOTAL - MEM_FREE) / 1024 ))
              local MEM_TOTAL_MB=$(( RAM_TOTAL / 1024 ))
              local MEM_PCT=$(( (RAM_TOTAL - MEM_FREE) * 100 / RAM_TOTAL ))

              # CPU (1s sample)
              local CPU=$(top -bn1 | grep "Cpu(s)" | \
                awk '{print $2 + $4}' 2>/dev/null || echo "0")

              # JVM heap (via jcmd si dispo)
              local JVM_HEAP="N/A"
              if [ -n "$MC_PID_GLOBAL" ] && kill -0 $MC_PID_GLOBAL 2>/dev/null; then
                JVM_HEAP=$(jcmd $MC_PID_GLOBAL GC.heap_info 2>/dev/null | \
                  grep -oP 'used \K[0-9]+[KMG]' | head -1 || echo "N/A")
              fi

              # Disk
              local DISK=$(df -h . | tail -1 | awk '{print $5}')

              # TPS (depuis mc.log)
              local TPS=$(grep -oP 'TPS from last [^:]+: \K[\d.]+' mc.log 2>/dev/null | \
                tail -1 || echo "N/A")

              # Swap
              local SWAP_USED=$(free -m | grep Swap | awk '{print $3}')

              # Écriture dans le log
              echo "${TIMESTAMP}|${NOW}|CPU:${CPU}%|RAM:${MEM_USED}/${MEM_TOTAL_MB}MB(${MEM_PCT}%)|JVM:${JVM_HEAP}|TPS:${TPS}|DISK:${DISK}|SWAP:${SWAP_USED}MB" \
                >> "$MONITOR_LOG"

              # Alerte RAM critique (>90%)
              if [ "$MEM_PCT" -gt 90 ] 2>/dev/null; then
                echo "[⚠️  RAM CRITIQUE] ${MEM_USED}MB / ${MEM_TOTAL_MB}MB (${MEM_PCT}%)" \
                  | tee -a "$MONITOR_LOG"
              fi

              sleep 10
            done
          }

          # ══════════════════════════════════════
          # AFFICHAGE MONITORING (toutes les 2min)
          # ══════════════════════════════════════
          display_stats() {
            echo "╔══════════════════════════════════════════╗"
            echo "║           STATS SERVEUR MC               ║"
            echo "╠══════════════════════════════════════════╣"

            local LAST=$(tail -1 "$MONITOR_LOG" 2>/dev/null)
            if [ -n "$LAST" ]; then
              local TIME=$(echo "$LAST" | cut -d'|' -f2)
              local CPU=$(echo "$LAST" | cut -d'|' -f3)
              local RAM=$(echo "$LAST" | cut -d'|' -f4)
              local JVM=$(echo "$LAST" | cut -d'|' -f5)
              local TPS=$(echo "$LAST" | cut -d'|' -f6)
              local DISK=$(echo "$LAST" | cut -d'|' -f7)
              local SWAP=$(echo "$LAST" | cut -d'|' -f8)

              echo "║ 🕐 Heure    : $TIME"
              echo "║ 🖥️  CPU      : $CPU"
              echo "║ 🧠 RAM      : $RAM"
              echo "║ ☕ JVM Heap : $JVM"
              echo "║ ⚡ TPS      : $TPS"
              echo "║ 💾 Disque   : $DISK"
              echo "║ 🔄 Swap     : $SWAP"
            fi

            echo "╠══════════════════════════════════════════╣"
            echo "║ 📋 MC LOG (5 dernières lignes)           ║"
            echo "╠══════════════════════════════════════════╣"
            tail -5 mc.log 2>/dev/null | while IFS= read -r line; do
              echo "║ $line"
            done
            echo "╚══════════════════════════════════════════╝"
          }

          # ══════════════════════════════════════
          # BACKUP
          # ══════════════════════════════════════
          backup() {
            local LABEL="${1:-periodic}"
            echo "[BACKUP:$LABEL] Start..."
            local T0=$(date +%s)

            if [ -d world ]; then
              tar -cf - \
                --exclude='world/session.lock' \
                --exclude='world/poi' \
                world/ 2>/dev/null \
              | zstd -1 -T0 -fo world.tar.zst

              rclone copy world.tar.zst rclone-mc:mc-backup/ \
                --transfers=8 --multi-thread-streams=8 \
                --buffer-size=256M --ignore-errors &
              local UP_W=$!
            fi

            if [ -d plugins ]; then
              local CHANGED=0
              if [ -f plugins.tar.zst ]; then
                CHANGED=$(find plugins -maxdepth 1 -name "*.jar" \
                  -newer plugins.tar.zst 2>/dev/null | wc -l)
              else
                CHANGED=1
              fi

              if [ "$CHANGED" -gt 0 ]; then
                find plugins -maxdepth 1 -name "*.jar" -print0 \
                  | tar -cf - --null -T - 2>/dev/null \
                  | zstd -3 -T0 -fo plugins.tar.zst
                rclone copy plugins.tar.zst rclone-mc:mc-backup/ \
                  --transfers=4 --multi-thread-streams=4 \
                  --buffer-size=128M --ignore-errors &
                local UP_P=$!
              fi
            fi

            wait ${UP_W:-} ${UP_P:-} 2>/dev/null
            echo "[BACKUP:$LABEL] Done en $(( $(date +%s) - T0 ))s ✓"
          }

          # ══════════════════════════════════════
          # COMMIT CONFIGS
          # ══════════════════════════════════════
          commit_configs() {
            echo "[GIT] Sync configs..."
            cd "$REPO_DIR"
            git config user.name  "MC Server Bot"
            git config user.email "bot@mc-server.local"

            find plugins -mindepth 2 -type f \
              \( -name "*.yml" -o -name "*.yaml" \
              -o -name "*.json" -o -name "*.conf" \
              -o -name "*.properties" -o -name "*.toml" \) \
              ! -name "plugin.yml" ! -name "plugin.yaml" \
              2>/dev/null | while IFS= read -r f; do
                git add "$f" 2>/dev/null || true
              done

            git add config/ server.properties ops.json 2>/dev/null || true

            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "🔧 [bot] sync configs $(date '+%H:%M:%S')" \
                --no-verify 2>/dev/null \
              && git push \
                "https://x-access-token:$FINE_GRAINED_PAT@github.com/$REPO.git" \
                HEAD:main 2>/dev/null \
              && echo "[GIT] Push ✓" \
              || echo "[GIT] Push échoué (ignoré)"
            else
              echo "[GIT] Rien à committer"
            fi
          }

          # ══════════════════════════════════════
          # START MC — FLAGS OPTIMISÉS FAWE/BUILD
          # ══════════════════════════════════════
          start_mc() {
            /usr/lib/jvm/temurin-21-jdk-amd64/bin/java \
              \
              -Xms13G -Xmx13G \
              \
              `# ── GC G1 Aikars ──` \
              -XX:+UseG1GC \
              -XX:+ParallelRefProcEnabled \
              -XX:MaxGCPauseMillis=200 \
              -XX:+UnlockExperimentalVMOptions \
              -XX:+DisableExplicitGC \
              -XX:+AlwaysPreTouch \
              -XX:G1NewSizePercent=30 \
              -XX:G1MaxNewSizePercent=40 \
              -XX:G1HeapRegionSize=8M \
              -XX:G1ReservePercent=20 \
              -XX:G1HeapWastePercent=5 \
              -XX:G1MixedGCCountTarget=4 \
              -XX:InitiatingHeapOccupancyPercent=15 \
              -XX:G1MixedGCLiveThresholdPercent=90 \
              -XX:G1RSetUpdatingPauseTimePercent=5 \
              -XX:SurvivorRatio=32 \
              -XX:MaxTenuringThreshold=1 \
              -XX:+PerfDisableSharedMem \
              \
              `# ── Threads ──` \
              -XX:ConcGCThreads=4 \
              -XX:ParallelGCThreads=8 \
              \
              `# ── Optimisations JVM ──` \
              -XX:+UseStringDeduplication \
              -XX:+OptimizeStringConcat \
              -XX:+UseCompressedOops \
              -XX:+UseCompressedClassPointers \
              -XX:ReservedCodeCacheSize=512m \
              -XX:+UseCodeCacheFlushing \
              \
              `# ── Anti-OOM pour FAWE 100M+ blocs ──` \
              -XX:+HeapDumpOnOutOfMemoryError \
              -XX:HeapDumpPath=/tmp/mc-oom.hprof \
              -XX:+ExitOnOutOfMemoryError \
              -XX:OnOutOfMemoryError="echo OOM_DETECTED" \
              \
              `# ── Watchdog Paper étendu ──` \
              -Dpaper.watchdog.earlyWarningDelay=60000 \
              -Dpaper.watchdog.earlyWarningEvery=10000 \
              \
              `# ── FAWE async ──` \
              -Dcom.sk89q.worldedit.bukkit.AsyncChunkCompleteEvent=true \
              \
              `# ── Divers ──` \
              -Djava.net.preferIPv4Stack=true \
              -Dfile.encoding=UTF-8 \
              -Dusing.aikars.flags=https://mcflags.emc.gs \
              -Daikars.new.flags=true \
              \
              -jar server.jar nogui \
              > mc.log 2>&1 &
            echo $!
          }

          # ══════════════════════════════════════
          # BOUCLE PRINCIPALE
          # ══════════════════════════════════════
          MC_PID=$(start_mc)
          MC_PID_GLOBAL=$MC_PID
          export MC_PID_GLOBAL

          START_TIME=$(date +%s)
          LAST_BACKUP=$(date +%s)
          LAST_CONFIG_COMMIT=$(date +%s)
          CRASH_COUNT=0
          LOOP=0

          echo "MC démarré (PID=$MC_PID) ✓"
          echo "" > "$MONITOR_LOG"

          # Lancer le monitoring en arrière-plan
          monitor_loop &
          MONITOR_PID=$!
          echo "Monitoring démarré (PID=$MONITOR_PID) ✓"

          while true; do
            sleep 20
            LOOP=$((LOOP + 1))
            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))
            SINCE_BACKUP=$((NOW - LAST_BACKUP))
            SINCE_CONFIG=$((NOW - LAST_CONFIG_COMMIT))

            # Stats toutes les 2min (6 loops × 20s)
            if [ $((LOOP % 6)) -eq 0 ]; then
              display_stats
            fi

            # Backup toutes les 5min
            if [ $SINCE_BACKUP -ge 300 ]; then
              backup "periodic"
              LAST_BACKUP=$(date +%s)
            fi

            # Commit configs toutes les 15min
            if [ $SINCE_CONFIG -ge 900 ]; then
              commit_configs
              LAST_CONFIG_COMMIT=$(date +%s)
            fi

            # Watchdog
            if ! kill -0 $MC_PID 2>/dev/null; then
              CRASH_COUNT=$((CRASH_COUNT + 1))
              echo "════════════════════════════════════"
              echo "⚠️  CRASH #$CRASH_COUNT DÉTECTÉ"
              echo "════════════════════════════════════"

              # Afficher les stats au moment du crash
              display_stats

              echo "=== DERNIÈRES LIGNES MC LOG ==="
              tail -50 mc.log 2>/dev/null || true

              # OOM détecté ?
              if grep -q "OutOfMemoryError\|OOM_DETECTED" mc.log 2>/dev/null; then
                echo "💀 CAUSE : OutOfMemoryError (OOM)"
                echo "→ La commande dépassait la RAM disponible"
              fi

              if [ $CRASH_COUNT -ge 5 ]; then
                echo "[ERROR] 5 crashs consécutifs, abandon"
                backup "crash-final"
                kill $MONITOR_PID 2>/dev/null
                exit 1
              fi

              sleep 5
              MC_PID=$(start_mc)
              MC_PID_GLOBAL=$MC_PID
              echo "Redémarré PID=$MC_PID"
            else
              CRASH_COUNT=0
            fi

            # Relance avant limite
            if [ $ELAPSED -ge 20400 ]; then
              echo "[INFO] Relance workflow ($(( ELAPSED/60 ))min)..."
              backup "pre-restart"
              commit_configs
              kill $MONITOR_PID 2>/dev/null

              curl -s -X POST \
                -H "Authorization: token $FINE_GRAINED_PAT" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/workflows/server.yml/dispatches" \
                -d '{"ref":"main"}'

              sleep 10
              kill $MC_PID 2>/dev/null || true
              exit 0
            fi
          done

      - name: Backup final
        if: always()
        run: |
          echo "[BACKUP FINAL] Démarrage..."

          if [ -d world ]; then
            tar -cf - \
              --exclude='world/session.lock' \
              world/ 2>/dev/null \
            | zstd -1 -T0 -fo world.tar.zst
            rclone copy world.tar.zst rclone-mc:mc-backup/ \
              --transfers=8 --multi-thread-streams=8 \
              --buffer-size=256M --ignore-errors &
            PID_W=$!
          fi

          if [ -d plugins ]; then
            find plugins -maxdepth 1 -name "*.jar" -print0 \
              | tar -cf - --null -T - 2>/dev/null \
              | zstd -3 -T0 -fo plugins.tar.zst
            rclone copy plugins.tar.zst rclone-mc:mc-backup/ \
              --transfers=4 --multi-thread-streams=4 \
              --ignore-errors &
            PID_P=$!
          fi

          wait ${PID_W:-} ${PID_P:-} 2>/dev/null
          echo "Backup final Done ✓"
