name: server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.FINE_GRAINED_PAT }}

      - name: Setup
        run: |
          sudo apt-get install -y zstd pigz --quiet
          curl -s https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Restore world + plugins
        run: |
          rclone copy rclone-mc:mc-backup/world.tar.zst . --ignore-errors || true
          rclone copy rclone-mc:mc-backup/plugins.tar.zst . --ignore-errors || true
          [ -f world.tar.zst ] && tar --use-compress-program="zstd -d" -xf world.tar.zst && echo "World restored" || echo "Fresh start"
          [ -f plugins.tar.zst ] && tar --use-compress-program="zstd -d" -xf plugins.tar.zst && echo "Plugins restored" || true

      - name: Download Paper 1.21.10
        run: |
          wget -q -O server.jar \
            "https://api.papermc.io/v2/projects/paper/versions/1.21.10/builds/129/downloads/paper-1.21.10-129.jar"

      - name: Start playit
        run: |
          chmod +x ./playit-linux-amd64
          printf '%s' '${{ secrets.PLAYIT_SECRET }}' > playit.toml
          RUST_LOG=info ./playit-linux-amd64 --secret_path playit.toml \
            2>&1 | tee playit.log &
          sleep 25
          echo "=== PLAYIT ==="
          cat playit.log
          echo "IP dispo sur dashboard.playit.gg"

      - name: Start server + loop
        env:
          FINE_GRAINED_PAT: ${{ secrets.FINE_GRAINED_PAT }}
          REPO: ${{ github.repository }}
        run: |
          backup() {
            echo "[BACKUP] Compression zstd niveau 19..."
            if [ -d world ]; then
              tar --use-compress-program="zstd -19 -T0" -cf world.tar.zst \
                --exclude='world/session.lock' world/ 2>/dev/null
              rclone copy world.tar.zst rclone-mc:mc-backup/ \
                --transfers=4 --ignore-errors || true
            fi
            if [ -d plugins ]; then
              tar --use-compress-program="zstd -19 -T0" -cf plugins.tar.zst \
                plugins/ 2>/dev/null
              rclone copy plugins.tar.zst rclone-mc:mc-backup/ \
                --transfers=4 --ignore-errors || true
            fi
            echo "[BACKUP] Done"
          }

          start_mc() {
            /usr/lib/jvm/temurin-21-jdk-amd64/bin/java \
              -Xms6G -Xmx6G \
              -XX:+UseG1GC \
              -XX:+ParallelRefProcEnabled \
              -XX:MaxGCPauseMillis=200 \
              -XX:+UnlockExperimentalVMOptions \
              -XX:+DisableExplicitGC \
              -XX:+AlwaysPreTouch \
              -XX:G1NewSizePercent=30 \
              -XX:G1MaxNewSizePercent=40 \
              -XX:G1HeapRegionSize=8M \
              -XX:G1ReservePercent=20 \
              -XX:G1HeapWastePercent=5 \
              -XX:G1MixedGCCountTarget=4 \
              -XX:InitiatingHeapOccupancyPercent=15 \
              -XX:G1MixedGCLiveThresholdPercent=90 \
              -XX:G1RSetUpdatingPauseTimePercent=5 \
              -XX:SurvivorRatio=32 \
              -XX:+PerfDisableSharedMem \
              -XX:MaxTenuringThreshold=1 \
              -Dusing.aikars.flags=https://mcflags.emc.gs \
              -Daikars.new.flags=true \
              -jar server.jar nogui &
            echo $!
          }

          MC_PID=$(start_mc)
          START_TIME=$(date +%s)
          LAST_BACKUP=0

          while true; do
            sleep 30
            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))
            SINCE_BACKUP=$((NOW - LAST_BACKUP))

            # Backup toutes les 5 minutes
            if [ $SINCE_BACKUP -ge 300 ]; then
              backup
              LAST_BACKUP=$(date +%s)
            fi

            # Redémarre si crash
            if ! kill -0 $MC_PID 2>/dev/null; then
              echo "[WARN] Serveur crash, redémarrage..."
              MC_PID=$(start_mc)
            fi

            # Relance le workflow 10min avant limite
            if [ $ELAPSED -ge 18600 ]; then
              echo "[INFO] Relance workflow..."
              backup
              curl -s -X POST \
                -H "Authorization: token $FINE_GRAINED_PAT" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/workflows/server.yml/dispatches" \
                -d '{"ref":"main"}'
              sleep 10
              kill $MC_PID 2>/dev/null
              exit 0
            fi
          done

      - name: Backup final
        if: always()
        run: |
          [ -d world ] && tar --use-compress-program="zstd -19 -T0" -cf world.tar.zst \
            --exclude='world/session.lock' world/ && \
            rclone copy world.tar.zst rclone-mc:mc-backup/ || true
          [ -d plugins ] && tar --use-compress-program="zstd -19 -T0" -cf plugins.tar.zst \
            plugins/ && rclone copy plugins.tar.zst rclone-mc:mc-backup/ || true
          echo "Done"
