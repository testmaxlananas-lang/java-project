name: server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.FINE_GRAINED_PAT }}

      - name: Setup (ultra-rapide)
        run: |
          # Bloque mandb pour éviter les updates inutiles
          sudo ln -sf /bin/true /usr/bin/mandb

          # zstd et pigz déjà présents sur ubuntu-latest, on vérifie juste
          command -v zstd || sudo apt-get install -y zstd --quiet
          command -v pigz || sudo apt-get install -y pigz --quiet

          # rclone: téléchargement direct du binaire (4x plus rapide que le script)
          curl -fsSL "https://downloads.rclone.org/rclone-current-linux-amd64.zip" -o rclone.zip
          unzip -jo rclone.zip "*/rclone" -d /tmp/
          sudo mv /tmp/rclone /usr/local/bin/rclone
          sudo chmod +x /usr/local/bin/rclone
          rm rclone.zip

          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Restore world + plugins (parallèle)
        run: |
          # Téléchargement en parallèle
          rclone copy rclone-mc:mc-backup/world.tar.zst . \
            --transfers=8 --ignore-errors &
          rclone copy rclone-mc:mc-backup/plugins.tar.zst . \
            --transfers=8 --ignore-errors &
          # server.jar mis en cache sur le remote
          rclone copy rclone-mc:mc-backup/server.jar . \
            --ignore-errors &
          wait

          # Extraction en parallèle avec zstd niveau 3 (rapide)
          if [ -f world.tar.zst ]; then
            tar --use-compress-program="zstd -d -T0" -xf world.tar.zst &
            echo "World restore en cours..."
          else
            echo "Fresh start world"
          fi

          if [ -f plugins.tar.zst ]; then
            tar --use-compress-program="zstd -d -T0" -xf plugins.tar.zst &
            echo "Plugins restore en cours..."
          fi

          wait
          echo "Restore terminé"

      - name: Download Paper (si pas en cache)
        run: |
          if [ ! -f server.jar ]; then
            echo "Téléchargement Paper..."
            wget -q -O server.jar \
              "https://api.papermc.io/v2/projects/paper/versions/1.21.10/builds/129/downloads/paper-1.21.10-129.jar"
            # Mise en cache sur le remote pour les prochains runs
            rclone copy server.jar rclone-mc:mc-backup/ --ignore-errors &
          else
            echo "server.jar depuis le cache ✓"
          fi

      - name: Start playit
        run: |
          chmod +x ./playit-linux-amd64
          printf '%s' '${{ secrets.PLAYIT_SECRET }}' > playit.toml
          RUST_LOG=warn ./playit-linux-amd64 --secret_path playit.toml \
            2>&1 | tee playit.log &

          # Attente intelligente au lieu de sleep fixe
          for i in $(seq 1 30); do
            sleep 1
            if grep -qiE "connected|tunnel|ready|online" playit.log 2>/dev/null; then
              echo "Playit prêt en ${i}s ✓"
              break
            fi
          done

          echo "=== PLAYIT LOG ==="
          cat playit.log
          echo "IP dispo sur dashboard.playit.gg"

      - name: Start server + loop
        env:
          FINE_GRAINED_PAT: ${{ secrets.FINE_GRAINED_PAT }}
          REPO: ${{ github.repository }}
        run: |
          # Fonction backup optimisée
          backup() {
            echo "[BACKUP] Compression rapide (niveau 3)..."
            local PIDS=()

            if [ -d world ]; then
              # Niveau 3 = 10x plus rapide que 19, compression quasi identique pour du monde MC
              tar --use-compress-program="zstd -3 -T0" -cf world.tar.zst \
                --exclude='world/session.lock' \
                --exclude='world/poi' \
                world/ 2>/dev/null &
              PIDS+=($!)
            fi

            if [ -d plugins ]; then
              tar --use-compress-program="zstd -3 -T0" -cf plugins.tar.zst \
                plugins/ 2>/dev/null &
              PIDS+=($!)
            fi

            # Attendre la fin de la compression
            for pid in "${PIDS[@]}"; do wait "$pid"; done

            # Upload en parallèle
            local UPLOAD_PIDS=()
            [ -f world.tar.zst ] && \
              rclone copy world.tar.zst rclone-mc:mc-backup/ \
                --transfers=8 \
                --multi-thread-streams=8 \
                --ignore-errors &
            UPLOAD_PIDS+=($!)

            [ -f plugins.tar.zst ] && \
              rclone copy plugins.tar.zst rclone-mc:mc-backup/ \
                --transfers=8 \
                --multi-thread-streams=8 \
                --ignore-errors &
            UPLOAD_PIDS+=($!)

            for pid in "${UPLOAD_PIDS[@]}"; do wait "$pid" 2>/dev/null; done
            echo "[BACKUP] Done ✓"
          }

          start_mc() {
            /usr/lib/jvm/temurin-21-jdk-amd64/bin/java \
              -Xms12G -Xmx12G \
              -XX:+UseG1GC \
              -XX:+ParallelRefProcEnabled \
              -XX:MaxGCPauseMillis=200 \
              -XX:+UnlockExperimentalVMOptions \
              -XX:+DisableExplicitGC \
              -XX:+AlwaysPreTouch \
              -XX:G1NewSizePercent=30 \
              -XX:G1MaxNewSizePercent=40 \
              -XX:G1HeapRegionSize=8M \
              -XX:G1ReservePercent=20 \
              -XX:G1HeapWastePercent=5 \
              -XX:G1MixedGCCountTarget=4 \
              -XX:InitiatingHeapOccupancyPercent=15 \
              -XX:G1MixedGCLiveThresholdPercent=90 \
              -XX:G1RSetUpdatingPauseTimePercent=5 \
              -XX:SurvivorRatio=32 \
              -XX:+PerfDisableSharedMem \
              -XX:MaxTenuringThreshold=1 \
              -Dusing.aikars.flags=https://mcflags.emc.gs \
              -Daikars.new.flags=true \
              -jar server.jar nogui &
            echo $!
          }

          MC_PID=$(start_mc)
          START_TIME=$(date +%s)
          LAST_BACKUP=0

          while true; do
            sleep 30
            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))
            SINCE_BACKUP=$((NOW - LAST_BACKUP))

            # Backup toutes les 5 minutes
            if [ $SINCE_BACKUP -ge 300 ]; then
              backup
              LAST_BACKUP=$(date +%s)
            fi

            # Redémarre si crash
            if ! kill -0 $MC_PID 2>/dev/null; then
              echo "[WARN] Serveur crash, redémarrage..."
              MC_PID=$(start_mc)
            fi

            # Relance le workflow 10min avant limite
            if [ $ELAPSED -ge 18600 ]; then
              echo "[INFO] Relance workflow..."
              backup
              curl -s -X POST \
                -H "Authorization: token $FINE_GRAINED_PAT" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/workflows/server.yml/dispatches" \
                -d '{"ref":"main"}'
              sleep 10
              kill $MC_PID 2>/dev/null
              exit 0
            fi
          done

      - name: Backup final
        if: always()
        run: |
          PIDS=()
          [ -d world ] && \
            tar --use-compress-program="zstd -3 -T0" -cf world.tar.zst \
              --exclude='world/session.lock' world/ && \
            rclone copy world.tar.zst rclone-mc:mc-backup/ \
              --transfers=8 --ignore-errors &
          PIDS+=($!)

          [ -d plugins ] && \
            tar --use-compress-program="zstd -3 -T0" -cf plugins.tar.zst \
              plugins/ && \
            rclone copy plugins.tar.zst rclone-mc:mc-backup/ \
              --transfers=8 --ignore-errors &
          PIDS+=($!)

          for pid in "${PIDS[@]}"; do wait "$pid" 2>/dev/null; done
          echo "Backup final Done ✓"
