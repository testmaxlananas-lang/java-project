name: server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.FINE_GRAINED_PAT }}

      - name: Setup
        run: |
          # Bloquer mandb
          sudo ln -sf /bin/true /usr/bin/mandb

          # Désactiver unattended-upgrades
          sudo systemctl stop unattended-upgrades 2>/dev/null || true
          sudo systemctl disable unattended-upgrades 2>/dev/null || true

          # rclone binaire direct
          curl -fsSL "https://downloads.rclone.org/rclone-current-linux-amd64.zip" \
            -o /tmp/rclone.zip
          unzip -jo /tmp/rclone.zip "*/rclone" -d /tmp/
          sudo mv /tmp/rclone /usr/local/bin/rclone
          sudo chmod +x /usr/local/bin/rclone
          rm /tmp/rclone.zip

          # Config rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

          # Tuning réseau/VM
          sudo sysctl -w \
            net.core.rmem_max=134217728 \
            net.core.wmem_max=134217728 \
            net.ipv4.tcp_rmem="4096 87380 134217728" \
            net.ipv4.tcp_wmem="4096 65536 134217728" \
            net.core.netdev_max_backlog=250000 \
            vm.swappiness=1 \
            vm.dirty_ratio=15 \
            vm.dirty_background_ratio=5 2>/dev/null || true

          # Swap 4G — vérifie si /swapfile existe déjà
          if ! swapon --show | grep -q /swapfile; then
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 4G /swapfile 2>/dev/null \
                || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=none
            fi
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile  2>/dev/null || true
            sudo swapon /swapfile  2>/dev/null || true
            echo "Swap activé ✓"
          else
            echo "Swap déjà actif ✓"
          fi

      # ──────────────────────────────────────────────────────────
      # RESTORE : world + plugins (drive) + configs (repo git)
      # Les plugins viennent du DRIVE (données runtime)
      # Les configs viennent du REPO (versionnées dans git)
      # ──────────────────────────────────────────────────────────
      - name: Restore world + plugins + server.jar
        run: |
          # Téléchargement simultané
          rclone copy rclone-mc:mc-backup/world.tar.zst . \
            --transfers=8 --multi-thread-streams=8 \
            --buffer-size=256M --ignore-errors &
          PID_W=$!

          rclone copy rclone-mc:mc-backup/plugins.tar.zst . \
            --transfers=8 --multi-thread-streams=8 \
            --buffer-size=256M --ignore-errors &
          PID_P=$!

          rclone copy rclone-mc:mc-backup/server.jar . \
            --multi-thread-streams=4 --ignore-errors &
          PID_J=$!

          wait $PID_W $PID_P $PID_J

          # Extraction parallèle
          if [ -f world.tar.zst ]; then
            zstd -d -T0 --stdout world.tar.zst | tar -x &
            PID_EW=$!
            echo "World : extraction..."
          else
            PID_EW=""
            echo "World : fresh start"
          fi

          if [ -f plugins.tar.zst ]; then
            zstd -d -T0 --stdout plugins.tar.zst | tar -x &
            PID_EP=$!
            echo "Plugins : extraction..."
          else
            PID_EP=""
            echo "Plugins : fresh start"
          fi

          [ -n "$PID_EW" ] && wait $PID_EW
          [ -n "$PID_EP" ] && wait $PID_EP
          echo "Restore terminé ✓"

      - name: Download Paper (cache drive)
        run: |
          if [ -f server.jar ]; then
            echo "server.jar depuis le cache ✓"
          else
            echo "Téléchargement Paper 1.21.10 build 129..."
            wget -q -O server.jar \
              "https://api.papermc.io/v2/projects/paper/versions/1.21.10/builds/129/downloads/paper-1.21.10-129.jar"
            rclone copy server.jar rclone-mc:mc-backup/ --ignore-errors &
            disown
          fi

      # ──────────────────────────────────────────────────────────
      # APPLICATION DES CONFIGS DEPUIS LE REPO
      # Structure attendue dans git :
      #
      #   config/
      #     paper-global.yml
      #     spigot.yml
      #   plugins/
      #     EssentialsX/       ← configs des plugins
      #       config.yml
      #     WorldEdit/
      #       config.yml
      #     ... etc
      #   server.properties
      #   ops.json
      #   eula.txt
      # ──────────────────────────────────────────────────────────
      - name: Appliquer configs du repo
        run: |
          # paper-global.yml et spigot.yml
          mkdir -p config
          if [ -f config/paper-global.yml ]; then
            cp config/paper-global.yml config/paper-global.yml
            echo "paper-global.yml appliqué ✓"
          fi
          if [ -f config/spigot.yml ]; then
            cp config/spigot.yml spigot.yml
            echo "spigot.yml appliqué ✓"
          fi

          # server.properties, ops.json, eula.txt
          # (déjà à la racine du repo = déjà à la racine du runner)
          echo "server.properties : $([ -f server.properties ] && echo 'OK ✓' || echo 'absent')"
          echo "ops.json          : $([ -f ops.json ] && echo 'OK ✓' || echo 'absent')"
          echo "eula.txt          : $([ -f eula.txt ] && echo 'OK ✓' || echo 'absent')"

          # Configs des plugins depuis le repo → écrase celles du drive
          # Le dossier plugins/PluginName/ dans git contient les .yml de config
          if [ -d plugins ]; then
            echo "Application des configs de plugins depuis le repo..."
            # On copie uniquement les .yml/.json/.conf (pas les .jar)
            find plugins -type f \
              \( -name "*.yml" -o -name "*.yaml" \
              -o -name "*.json" -o -name "*.conf" \
              -o -name "*.properties" -o -name "*.toml" \) \
            | while read -r cfg; do
                dest="$cfg"
                destdir=$(dirname "$dest")
                mkdir -p "$destdir"
                cp "$cfg" "$dest" 2>/dev/null || true
              done
            echo "Configs plugins appliquées ✓"
          fi

      - name: Start playit
        run: |
          chmod +x ./playit-linux-amd64
          printf '%s' '${{ secrets.PLAYIT_SECRET }}' > playit.toml

          RUST_LOG=warn ./playit-linux-amd64 --secret_path playit.toml \
            > playit.log 2>&1 &
          PLAYIT_PID=$!

          # Attente intelligente max 30s
          for i in $(seq 1 30); do
            sleep 1
            if grep -qiE "connected|tunnel|ready|online|agent" playit.log 2>/dev/null; then
              echo "Playit prêt en ${i}s ✓"
              break
            fi
            if ! kill -0 $PLAYIT_PID 2>/dev/null; then
              echo "[WARN] Playit mort"
              cat playit.log
              break
            fi
          done

          echo "=== PLAYIT LOG ==="
          cat playit.log
          echo "→ IP sur dashboard.playit.gg"

      - name: Start server + watchdog
        env:
          FINE_GRAINED_PAT: ${{ secrets.FINE_GRAINED_PAT }}
          REPO: ${{ github.repository }}
        run: |

          # ════════════════════════════════════════
          # BACKUP FUNCTION
          # World    → zstd -1  (vitesse max)
          # Plugins  → zstd -3  (seulement si .jar modifié)
          # Configs  → commitées dans git (pas dans le drive)
          # ════════════════════════════════════════
          backup() {
            local LABEL="${1:-periodic}"
            echo "[BACKUP:$LABEL] Start..."
            local T0=$(date +%s)

            # ── World (toujours) ──
            if [ -d world ]; then
              tar -cf - \
                --exclude='world/session.lock' \
                --exclude='world/poi' \
                world/ 2>/dev/null \
              | zstd -1 -T0 -fo world.tar.zst
              rclone copy world.tar.zst rclone-mc:mc-backup/ \
                --transfers=8 --multi-thread-streams=8 \
                --buffer-size=256M --ignore-errors &
              local UP_W=$!
            fi

            # ── Plugins (seulement si .jar changé) ──
            # Les configs plugins sont dans git, pas besoin de les sauver
            if [ -d plugins ]; then
              local CHANGED=$(find plugins -name "*.jar" \
                -newer plugins.tar.zst 2>/dev/null | wc -l)
              if [ "$CHANGED" -gt 0 ] || [ ! -f plugins.tar.zst ]; then
                echo "[BACKUP] Plugins modifiés, recompression..."
                # On sauvegarde UNIQUEMENT les .jar (les configs sont dans git)
                tar -cf - \
                  --include='plugins/*.jar' \
                  --exclude='plugins/*' \
                  plugins/*.jar 2>/dev/null \
                | zstd -3 -T0 -fo plugins.tar.zst
                rclone copy plugins.tar.zst rclone-mc:mc-backup/ \
                  --transfers=4 --multi-thread-streams=4 \
                  --buffer-size=128M --ignore-errors &
                local UP_P=$!
              else
                echo "[BACKUP] Plugins inchangés, skip ✓"
              fi
            fi

            wait ${UP_W:-} ${UP_P:-} 2>/dev/null
            local T1=$(date +%s)
            echo "[BACKUP:$LABEL] Done en $((T1-T0))s ✓"
          }

          # ════════════════════════════════════════
          # COMMIT CONFIGS VERS GIT
          # Sauvegarde les configs plugins dans le repo
          # pour pouvoir les modifier via GitHub/dashboard
          # ════════════════════════════════════════
          commit_configs() {
            echo "[GIT] Sauvegarde configs plugins..."
            cd /home/runner/work/java-project/java-project

            git config user.name  "MC Server Bot"
            git config user.email "bot@mc-server.local"

            # Copier configs générées par les plugins vers le repo
            if [ -d /home/runner/work/java-project/java-project/../../../ ]; then
              true
            fi

            local WORKDIR="/home/runner/work/java-project/java-project"
            local MCDIR="/home/runner/work/java-project/java-project"

            # Copie des configs .yml des plugins (pas les .jar)
            find "$MCDIR/plugins" -type f \
              \( -name "*.yml" -o -name "*.yaml" \
              -o -name "*.json" -o -name "*.conf" \
              -o -name "*.properties" -o -name "*.toml" \) \
              ! -name "plugin.yml" \
              ! -name "plugin.yaml" \
            2>/dev/null | while read -r f; do
              # Chemin relatif depuis le workdir
              rel="${f#$MCDIR/}"
              mkdir -p "$(dirname "$rel")"
              cp "$f" "$rel" 2>/dev/null || true
            done

            # Commit si changements
            git add plugins/ config/ server.properties ops.json 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit -m "🔧 [bot] sync configs $(date '+%H:%M')" \
                --no-verify 2>/dev/null
              git push \
                "https://x-access-token:$FINE_GRAINED_PAT@github.com/$REPO.git" \
                main 2>/dev/null \
                && echo "[GIT] Push configs ✓" \
                || echo "[GIT] Push échoué (ignoré)"
            else
              echo "[GIT] Aucune config modifiée"
            fi
          }

          # ════════════════════════════════════════
          # START MC
          # ════════════════════════════════════════
          start_mc() {
            /usr/lib/jvm/temurin-21-jdk-amd64/bin/java \
              -Xms13G -Xmx13G \
              -XX:+UseG1GC \
              -XX:+ParallelRefProcEnabled \
              -XX:MaxGCPauseMillis=200 \
              -XX:+UnlockExperimentalVMOptions \
              -XX:+DisableExplicitGC \
              -XX:+AlwaysPreTouch \
              -XX:G1NewSizePercent=30 \
              -XX:G1MaxNewSizePercent=40 \
              -XX:G1HeapRegionSize=8M \
              -XX:G1ReservePercent=20 \
              -XX:G1HeapWastePercent=5 \
              -XX:G1MixedGCCountTarget=4 \
              -XX:InitiatingHeapOccupancyPercent=15 \
              -XX:G1MixedGCLiveThresholdPercent=90 \
              -XX:G1RSetUpdatingPauseTimePercent=5 \
              -XX:SurvivorRatio=32 \
              -XX:MaxTenuringThreshold=1 \
              -XX:+PerfDisableSharedMem \
              -XX:+UseStringDeduplication \
              -XX:ConcGCThreads=4 \
              -XX:ParallelGCThreads=8 \
              -Djava.net.preferIPv4Stack=true \
              -Dfile.encoding=UTF-8 \
              -Dusing.aikars.flags=https://mcflags.emc.gs \
              -Daikars.new.flags=true \
              -jar server.jar nogui \
              > mc.log 2>&1 &
            echo $!
          }

          # ════════════════════════════════════════
          # BOUCLE PRINCIPALE
          # ════════════════════════════════════════
          MC_PID=$(start_mc)
          START_TIME=$(date +%s)
          LAST_BACKUP=$(date +%s)
          LAST_CONFIG_COMMIT=$(date +%s)
          CRASH_COUNT=0
          LOOP=0

          echo "MC démarré (PID=$MC_PID) ✓"

          while true; do
            sleep 20
            LOOP=$((LOOP + 1))
            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))
            SINCE_BACKUP=$((NOW - LAST_BACKUP))
            SINCE_CONFIG=$((NOW - LAST_CONFIG_COMMIT))

            # Log tail toutes les 5min
            if [ $((LOOP % 15)) -eq 0 ]; then
              echo "=== MC LOG [${ELAPSED}s] ==="
              tail -5 mc.log 2>/dev/null || true
            fi

            # Backup world toutes les 5min
            if [ $SINCE_BACKUP -ge 300 ]; then
              backup "periodic"
              LAST_BACKUP=$(date +%s)
            fi

            # Commit configs toutes les 15min
            if [ $SINCE_CONFIG -ge 900 ]; then
              commit_configs
              LAST_CONFIG_COMMIT=$(date +%s)
            fi

            # Watchdog crash
            if ! kill -0 $MC_PID 2>/dev/null; then
              CRASH_COUNT=$((CRASH_COUNT + 1))
              echo "[WARN] Crash #$CRASH_COUNT"
              tail -30 mc.log 2>/dev/null || true
              if [ $CRASH_COUNT -ge 5 ]; then
                echo "[ERROR] 5 crashs, abandon"
                backup "crash-final"
                exit 1
              fi
              sleep 5
              MC_PID=$(start_mc)
              echo "Redémarré PID=$MC_PID"
            else
              CRASH_COUNT=0
            fi

            # Relance 10min avant limite
            if [ $ELAPSED -ge 20400 ]; then
              echo "[INFO] Relance workflow (${ELAPSED}s)..."
              backup "pre-restart"
              commit_configs

              curl -s -X POST \
                -H "Authorization: token $FINE_GRAINED_PAT" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/workflows/server.yml/dispatches" \
                -d '{"ref":"main"}'

              sleep 10
              kill $MC_PID 2>/dev/null || true
              exit 0
            fi
          done

      - name: Backup final
        if: always()
        run: |
          echo "[BACKUP FINAL] Démarrage..."

          # World
          if [ -d world ]; then
            tar -cf - \
              --exclude='world/session.lock' \
              world/ 2>/dev/null \
            | zstd -1 -T0 -fo world.tar.zst
            rclone copy world.tar.zst rclone-mc:mc-backup/ \
              --transfers=8 --multi-thread-streams=8 \
              --buffer-size=256M --ignore-errors &
            PID_W=$!
          fi

          # Plugins (jars uniquement)
          if [ -d plugins ]; then
            tar -cf - plugins/*.jar 2>/dev/null \
            | zstd -3 -T0 -fo plugins.tar.zst
            rclone copy plugins.tar.zst rclone-mc:mc-backup/ \
              --transfers=4 --multi-thread-streams=4 \
              --ignore-errors &
            PID_P=$!
          fi

          wait ${PID_W:-} ${PID_P:-} 2>/dev/null
          echo "Backup final Done ✓"
