name: server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: minecraft-server
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.FINE_GRAINED_PAT }}

      - name: Snapshot repo
        run: |
          set -euo pipefail
          mkdir -p /tmp/repo-snapshot
          cp -r . /tmp/repo-snapshot/
          echo "Snapshot: $(find /tmp/repo-snapshot -type f | wc -l) fichiers"

      - name: Setup systeme
        run: |
          set -euo pipefail

          sudo systemctl stop unattended-upgrades apt-daily apt-daily-upgrade 2>/dev/null || true
          sudo systemctl disable unattended-upgrades apt-daily apt-daily-upgrade 2>/dev/null || true
          sudo pkill -f unattended-upgrades 2>/dev/null || true
          sudo ln -sf /bin/true /usr/bin/mandb 2>/dev/null || true

          curl -fsSL "https://downloads.rclone.org/rclone-current-linux-amd64.zip" -o /tmp/rclone.zip
          unzip -jo /tmp/rclone.zip "*/rclone" -d /tmp/
          sudo mv /tmp/rclone /usr/local/bin/rclone
          sudo chmod +x /usr/local/bin/rclone
          rm /tmp/rclone.zip

          mkdir -p ~/.config/rclone
          printf '%s' "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf

          sudo sysctl -w \
            net.core.rmem_max=134217728 \
            net.core.wmem_max=134217728 \
            net.core.rmem_default=262144 \
            net.core.wmem_default=262144 \
            net.core.netdev_max_backlog=250000 \
            net.ipv4.tcp_congestion_control=bbr \
            net.core.default_qdisc=fq \
            net.ipv4.tcp_fastopen=3 \
            net.ipv4.tcp_tw_reuse=1 \
            net.ipv4.tcp_fin_timeout=15 \
            net.ipv4.tcp_keepalive_time=300 \
            2>/dev/null || true

          sudo sysctl -w \
            vm.swappiness=1 \
            vm.dirty_ratio=80 \
            vm.dirty_background_ratio=5 \
            vm.dirty_expire_centisecs=3000 \
            vm.dirty_writeback_centisecs=500 \
            vm.vfs_cache_pressure=50 \
            vm.overcommit_memory=1 \
            vm.overcommit_ratio=95 \
            vm.max_map_count=2097152 \
            2>/dev/null || true

          sudo sysctl -w \
            kernel.sched_migration_cost_ns=5000000 \
            kernel.sched_autogroup_enabled=0 \
            kernel.pid_max=4194304 \
            kernel.numa_balancing=0 \
            2>/dev/null || true

          echo madvise | sudo tee \
            /sys/kernel/mm/transparent_hugepage/enabled >/dev/null 2>&1 || true
          echo defer+madvise | sudo tee \
            /sys/kernel/mm/transparent_hugepage/defrag >/dev/null 2>&1 || true
          echo 0 | sudo tee \
            /sys/kernel/mm/transparent_hugepage/khugepaged/defrag \
            >/dev/null 2>&1 || true

          for f in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
            [ -f "$f" ] && echo performance | sudo tee "$f" >/dev/null 2>&1 || true
          done

          for dev in /sys/block/sda /sys/block/sdb /sys/block/nvme0n1; do
            if [ -d "$dev" ]; then
              echo "none" | sudo tee "${dev}/queue/scheduler"     >/dev/null 2>&1 || true
              echo "8192" | sudo tee "${dev}/queue/read_ahead_kb" >/dev/null 2>&1 || true
              echo "0"    | sudo tee "${dev}/queue/rotational"    >/dev/null 2>&1 || true
              echo "256"  | sudo tee "${dev}/queue/nr_requests"   >/dev/null 2>&1 || true
            fi
          done

          ulimit -n 1048576 2>/dev/null || true
          ulimit -s unlimited 2>/dev/null || true

          if ! swapon --show | grep -q /swapfile 2>/dev/null; then
            sudo fallocate -l 8G /swapfile 2>/dev/null || \
              sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=none
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile >/dev/null 2>&1 || true
            sudo swapon /swapfile 2>/dev/null || true
            echo "Swap 8G active"
          fi

          JAVA_BIN="/usr/lib/jvm/temurin-21-jdk-amd64/bin/java"
          if [ ! -f "$JAVA_BIN" ]; then
            wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public \
              | sudo gpg --dearmor \
              | sudo tee /etc/apt/trusted.gpg.d/adoptium.gpg >/dev/null
            . /etc/os-release
            echo "deb https://packages.adoptium.net/artifactory/deb \
              ${VERSION_CODENAME} main" \
              | sudo tee /etc/apt/sources.list.d/adoptium.list
            sudo apt-get update -qq
            sudo apt-get install -y -qq temurin-21-jdk
          fi

          command -v zstd >/dev/null 2>&1 || sudo apt-get install -y -qq zstd

          pip3 install -q --no-cache-dir discord.py aiohttp 2>/dev/null || true

          RAM_MB=$(awk '/MemTotal/{print int($2/1024)}' /proc/meminfo)
          echo "=============================="
          echo "  OS   : $(uname -r)"
          echo "  RAM  : ${RAM_MB}MB"
          echo "  CPUs : $(nproc)"
          echo "  Java : $("$JAVA_BIN" -version 2>&1 | head -1)"
          echo "  Swap : $(free -h | awk '/Swap/{print $2}')"
          echo "  Disk : $(df -h . | tail -1 | awk '{print $4}') libre"
          echo "=============================="

      - name: Restore drive
        run: |
          set -uo pipefail
          echo "=== Restore Drive ==="

          safe_dl() {
            local src="$1"
            rclone copy "rclone-mc:mc-backup/${src}" . \
              --transfers=8 --multi-thread-streams=8 \
              --buffer-size=256M --retries=3 --low-level-retries=3 \
              2>/dev/null \
              && echo "  OK: ${src}" \
              || echo "  ABSENT: ${src}"
          }

          safe_dl "worlds.tar.zst" & P1=$!
          safe_dl "server.jar"     & P2=$!
          wait $P1 $P2
          echo "Telechargements termines"

          if [ -f worlds.tar.zst ]; then
            SIZE=$(stat -c%s worlds.tar.zst 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 1000 ]; then
              echo "Extraction worlds ($(du -sh worlds.tar.zst | cut -f1))..."
              zstd -d -T0 --stdout worlds.tar.zst | tar -x --ignore-zeros
              echo "Worlds extraits:"
              find . -maxdepth 1 -type d ! -name '.' ! -name '.git' \
                ! -name 'plugins' ! -name 'logs' ! -name 'cache' \
                ! -name 'config' ! -name 'libraries' \
                | while read -r d; do
                  echo "  - $(basename "$d")"
                done || true
            else
              echo "Archive corrompue, ignoree"
            fi
            rm -f worlds.tar.zst
          else
            echo "Worlds: demarrage vierge"
          fi

      - name: Paper JAR
        run: |
          set -uo pipefail
          if [ -f server.jar ]; then
            SIZE=$(stat -c%s server.jar 2>/dev/null || echo "0")
            if [ "$SIZE" -gt 10000000 ]; then
              echo "server.jar OK ($(( SIZE / 1048576 ))MB)"
            else
              rm -f server.jar
              echo "JAR corrompu, re-telechargement..."
            fi
          fi

          if [ ! -f server.jar ]; then
            echo "Telechargement Paper 1.21.10..."
            wget -q -O server.jar \
              "https://api.papermc.io/v2/projects/paper/versions/1.21.10/builds/129/downloads/paper-1.21.10-129.jar"
            echo "Paper telecharge ($(du -sh server.jar | cut -f1))"
            rclone copy server.jar rclone-mc:mc-backup/ \
              --transfers=4 --retries=3 2>/dev/null &
            disown
          fi

          echo "eula=true" > eula.txt

      - name: Appliquer repo
        run: |
          set -uo pipefail
          echo "=== Application repo ==="

          mkdir -p plugins
          JARS=0
          while IFS= read -r jar; do
            [ -z "$jar" ] && continue
            name="$(basename "$jar")"
            case "$name" in server.jar|playit*) continue ;; esac
            cp -f "$jar" "plugins/${name}"
            JARS=$(( JARS + 1 ))
          done < <(find /tmp/repo-snapshot -maxdepth 1 -name "*.jar" \
            ! -name "server.jar" ! -name "playit*" 2>/dev/null)
          echo "  JARs copies: ${JARS}"

          CFGS=0
          while IFS= read -r src; do
            rel="${src#/tmp/repo-snapshot/}"
            case "$rel" in
              ""| .git/*|*.tar.zst|*.tar.gz) continue ;;
            esac
            case "$rel" in
              *.jar) [ "$(dirname "$rel")" = "." ] && continue ;;
            esac
            dst_dir="$(dirname "$rel")"
            [ -n "$dst_dir" ] && [ "$dst_dir" != "." ] && mkdir -p "$dst_dir"
            cp -f "$src" "$rel" 2>/dev/null \
              && CFGS=$(( CFGS + 1 )) || true
          done < <(find /tmp/repo-snapshot -type f)

          echo "  Fichiers appliques: ${CFGS}"
          echo "eula=true" > eula.txt
          echo "=== Repo applique ==="

      - name: Playit
        run: |
          chmod +x ./playit-linux-amd64
          printf '%s' '${{ secrets.PLAYIT_SECRET }}' > playit.toml

          RUST_LOG=warn ./playit-linux-amd64 --secret_path playit.toml \
            > playit.log 2>&1 &
          PLAYIT_PID=$!

          for i in $(seq 1 30); do
            sleep 1
            if grep -qiE "connected|tunnel|ready|online|agent" \
                playit.log 2>/dev/null; then
              echo "Playit connecte en ${i}s"
              break
            fi
            if ! kill -0 "$PLAYIT_PID" 2>/dev/null; then
              echo "Playit mort"
              cat playit.log
              break
            fi
          done

      - name: Minecraft + Bot
        env:
          FINE_GRAINED_PAT:   ${{ secrets.FINE_GRAINED_PAT }}
          REPO:               ${{ github.repository }}
          RUN_ID:             ${{ github.run_id }}
          DISCORD_BOT_TOKEN:  ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID:   ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          GITHUB_PAT:         ${{ secrets.FINE_GRAINED_PAT }}
          GITHUB_REPO:        ${{ github.repository }}
          MC_EVENT_FILE:      /tmp/mc_events.jsonl
          MC_PIPE:            /tmp/mc_input
          MC_STATS_FILE:      /tmp/mc_stats.txt
          MC_LOG:             /home/runner/work/java-project/java-project/mc.log
        run: |
          JAVA="/usr/lib/jvm/temurin-21-jdk-amd64/bin/java"
          MC_LOG="mc.log"
          MC_LOG_ABS="/home/runner/work/java-project/java-project/mc.log"
          MC_PIPE="/tmp/mc_input"
          STATS_FILE="/tmp/mc_stats.txt"
          WORLD_REF="/tmp/world_ref.txt"
          STOPPED_CLEANLY="/tmp/mc_stopped_cleanly"
          EVENT_FILE="/tmp/mc_events.jsonl"

          # ── Blacklist des dossiers NON-monde ─────────────────────────
          # Tout ce qui N'EST PAS un monde Minecraft
          WORLD_BLACKLIST="plugins logs cache config libraries .git \
            .paper-remapped crash-reports debug"

          rm -f "$MC_PIPE" "$STOPPED_CLEANLY"
          mkfifo "$MC_PIPE"
          > "$MC_LOG"
          touch "$WORLD_REF"
          touch "$EVENT_FILE"

          RAM_KB=$(awk '/MemTotal/{print $2}' /proc/meminfo)
          RAM_MB=$(( RAM_KB / 1024 ))
          JVM_MB=$(( RAM_MB - 1228 ))
          [ "$JVM_MB" -gt 14336 ] && JVM_MB=14336
          [ "$JVM_MB" -lt 4096  ] && JVM_MB=4096
          JVM="${JVM_MB}M"
          CPUS=$(nproc)
          echo "RAM: ${RAM_MB}MB | JVM: ${JVM} | CPUs: ${CPUS}"

          mc_cmd() {
            printf '%s\n' "$*" > "$MC_PIPE" 2>/dev/null || true
          }

          emit_event() {
            printf '%s\n' "$1" >> "$EVENT_FILE" 2>/dev/null || true
          }

          gh_cancel() {
            curl -sf -X POST \
              -H "Authorization: token ${FINE_GRAINED_PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/cancel" \
              >/dev/null \
              && echo "[GH] Annule" \
              || echo "[GH] Echec annulation"
          }

          gh_dispatch() {
            curl -sf -X POST \
              -H "Authorization: token ${FINE_GRAINED_PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/actions/workflows/server.yml/dispatches" \
              -d '{"ref":"main"}' \
              >/dev/null \
              && echo "[GH] Dispatch OK" \
              || echo "[GH] Echec dispatch"
          }

          # ── Detection de TOUS les mondes ─────────────────────────────
          # Un monde Minecraft = dossier contenant level.dat
          # OU dossier connu (world, world_nether, world_the_end, etc.)
          # On exclut tout ce qui est dans la blacklist
          get_world_dirs() {
            local DIRS=""
            while IFS= read -r dir; do
              local name
              name="$(basename "$dir")"

              # Ignorer les dossiers blacklistes
              local skip=0
              for bl in $WORLD_BLACKLIST; do
                [ "$name" = "$bl" ] && skip=1 && break
              done
              [ "$skip" = "1" ] && continue

              # Ignorer les fichiers (pas les dossiers)
              [ -d "$dir" ] || continue

              # Valider : doit contenir level.dat (monde valide)
              if [ -f "$dir/level.dat" ]; then
                DIRS="$DIRS $name"
              fi
            done < <(find . -maxdepth 1 -mindepth 1 -type d)
            echo "$DIRS"
          }

          world_changed() {
            local DIRS="$1"
            [ -z "$DIRS" ] && echo "0" && return
            # shellcheck disable=SC2086
            find $DIRS -name "*.mca" -newer "$WORLD_REF" \
              2>/dev/null | wc -l
          }

          # ── Monitor systeme ───────────────────────────────────────────
          monitor_loop() {
            local RAM_KB_L
            RAM_KB_L=$(awk '/MemTotal/{print $2}' /proc/meminfo)
            local RAM_MB_L=$(( RAM_KB_L / 1024 ))
            while true; do
              local L1 L2 CPU MF MU MP SW DK TP IN OUT ONL
              L1=$(grep '^cpu ' /proc/stat 2>/dev/null \
                || echo "cpu 0 0 0 0 0 0 0")
              sleep 1
              L2=$(grep '^cpu ' /proc/stat 2>/dev/null \
                || echo "cpu 0 0 0 0 0 0 0")
              CPU=$(awk -v l1="$L1" -v l2="$L2" 'BEGIN {
                n=split(l1,a," "); split(l2,b," ")
                id1=a[5]+0; id2=b[5]+0; t1=0; t2=0
                for(i=2;i<=n;i++){t1+=a[i]+0; t2+=b[i]+0}
                dt=t2-t1; di=id2-id1
                printf "%d",(dt>0)?100-int(di*100/dt):0
              }')
              MF=$(awk '/MemAvailable/{print $2+0}' /proc/meminfo)
              MU=$(( (RAM_KB_L - MF) / 1024 ))
              MP=$(( (RAM_KB_L - MF) * 100 / RAM_KB_L ))
              SW=$(free -m 2>/dev/null | awk '/Swap/{print $3+0}')
              DK=$(df -h . 2>/dev/null | awk 'NR==2{print $5}')
              TP=$(grep -oP \
                '(?<=TPS from last 1m, 5m, 15m: )[\d.]+' \
                "$MC_LOG" 2>/dev/null | tail -1 || true)
              [ -z "$TP" ] && TP="N/A"
              IN=$(grep -c "logged in with entity id" \
                "$MC_LOG" 2>/dev/null || echo 0)
              OUT=$(grep -c "lost connection" \
                "$MC_LOG" 2>/dev/null || echo 0)
              ONL=$(( IN - OUT ))
              [ "$ONL" -lt 0 ] && ONL=0
              printf \
                'TS=%s;CPU=%s%%;RAM=%sMB/%sMB(%s%%);SWAP=%sMB;DISK=%s;TPS=%s;ONL=%s\n' \
                "$(date '+%H:%M:%S')" "$CPU" "$MU" "$RAM_MB_L" \
                "$MP" "$SW" "$DK" "$TP" "$ONL" > "$STATS_FILE"
              sleep 9
            done
          }

          live_logs() {
            while [ ! -f "$MC_LOG" ]; do sleep 1; done
            tail -f "$MC_LOG" 2>/dev/null | while IFS= read -r L; do
              printf '[MC] %s\n' "$L"
            done
          }

          show_stats() {
            echo "=============================="
            if [ -f "$STATS_FILE" ]; then
              D=$(cat "$STATS_FILE")
              echo "  Heure  : $(echo "$D" | grep -oP 'TS=\K[^;]+')"
              echo "  CPU    : $(echo "$D" | grep -oP 'CPU=\K[^;]+')"
              echo "  RAM    : $(echo "$D" | grep -oP 'RAM=\K[^;]+')"
              echo "  Swap   : $(echo "$D" | grep -oP 'SWAP=\K[^;]+')"
              echo "  Disque : $(echo "$D" | grep -oP 'DISK=\K[^;]+')"
              echo "  TPS    : $(echo "$D" | grep -oP 'TPS=\K[^;]+')"
              echo "  Online : $(echo "$D" \
                | grep -oP 'ONL=\K[^;]+') joueurs"
              echo "  JVM    : $JVM"
            else
              echo "  Monitoring en demarrage..."
            fi
            echo "=============================="
          }

          # ── Backup ───────────────────────────────────────────────────
          backup() {
            local LABEL="${1:-periodic}"
            local FORCE="${2:-0}"
            local T0
            T0=$(date +%s)
            local PIDS=()
            echo "[BACKUP:${LABEL}] Debut $(date '+%H:%M:%S')"

            mc_cmd "save-all flush" 2>/dev/null || true
            sleep 3

            local WORLD_DIRS
            WORLD_DIRS=$(get_world_dirs)

            if [ -n "$WORLD_DIRS" ]; then
              local CHANGED
              CHANGED=$(world_changed "$WORLD_DIRS")

              echo "  Mondes detectes:$(
                echo "$WORLD_DIRS" | tr ' ' '\n' | grep -v '^$' \
                | awk '{print "  - "$1}' | tr '\n' ' '
              )"

              if [ "$FORCE" = "1" ] || [ "$CHANGED" -gt 0 ]; then
                echo "  ${CHANGED} chunks modifies, compression..."
                # shellcheck disable=SC2086
                tar -cf - \
                  --exclude='*/session.lock' \
                  --exclude='*/poi/*' \
                  --exclude='level.dat_old' \
                  --exclude='*.lck' \
                  $WORLD_DIRS 2>/dev/null \
                | zstd -19 -T0 --long=27 -fo worlds.tar.zst

                local SZ
                SZ=$(du -sh worlds.tar.zst 2>/dev/null | cut -f1)
                echo "  Archive: ${SZ} (zstd-19)"

                rclone copy worlds.tar.zst rclone-mc:mc-backup/ \
                  --transfers=8 --multi-thread-streams=8 \
                  --buffer-size=256M --retries=3 --checksum \
                  2>/dev/null &
                PIDS+=($!)
                touch "$WORLD_REF"
              else
                echo "  Aucun chunk modifie, skip"
              fi
            else
              echo "  Aucun monde detecte"
            fi

            [ "${#PIDS[@]}" -gt 0 ] && wait "${PIDS[@]}" || true
            rm -f worlds.tar.zst
            echo "[BACKUP:${LABEL}] Termine en $(( $(date +%s) - T0 ))s"
          }

          # ── Git sync ──────────────────────────────────────────────────
          git_sync() {
            echo "[GIT] Sync..."
            git config user.name  "MC Server Bot"
            git config user.email "bot@mc-server.local"

            for dir in \
                plugins/Essentials plugins/spark plugins/bStats \
                plugins/CustomNPCs plugins/HeadDatabase \
                plugins/Multiverse-Core plugins/TAB \
                plugins/Chunky plugins/WorldManager; do
              [ -d "$dir" ] || continue
              find "$dir" -type f \
                \( -name "*.db" -o -name "*.csv" -o -name "*.json" \) \
                2>/dev/null | while IFS= read -r f; do
                  git add "$f" 2>/dev/null || true
                done
            done

            git add ops.json whitelist.json banned-players.json \
              banned-ips.json server.properties 2>/dev/null || true

            if ! git diff --cached --quiet 2>/dev/null; then
              local STAMP
              STAMP=$(date '+%Y-%m-%d %H:%M:%S')
              git commit -m "runtime-sync ${STAMP}" --no-verify \
                2>/dev/null \
                && git push \
                  "https://x-access-token:${FINE_GRAINED_PAT}@github.com/${REPO}.git" \
                  HEAD:main --force 2>/dev/null \
                && echo "[GIT] Push OK" \
                || echo "[GIT] Push echec"
            else
              echo "[GIT] Rien a committer"
            fi
          }

          was_graceful() {
            tail -80 "$MC_LOG" 2>/dev/null | grep -qiE \
              "All dimensions are saved|Stopping server|Saving players"
          }

          warn_restart() {
            mc_cmd "say §c[Serveur] Redemarrage dans 60 secondes !"
            sleep 30
            mc_cmd "say §c[Serveur] Redemarrage dans 30 secondes !"
            sleep 20
            mc_cmd "say §c[Serveur] Redemarrage dans 10 secondes !"
            sleep 1
            for N in 9 8 7 6 5 4 3 2 1; do
              mc_cmd "say §c[Serveur] ${N}..."
              sleep 1
            done
            mc_cmd "say §c[Serveur] Redemarrage en cours !"
          }

          start_mc() {
            tail -f "$MC_PIPE" 2>/dev/null | \
            "$JAVA" \
              -Xms${JVM} -Xmx${JVM} \
              -XX:+UseG1GC \
              -XX:+ParallelRefProcEnabled \
              -XX:MaxGCPauseMillis=200 \
              -XX:+UnlockExperimentalVMOptions \
              -XX:+DisableExplicitGC \
              -XX:+AlwaysPreTouch \
              -XX:G1NewSizePercent=30 \
              -XX:G1MaxNewSizePercent=40 \
              -XX:G1HeapRegionSize=32M \
              -XX:G1ReservePercent=15 \
              -XX:G1HeapWastePercent=5 \
              -XX:G1MixedGCCountTarget=4 \
              -XX:InitiatingHeapOccupancyPercent=15 \
              -XX:G1MixedGCLiveThresholdPercent=90 \
              -XX:G1RSetUpdatingPauseTimePercent=5 \
              -XX:SurvivorRatio=32 \
              -XX:MaxTenuringThreshold=1 \
              -XX:+PerfDisableSharedMem \
              -XX:ConcGCThreads=${CPUS} \
              -XX:ParallelGCThreads=${CPUS} \
              -XX:+UseStringDeduplication \
              -XX:ReservedCodeCacheSize=512m \
              -XX:+OptimizeStringConcat \
              -XX:+UseCompressedOops \
              -XX:+UseCompressedClassPointers \
              -XX:+HeapDumpOnOutOfMemoryError \
              -XX:HeapDumpPath=/tmp/mc-oom.hprof \
              -XX:+ExitOnOutOfMemoryError \
              -Dpaper.watchdog.earlyWarningDelay=300000 \
              -Dpaper.watchdog.earlyWarningEvery=60000 \
              -Dpaper.maxChunkThreads=${CPUS} \
              -Dpaper.log-level=INFO \
              -DPaper.WorkerThreadCount=${CPUS} \
              -Djava.net.preferIPv4Stack=true \
              -Dfile.encoding=UTF-8 \
              -Daikars.new.flags=true \
              -Dcom.fastasyncworldedit.fawe.parallel=true \
              -Dcom.fastasyncworldedit.fawe.target-size=8192 \
              -Dcom.fastasyncworldedit.fawe.compressed-ops=true \
              -jar server.jar nogui \
              >> "$MC_LOG" 2>&1 &
            echo $!
          }

          # ── Demarrage bot Discord (dans le meme step) ─────────────────
          python3 discord_bot/bot.py > /tmp/bot.log 2>&1 &
          BOT_PID=$!
          echo "Bot PID=${BOT_PID}"

          for i in $(seq 1 20); do
            sleep 1
            if grep -q "Connecte:" /tmp/bot.log 2>/dev/null; then
              echo "Bot connecte en ${i}s"
              break
            fi
            if ! kill -0 "$BOT_PID" 2>/dev/null; then
              echo "=== Bot mort ==="
              cat /tmp/bot.log || true
              break
            fi
          done

          # ── Demarrage MC ───────────────────────────────────────────────
          MC_PID=$(start_mc)
          T_START=$(date +%s)
          T_BACKUP=$(date +%s)
          T_GIT=$(date +%s)
          CRASHES=0
          LOOP=0
          WARNED=0

          echo "MC PID=${MC_PID} | RAM=${JVM} | CPUs=${CPUS}"

          monitor_loop & MONITOR_PID=$!
          live_logs    & LIVE_PID=$!

          MC_EVENT_FILE="$EVENT_FILE" \
            python3 discord_bot/discord_watcher.py "$MC_LOG_ABS" \
            >> /tmp/watcher.log 2>&1 & WATCHER_PID=$!

          emit_event \
            "{\"type\":\"start\",\"jvm\":\"${JVM}\",\"cpus\":\"${CPUS}\"}"

          # ── Boucle principale ──────────────────────────────────────────
          while true; do
            sleep 20
            LOOP=$(( LOOP + 1 ))
            NOW=$(date +%s)
            ELAPSED=$(( NOW - T_START ))
            ELAPSED_MIN=$(( ELAPSED / 60 ))

            [ $(( LOOP % 9 )) -eq 0 ] && show_stats

            # Relancer le bot s'il est mort
            if ! kill -0 "$BOT_PID" 2>/dev/null; then
              echo "[BOT] Bot mort, relance..."
              python3 discord_bot/bot.py >> /tmp/bot.log 2>&1 &
              BOT_PID=$!
              echo "[BOT] Nouveau PID=${BOT_PID}"
            fi

            # Backup periodique toutes les 5 min
            if [ $(( NOW - T_BACKUP )) -ge 300 ]; then
              backup "periodic" "0"
              T_BACKUP=$(date +%s)
            fi

            # Git sync toutes les 15 min
            if [ $(( NOW - T_GIT )) -ge 900 ]; then
              git_sync
              T_GIT=$(date +%s)
            fi

            # Avertissement redemarrage
            if [ "$ELAPSED" -ge 20220 ] && [ "$WARNED" -eq 0 ]; then
              WARNED=1
              warn_restart &
            fi

            # Verifier vie du MC
            if ! kill -0 "$MC_PID" 2>/dev/null; then
              if was_graceful; then
                echo "=== /stop propre $(date '+%H:%M:%S') ==="
                show_stats
                backup "graceful-stop" "1"
                git_sync
                emit_event '{"type":"stop"}'
                sleep 3
                kill "$MONITOR_PID" "$LIVE_PID" \
                  "$WATCHER_PID" "$BOT_PID" 2>/dev/null || true
                echo "GRACEFUL" > "$STOPPED_CLEANLY"
                sleep 10
                gh_cancel
                sleep 3
                exit 0
              else
                CRASHES=$(( CRASHES + 1 ))
                echo "=== CRASH ${CRASHES} $(date '+%H:%M:%S') ==="
                show_stats
                tail -40 "$MC_LOG" 2>/dev/null || true

                CRASH_CAUSE="Inconnue"
                if grep -qiE "OutOfMemoryError" \
                    "$MC_LOG" 2>/dev/null; then
                  CRASH_CAUSE="OutOfMemoryError"
                  echo "CAUSE: OOM"
                fi
                if grep -qiE "StackOverflowError" \
                    "$MC_LOG" 2>/dev/null; then
                  CRASH_CAUSE="StackOverflowError"
                  echo "CAUSE: StackOverflow"
                fi

                emit_event \
                  "{\"type\":\"crash\",\"count\":${CRASHES},\"cause\":\"${CRASH_CAUSE}\"}"

                if [ "$CRASHES" -ge 5 ]; then
                  echo "[FATAL] 5 crashs consecutifs"
                  backup "crash-fatal" "1"
                  git_sync
                  emit_event '{"type":"crash_fatal"}'
                  sleep 3
                  kill "$MONITOR_PID" "$LIVE_PID" \
                    "$WATCHER_PID" "$BOT_PID" 2>/dev/null || true
                  exit 1
                fi

                backup "crash-${CRASHES}" "1"
                sleep 10
                WARNED=0
                > "$MC_LOG"
                MC_PID=$(start_mc)
                echo "Redemarre PID=${MC_PID}"
              fi
            else
              CRASHES=0
            fi

            # Relance automatique ~340 min
            if [ "$ELAPSED" -ge 20400 ]; then
              echo "[INFO] Relance automatique (${ELAPSED_MIN}min)"
              backup "pre-restart" "1"
              git_sync
              emit_event \
                "{\"type\":\"restart\",\"minutes\":\"${ELAPSED_MIN}\"}"
              sleep 3
              kill "$MONITOR_PID" "$LIVE_PID" \
                "$WATCHER_PID" "$BOT_PID" 2>/dev/null || true
              gh_dispatch
              sleep 5
              mc_cmd "say §c[Serveur] Redemarrage automatique..."
              mc_cmd "stop"
              for i in $(seq 1 60); do
                sleep 1
                kill -0 "$MC_PID" 2>/dev/null || break
              done
              kill "$MC_PID" 2>/dev/null || true
              exit 0
            fi
          done

      - name: Backup final
        if: always()
        run: |
          set -uo pipefail

          if [ -f /tmp/mc_stopped_cleanly ]; then
            echo "=== Arret propre - backup deja fait ==="
            rclone size rclone-mc:mc-backup/ 2>/dev/null || true
            exit 0
          fi

          echo "=== BACKUP FINAL $(date '+%H:%M:%S') ==="

          # ── Detection mondes : TOUT dossier avec level.dat ───────────
          WORLD_DIRS=""
          BLACKLIST="plugins logs cache config libraries .git \
            .paper-remapped crash-reports debug"

          while IFS= read -r dir; do
            name="$(basename "$dir")"

            skip=0
            for bl in $BLACKLIST; do
              [ "$name" = "$bl" ] && skip=1 && break
            done
            [ "$skip" = "1" ] && continue

            [ -f "$dir/level.dat" ] || continue
            WORLD_DIRS="$WORLD_DIRS $name"
          done < <(find . -maxdepth 1 -mindepth 1 -type d)

          if [ -n "$WORLD_DIRS" ]; then
            echo "Mondes:${WORLD_DIRS}"
            # shellcheck disable=SC2086
            tar -cf - \
              --exclude='*/session.lock' \
              --exclude='*/poi/*' \
              --exclude='level.dat_old' \
              --exclude='*.lck' \
              $WORLD_DIRS 2>/dev/null \
            | zstd -19 -T0 --long=27 -fo worlds.tar.zst
            echo "Archive: $(du -sh worlds.tar.zst | cut -f1)"
            rclone copy worlds.tar.zst rclone-mc:mc-backup/ \
              --transfers=8 --multi-thread-streams=8 \
              --buffer-size=256M --retries=3 --checksum \
              2>/dev/null
            rm -f worlds.tar.zst
          else
            echo "Aucun monde a sauvegarder"
          fi

          echo "=== Drive ==="
          rclone size rclone-mc:mc-backup/ 2>/dev/null || true
          echo "=== TERMINE ==="
