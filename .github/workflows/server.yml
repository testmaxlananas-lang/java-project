name: server

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - name: Setup rclone
        run: |
          curl -s https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Restore world + plugins
        run: |
          rclone copy rclone-mc:mc-backup/world.tar.zst . --ignore-errors || true
          rclone copy rclone-mc:mc-backup/plugins.tar.zst . --ignore-errors || true
          [ -f world.tar.zst ] && tar --zstd -xf world.tar.zst && echo "World restored" || echo "Fresh start"
          [ -f plugins.tar.zst ] && tar --zstd -xf plugins.tar.zst && echo "Plugins restored" || true

      - name: Cache Paper jar
        uses: actions/cache@v4
        with:
          path: paper.jar
          key: paper-1.21.10-129

      - name: Download Paper 1.21.10
        run: |
          if [ ! -f paper.jar ]; then
            wget -q -O paper.jar \
              "https://api.papermc.io/v2/projects/paper/versions/1.21.10/builds/129/downloads/paper-1.21.10-129.jar"
            echo "Downloaded fresh"
          else
            echo "Using cached jar"
          fi
          cp paper.jar server.jar

      - name: Cache Mojang jar
        run: |
          mkdir -p cache
          if [ -f cache/mojang_1.21.10.jar ]; then
            mkdir -p versions/1.21.10
            cp cache/mojang_1.21.10.jar versions/1.21.10/mojang_1.21.10.jar
            echo "Mojang jar pre-cached"
          fi

      - name: Install playit tunnel
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg \
            | gpg --dearmor \
            | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/v0 . /" \
            | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt-get update -qq && sudo apt-get install -y playit
          echo "${{ secrets.PLAYIT_SECRET }}" > ~/.config/playit/secret.toml
          playit 2>&1 | tee playit.log &
          sleep 15
          echo "=== PLAYIT LOG ==="
          cat playit.log
          echo "=================="

      - name: Start Paper
        run: |
          /usr/lib/jvm/temurin-21-jdk-amd64/bin/java \
            -Xms6G -Xmx6G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:+AlwaysPreTouch \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:G1HeapWastePercent=5 \
            -XX:G1MixedGCCountTarget=4 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:G1RSetUpdatingPauseTimePercent=5 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -Dusing.aikars.flags=https://mcflags.emc.gs \
            -Daikars.new.flags=true \
            -jar server.jar nogui

      - name: Backup world + plugins
        if: always()
        run: |
          if [ -d world ]; then
            tar --zstd -cf world.tar.zst world/
            rclone copy world.tar.zst rclone-mc:mc-backup/
          fi
          if [ -d plugins ]; then
            tar --zstd -cf plugins.tar.zst plugins/
            rclone copy plugins.tar.zst rclone-mc:mc-backup/
          fi
          echo "Backup done"
