name: server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: minecraft-server
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.FINE_GRAINED_PAT }}

      - name: Snapshot repo
        run: |
          set -euo pipefail
          mkdir -p /tmp/repo-snapshot
          cp -r . /tmp/repo-snapshot/
          echo "Snapshot: $(find /tmp/repo-snapshot -type f | wc -l) fichiers"

      - name: Setup systeme
        run: |
          set -euo pipefail

          # Désactiver les services parasites
          sudo systemctl stop unattended-upgrades apt-daily apt-daily-upgrade 2>/dev/null || true
          sudo systemctl disable unattended-upgrades apt-daily apt-daily-upgrade 2>/dev/null || true
          sudo pkill -f unattended-upgrades 2>/dev/null || true
          sudo ln -sf /bin/true /usr/bin/mandb 2>/dev/null || true

          # Installer rclone via binaire direct
          curl -fsSL "https://downloads.rclone.org/rclone-current-linux-amd64.zip" -o /tmp/rclone.zip
          unzip -jo /tmp/rclone.zip "*/rclone" -d /tmp/
          sudo mv /tmp/rclone /usr/local/bin/rclone
          sudo chmod +x /usr/local/bin/rclone
          rm /tmp/rclone.zip

          # Config rclone
          mkdir -p ~/.config/rclone
          printf '%s' "${{ secrets.RCLONE_CONF_B64 }}" | base64 -d > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf

          # Tuning réseau (BBR + optimisations)
          sudo sysctl -w \
            net.core.rmem_max=134217728 \
            net.core.wmem_max=134217728 \
            net.core.rmem_default=262144 \
            net.core.wmem_default=262144 \
            net.core.netdev_max_backlog=250000 \
            net.ipv4.tcp_congestion_control=bbr \
            net.core.default_qdisc=fq \
            net.ipv4.tcp_fastopen=3 \
            net.ipv4.tcp_tw_reuse=1 \
            net.ipv4.tcp_fin_timeout=15 \
            net.ipv4.tcp_keepalive_time=300 \
            vm.swappiness=1 \
            vm.dirty_ratio=60 \
            vm.dirty_background_ratio=2 \
            vm.vfs_cache_pressure=50 \
            vm.overcommit_memory=1 \
            vm.max_map_count=1048576 \
            kernel.sched_migration_cost_ns=5000000 \
            kernel.sched_autogroup_enabled=0 \
            kernel.pid_max=4194304 \
            2>/dev/null || true

          # Huge pages (mode conservateur)
          echo madvise | sudo tee /sys/kernel/mm/transparent_hugepage/enabled >/dev/null 2>&1 || true
          echo defer+madvise | sudo tee /sys/kernel/mm/transparent_hugepage/defrag >/dev/null 2>&1 || true

          # CPU performance mode
          for f in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
            [ -f "$f" ] && echo performance | sudo tee "$f" >/dev/null 2>&1 || true
          done

          # I/O scheduler optimisé
          for dev in /sys/block/sda /sys/block/sdb /sys/block/nvme0n1; do
            [ -f "${dev}/queue/scheduler" ] && echo "none" | sudo tee "${dev}/queue/scheduler" >/dev/null 2>&1 || true
            [ -f "${dev}/queue/read_ahead_kb" ] && echo "4096" | sudo tee "${dev}/queue/read_ahead_kb" >/dev/null 2>&1 || true
          done

          ulimit -n 1048576 2>/dev/null || true

          # Swap 6G
          if ! swapon --show | grep -q /swapfile 2>/dev/null; then
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 6G /swapfile 2>/dev/null || \
                sudo dd if=/dev/zero of=/swapfile bs=1M count=6144 status=none
            fi
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile >/dev/null 2>&1 || true
            sudo swapon /swapfile 2>/dev/null || true
            echo "Swap 6G active"
          fi

          # Java Temurin 21
          JAVA_BIN="/usr/lib/jvm/temurin-21-jdk-amd64/bin/java"
          if [ ! -f "$JAVA_BIN" ]; then
            echo "Installation Temurin 21..."
            wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public \
              | sudo gpg --dearmor \
              | sudo tee /etc/apt/trusted.gpg.d/adoptium.gpg >/dev/null
            . /etc/os-release
            echo "deb https://packages.adoptium.net/artifactory/deb ${VERSION_CODENAME} main" \
              | sudo tee /etc/apt/sources.list.d/adoptium.list
            sudo apt-get update -qq
            sudo apt-get install -y -qq temurin-21-jdk
          fi

          # Installer zstd si absent
          command -v zstd >/dev/null 2>&1 || sudo apt-get install -y -qq zstd

          RAM_MB=$(awk '/MemTotal/{print int($2/1024)}' /proc/meminfo)
          echo "=============================="
          echo "  OS   : $(uname -r)"
          echo "  RAM  : ${RAM_MB}MB"
          echo "  CPUs : $(nproc)"
          echo "  Java : $("$JAVA_BIN" -version 2>&1 | head -1)"
          echo "  Swap : $(free -h | awk '/Swap/{print $2}')"
          echo "  Disk : $(df -h . | tail -1 | awk '{print $4}') libre"
          echo "=============================="

      - name: Restore drive
        run: |
          set -uo pipefail
          echo "=== Restore depuis Google Drive ==="

          # Téléchargement parallèle avec vérification d'intégrité
          safe_dl() {
            local src="$1"
            local dest="${2:-$src}"
            rclone copy "rclone-mc:mc-backup/${src}" . \
              --transfers=8 \
              --multi-thread-streams=8 \
              --buffer-size=256M \
              --retries=3 \
              --low-level-retries=3 \
              2>/dev/null \
              && echo "  OK: ${src}" \
              || echo "  ABSENT: ${src}"
          }

          safe_dl "world.tar.zst"        &  P1=$!
          safe_dl "plugins.tar.zst"      &  P2=$!
          safe_dl "server.jar"           &  P3=$!
          safe_dl "plugins-config.tar.zst" & P4=$!
          wait $P1 $P2 $P3 $P4
          echo "Telechargements termines"

          # Extraction parallèle avec vérification
          PIDS=()

          if [ -f world.tar.zst ]; then
            SIZE=$(stat -c%s world.tar.zst 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 1000 ]; then
              echo "Extraction world ($(du -sh world.tar.zst | cut -f1))..."
              zstd -d -T0 --stdout world.tar.zst | tar -x --ignore-zeros &
              PIDS+=($!)
            else
              echo "World archive corrompue, ignoree"
              rm -f world.tar.zst
            fi
          else
            echo "World: demarrage vierge"
          fi

          if [ -f plugins.tar.zst ]; then
            SIZE=$(stat -c%s plugins.tar.zst 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 1000 ]; then
              echo "Extraction plugins JARs ($(du -sh plugins.tar.zst | cut -f1))..."
              zstd -d -T0 --stdout plugins.tar.zst | tar -x --ignore-zeros &
              PIDS+=($!)
            else
              rm -f plugins.tar.zst
            fi
          fi

          if [ -f plugins-config.tar.zst ]; then
            SIZE=$(stat -c%s plugins-config.tar.zst 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 100 ]; then
              echo "Extraction configs plugins ($(du -sh plugins-config.tar.zst | cut -f1))..."
              zstd -d -T0 --stdout plugins-config.tar.zst | tar -x --ignore-zeros &
              PIDS+=($!)
            else
              rm -f plugins-config.tar.zst
            fi
          fi

          [ "${#PIDS[@]}" -gt 0 ] && wait "${PIDS[@]}" || true

          # Supprimer les archives temporaires pour libérer le disque local
          rm -f world.tar.zst plugins.tar.zst plugins-config.tar.zst

          echo "World dossiers : $(ls -d world* 2>/dev/null | tr '\n' ' ' || echo 'aucun')"
          echo "Plugins JARs   : $(find plugins -maxdepth 1 -name '*.jar' 2>/dev/null | wc -l)"
          echo "Restore termine"

      - name: Paper JAR
        run: |
          set -uo pipefail
          if [ -f server.jar ]; then
            SIZE=$(stat -c%s server.jar 2>/dev/null || echo "0")
            if [ "$SIZE" -gt 10000000 ]; then
              echo "server.jar OK depuis cache ($(( SIZE / 1048576 ))MB)"
            else
              rm -f server.jar
              echo "JAR corrompu, re-telechargement..."
            fi
          fi

          if [ ! -f server.jar ]; then
            echo "Telechargement Paper 1.21.10..."
            wget -q -O server.jar \
              "https://api.papermc.io/v2/projects/paper/versions/1.21.10/builds/129/downloads/paper-1.21.10-129.jar"
            echo "Paper telecharge ($(du -sh server.jar | cut -f1))"
            # Upload en arrière-plan sans bloquer
            rclone copy server.jar rclone-mc:mc-backup/ \
              --transfers=4 --retries=3 2>/dev/null &
            disown
          fi

          echo "eula=true" > eula.txt

      - name: Appliquer configs
        run: |
          set -uo pipefail
          echo "=== Application configs repo ==="

          find /tmp/repo-snapshot -type f | while IFS= read -r src; do
            rel="${src#/tmp/repo-snapshot/}"
            case "$rel" in
              .git/*|*.tar.zst|*.tar.gz|*.jar|"") continue ;;
            esac
            dst_dir="$(dirname "$rel")"
            if [ -n "$dst_dir" ] && [ "$dst_dir" != "." ]; then
              mkdir -p "$dst_dir"
            fi
            cp -f "$src" "$rel" 2>/dev/null || true
          done

          echo "eula=true" > eula.txt
          echo "Configs appliquees"

      - name: Playit
        run: |
          chmod +x ./playit-linux-amd64
          printf '%s' '${{ secrets.PLAYIT_SECRET }}' > playit.toml

          RUST_LOG=warn ./playit-linux-amd64 --secret_path playit.toml > playit.log 2>&1 &
          PLAYIT_PID=$!

          echo "Attente connexion Playit (max 30s)..."
          for i in $(seq 1 30); do
            sleep 1
            if grep -qiE "connected|tunnel|ready|online|agent" playit.log 2>/dev/null; then
              echo "Playit connecte en ${i}s"
              break
            fi
            if ! kill -0 "$PLAYIT_PID" 2>/dev/null; then
              echo "Playit mort apres ${i}s"
              cat playit.log
              break
            fi
          done

          grep -iE "tunnel|address|connect" playit.log 2>/dev/null | head -5 || true

      - name: Minecraft
        env:
          FINE_GRAINED_PAT: ${{ secrets.FINE_GRAINED_PAT }}
          REPO:             ${{ github.repository }}
          RUN_ID:           ${{ github.run_id }}
        run: |
          JAVA="/usr/lib/jvm/temurin-21-jdk-amd64/bin/java"
          MC_LOG="mc.log"
          MC_PIPE="/tmp/mc_input"
          STATS_FILE="/tmp/mc_stats.txt"
          # Fichier de hash du world pour détecter les vrais changements
          WORLD_HASH_FILE="/tmp/world_hash.txt"

          rm -f "$MC_PIPE"
          mkfifo "$MC_PIPE"
          > "$MC_LOG"

          RAM_KB=$(awk '/MemTotal/{print $2}' /proc/meminfo)
          RAM_MB=$(( RAM_KB / 1024 ))
          # Réserver 1.5GB pour l'OS (au lieu de 2GB) pour maximiser la JVM
          JVM_MB=$(( RAM_MB - 1536 ))
          [ "$JVM_MB" -gt 13312 ] && JVM_MB=13312
          [ "$JVM_MB" -lt 4096  ] && JVM_MB=4096
          JVM="${JVM_MB}M"
          CPUS=$(nproc)

          echo "RAM: ${RAM_MB}MB | JVM: ${JVM} | CPUs: ${CPUS}"

          mc_cmd() {
            printf '%s\n' "$*" > "$MC_PIPE" 2>/dev/null || true
          }

          gh_cancel() {
            curl -sf -X POST \
              -H "Authorization: token ${FINE_GRAINED_PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/cancel" \
              >/dev/null && echo "[GH] Annule" || echo "[GH] Echec annulation"
          }

          gh_dispatch() {
            curl -sf -X POST \
              -H "Authorization: token ${FINE_GRAINED_PAT}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/actions/workflows/server.yml/dispatches" \
              -d '{"ref":"main"}' \
              >/dev/null && echo "[GH] Nouveau workflow lance" || echo "[GH] Echec dispatch"
          }

          # Collecter les dossiers world présents
          get_world_dirs() {
            local DIRS=""
            for d in world world_nether world_the_end; do
              [ -d "$d" ] && DIRS="$DIRS $d"
            done
            for d in $(ls -d world_* 2>/dev/null || true); do
              case "$DIRS" in *"$d"*) ;; *) [ -d "$d" ] && DIRS="$DIRS $d" ;; esac
            done
            echo "$DIRS"
          }

          # Hash rapide du world (taille totale + mtime fichiers récents)
          world_hash() {
            local DIRS="$1"
            if [ -n "$DIRS" ]; then
              find $DIRS -name "*.mca" -newer /tmp/mc_stats.txt 2>/dev/null \
                | wc -l
            else
              echo "0"
            fi
          }

          monitor_loop() {
            while true; do
              LINE1=$(grep '^cpu ' /proc/stat 2>/dev/null || echo "cpu 0 0 0 0 0 0 0")
              sleep 1
              LINE2=$(grep '^cpu ' /proc/stat 2>/dev/null || echo "cpu 0 0 0 0 0 0 0")

              CPU_PCT=$(awk -v l1="$LINE1" -v l2="$LINE2" 'BEGIN {
                n = split(l1, a, " ")
                split(l2, b, " ")
                idle1 = a[5]+0; idle2 = b[5]+0
                tot1=0; tot2=0
                for(i=2;i<=n;i++){tot1+=a[i]+0; tot2+=b[i]+0}
                dt=tot2-tot1; di=idle2-idle1
                printf "%d", (dt>0) ? 100-int(di*100/dt) : 0
              }')

              MEM_FREE=$(awk '/MemAvailable/{print $2+0}' /proc/meminfo)
              MEM_USED=$(( (RAM_KB - MEM_FREE) / 1024 ))
              MEM_PCT=$(( (RAM_KB - MEM_FREE) * 100 / RAM_KB ))
              SWAP=$(free -m 2>/dev/null | awk '/Swap/{print $3+0}')
              DISK=$(df -h . 2>/dev/null | awk 'NR==2{print $5}')

              TPS=$(grep -oP '(?<=TPS from last 1m, 5m, 15m: )[\d.]+' "$MC_LOG" 2>/dev/null | tail -1 || true)
              [ -z "$TPS" ] && TPS="N/A"

              IN=$(grep -c "logged in with entity id" "$MC_LOG" 2>/dev/null || echo 0)
              OUT=$(grep -c "lost connection" "$MC_LOG" 2>/dev/null || echo 0)
              ONL=$(( IN - OUT ))
              [ "$ONL" -lt 0 ] && ONL=0

              TS=$(date '+%H:%M:%S')
              printf 'TS=%s;CPU=%s%%;RAM=%sMB/%sMB(%s%%);SWAP=%sMB;DISK=%s;TPS=%s;ONL=%s\n' \
                "$TS" "$CPU_PCT" "$MEM_USED" "$RAM_MB" "$MEM_PCT" \
                "$SWAP" "$DISK" "$TPS" "$ONL" > "$STATS_FILE"

              sleep 9
            done
          }

          live_logs() {
            while [ ! -f "$MC_LOG" ]; do sleep 1; done
            tail -f "$MC_LOG" 2>/dev/null | while IFS= read -r LINE; do
              printf '[MC] %s\n' "$LINE"
            done
          }

          show_stats() {
            echo "=============================="
            if [ -f "$STATS_FILE" ]; then
              D=$(cat "$STATS_FILE")
              echo "  Heure  : $(echo "$D" | grep -oP 'TS=\K[^;]+')"
              echo "  CPU    : $(echo "$D" | grep -oP 'CPU=\K[^;]+')"
              echo "  RAM    : $(echo "$D" | grep -oP 'RAM=\K[^;]+')"
              echo "  Swap   : $(echo "$D" | grep -oP 'SWAP=\K[^;]+')"
              echo "  Disque : $(echo "$D" | grep -oP 'DISK=\K[^;]+')"
              echo "  TPS    : $(echo "$D" | grep -oP 'TPS=\K[^;]+')"
              echo "  Online : $(echo "$D" | grep -oP 'ONL=\K[^;]+') joueur(s)"
              echo "  JVM    : $JVM"
            else
              echo "  Monitoring en demarrage..."
            fi
            echo "=============================="
          }

          # ================================================================
          # BACKUP OPTIMISÉ : compression maximale + déduplication
          # ================================================================
          backup() {
            local LABEL="${1:-periodic}"
            local FORCE="${2:-0}"   # 1 = forcer même sans changements
            local T0 PIDS
            T0=$(date +%s)
            PIDS=()
            echo "[BACKUP:${LABEL}] Debut $(date '+%H:%M:%S')"

            mc_cmd "save-all flush" 2>/dev/null || true
            sleep 2

            WORLD_DIRS=$(get_world_dirs)

            # --- WORLD : compression zstd niveau 19 (max) + filtre agressif ---
            if [ -n "$WORLD_DIRS" ]; then
              # Vérifier s'il y a eu des changements réels
              CHANGED_CHUNKS=$(world_hash "$WORLD_DIRS")
              PREV_HASH=$(cat "$WORLD_HASH_FILE" 2>/dev/null || echo "-1")

              if [ "$FORCE" = "1" ] || [ "$CHANGED_CHUNKS" != "$PREV_HASH" ]; then
                echo "  World: $CHANGED_CHUNKS chunks modifies, compression..."

                tar -cf - \
                  --exclude='*/session.lock' \
                  --exclude='*/poi' \
                  --exclude='*/poi/*' \
                  --exclude='*/entities' \
                  --exclude='*/advancements' \
                  --exclude='level.dat_old' \
                  --exclude='*.lck' \
                  $WORLD_DIRS 2>/dev/null \
                | zstd -19 -T0 \
                    --long=27 \
                    --zstd=windowLog=27 \
                    -fo world.tar.zst

                WORLD_SIZE=$(du -sh world.tar.zst 2>/dev/null | cut -f1)
                echo "  World: ${WORLD_SIZE} (niveau 19)"

                rclone copy world.tar.zst rclone-mc:mc-backup/ \
                  --transfers=8 \
                  --multi-thread-streams=8 \
                  --buffer-size=256M \
                  --retries=3 \
                  --checksum \
                  2>/dev/null &
                PIDS+=($!)

                # Mettre à jour le hash
                echo "$CHANGED_CHUNKS" > "$WORLD_HASH_FILE"

                # Nettoyer l'archive locale immédiatement après upload lancé
              else
                echo "  World: aucun changement, skip"
              fi
            fi

            # --- PLUGINS JARs : seulement si modifiés ---
            if [ -d plugins ]; then
              JAR_COUNT=$(find plugins -maxdepth 1 -name "*.jar" | wc -l)
              if [ "$JAR_COUNT" -gt 0 ]; then
                CHANGED=1
                if [ -f /tmp/plugins_last_backup ]; then
                  CHANGED=$(find plugins -maxdepth 1 -name "*.jar" \
                    -newer /tmp/plugins_last_backup 2>/dev/null | wc -l)
                fi

                if [ "$CHANGED" -gt 0 ] || [ "$FORCE" = "1" ]; then
                  find plugins -maxdepth 1 -name "*.jar" -print0 \
                    | tar --null -cf - -T - 2>/dev/null \
                    | zstd -19 -T0 --long=27 -fo plugins.tar.zst

                  echo "  Plugins: $(du -sh plugins.tar.zst 2>/dev/null | cut -f1)"
                  touch /tmp/plugins_last_backup

                  rclone copy plugins.tar.zst rclone-mc:mc-backup/ \
                    --transfers=4 \
                    --retries=3 \
                    --checksum \
                    2>/dev/null &
                  PIDS+=($!)
                else
                  echo "  Plugins: inchanges, skip"
                fi
              fi

              # --- CONFIGS PLUGINS : compression max + dédup ---
              find plugins -mindepth 2 -type f \
                \( -name "*.yml" -o -name "*.yaml" -o -name "*.json" \
                   -o -name "*.conf" -o -name "*.properties" -o -name "*.toml" \) \
                ! -name "plugin.yml" ! -name "plugin.yaml" \
                -print0 2>/dev/null \
              | tar --null -cf - -T - 2>/dev/null \
              | zstd -19 -T0 -fo plugins-config.tar.zst 2>/dev/null || true

              if [ -f plugins-config.tar.zst ]; then
                SZ=$(stat -c%s plugins-config.tar.zst 2>/dev/null || echo 0)
                if [ "$SZ" -gt 100 ]; then
                  rclone copy plugins-config.tar.zst rclone-mc:mc-backup/ \
                    --transfers=4 \
                    --retries=3 \
                    --checksum \
                    2>/dev/null &
                  PIDS+=($!)
                  echo "  Configs: $(du -sh plugins-config.tar.zst 2>/dev/null | cut -f1)"
                fi
              fi
            fi

            [ "${#PIDS[@]}" -gt 0 ] && wait "${PIDS[@]}" || true

            # Nettoyer les archives locales pour libérer l'espace disque GitHub
            rm -f world.tar.zst plugins.tar.zst plugins-config.tar.zst

            echo "[BACKUP:${LABEL}] Termine en $(( $(date +%s) - T0 ))s"
          }

          git_sync() {
            echo "[GIT] Sync configs..."
            git config user.name  "MC Server Bot"
            git config user.email "bot@mc-server.local"

            find plugins -mindepth 2 -type f \
              \( -name "*.yml" -o -name "*.yaml" -o -name "*.json" \
                 -o -name "*.conf" -o -name "*.properties" \) \
              ! -name "plugin.yml" ! -name "plugin.yaml" \
              2>/dev/null | while IFS= read -r f; do
                git add "$f" 2>/dev/null || true
              done

            git add config/ server.properties ops.json eula.txt 2>/dev/null || true

            if ! git diff --cached --quiet 2>/dev/null; then
              STAMP=$(date '+%Y-%m-%d %H:%M:%S')
              git commit -m "sync ${STAMP}" --no-verify 2>/dev/null \
                && git push \
                  "https://x-access-token:${FINE_GRAINED_PAT}@github.com/${REPO}.git" \
                  HEAD:main --force 2>/dev/null \
                && echo "[GIT] Push OK" \
                || echo "[GIT] Push echec (ignore)"
            else
              echo "[GIT] Rien a committer"
            fi
          }

          was_graceful() {
            tail -50 "$MC_LOG" 2>/dev/null | grep -qiE \
              "All dimensions are saved|Stopping server|Saving players"
          }

          warn_restart() {
            echo "[RESTART] Avertissement joueurs..."
            mc_cmd "say Redemarrage dans 30 secondes !"
            mc_cmd "title @a times 10 60 20"
            sleep 20
            mc_cmd "say Redemarrage dans 10 secondes !"
            sleep 1
            for N in 9 8 7 6 5 4 3 2 1; do
              mc_cmd "say ${N}..."
              sleep 1
            done
            mc_cmd "say Redemarrage en cours !"
            sleep 3
          }

          start_mc() {
            tail -f "$MC_PIPE" 2>/dev/null | \
            "$JAVA" \
              -Xms${JVM} -Xmx${JVM} \
              -XX:+UseG1GC \
              -XX:+ParallelRefProcEnabled \
              -XX:MaxGCPauseMillis=200 \
              -XX:+UnlockExperimentalVMOptions \
              -XX:+DisableExplicitGC \
              -XX:+AlwaysPreTouch \
              -XX:G1NewSizePercent=30 \
              -XX:G1MaxNewSizePercent=40 \
              -XX:G1HeapRegionSize=16M \
              -XX:G1ReservePercent=15 \
              -XX:G1HeapWastePercent=5 \
              -XX:G1MixedGCCountTarget=4 \
              -XX:InitiatingHeapOccupancyPercent=20 \
              -XX:G1MixedGCLiveThresholdPercent=90 \
              -XX:G1RSetUpdatingPauseTimePercent=5 \
              -XX:SurvivorRatio=32 \
              -XX:MaxTenuringThreshold=1 \
              -XX:+PerfDisableSharedMem \
              -XX:ConcGCThreads=2 \
              -XX:ParallelGCThreads=${CPUS} \
              -XX:+UseStringDeduplication \
              -XX:ReservedCodeCacheSize=512m \
              -XX:+OptimizeStringConcat \
              -XX:+HeapDumpOnOutOfMemoryError \
              -XX:HeapDumpPath=/tmp/mc-oom.hprof \
              -XX:+ExitOnOutOfMemoryError \
              -Dpaper.watchdog.earlyWarningDelay=120000 \
              -Dpaper.watchdog.earlyWarningEvery=20000 \
              -Dpaper.maxChunkThreads=${CPUS} \
              -Dpaper.log-level=INFO \
              -Djava.net.preferIPv4Stack=true \
              -Dfile.encoding=UTF-8 \
              -Daikars.new.flags=true \
              -jar server.jar nogui \
              >> "$MC_LOG" 2>&1 &
            echo $!
          }

          MC_PID=$(start_mc)
          T_START=$(date +%s)
          T_BACKUP=$(date +%s)
          T_GIT=$(date +%s)
          CRASHES=0
          LOOP=0
          WARNED=0

          echo "MC demarre PID=${MC_PID} RAM=${JVM} CPUs=${CPUS}"

          monitor_loop & MONITOR_PID=$!
          live_logs    & LIVE_PID=$!

          while true; do
            sleep 20
            LOOP=$(( LOOP + 1 ))
            NOW=$(date +%s)
            ELAPSED=$(( NOW - T_START ))
            ELAPSED_MIN=$(( ELAPSED / 60 ))

            [ $(( LOOP % 6 )) -eq 0 ] && show_stats

            # Backup toutes les 5 minutes
            if [ $(( NOW - T_BACKUP )) -ge 300 ]; then
              backup "periodic" "0"
              T_BACKUP=$(date +%s)
            fi

            # Git sync toutes les 15 minutes
            if [ $(( NOW - T_GIT )) -ge 900 ]; then
              git_sync
              T_GIT=$(date +%s)
            fi

            if [ "$ELAPSED" -ge 20365 ] && [ "$WARNED" -eq 0 ]; then
              WARNED=1
              echo "[INFO] Avertissement restart (${ELAPSED_MIN}min)"
              warn_restart &
            fi

            if ! kill -0 "$MC_PID" 2>/dev/null; then
              if was_graceful; then
                echo "=== /stop propre $(date '+%H:%M:%S') ==="
                show_stats
                backup "graceful-stop" "1"
                git_sync
                kill "$MONITOR_PID" "$LIVE_PID" 2>/dev/null || true
                gh_cancel
                sleep 5
                exit 0
              else
                CRASHES=$(( CRASHES + 1 ))
                echo "=== CRASH #${CRASHES} $(date '+%H:%M:%S') ==="
                show_stats
                tail -30 "$MC_LOG" 2>/dev/null || true

                if grep -qiE "OutOfMemoryError" "$MC_LOG" 2>/dev/null; then
                  echo "CAUSE: OOM"
                elif grep -qiE "StackOverflowError" "$MC_LOG" 2>/dev/null; then
                  echo "CAUSE: StackOverflow"
                else
                  echo "CAUSE: Crash inattendu"
                fi

                if [ "$CRASHES" -ge 5 ]; then
                  echo "[FATAL] 5 crashs consecutifs"
                  backup "crash-fatal" "1"
                  git_sync
                  kill "$MONITOR_PID" "$LIVE_PID" 2>/dev/null || true
                  exit 1
                fi

                backup "crash-${CRASHES}" "1"
                echo "Redemarrage dans 10s..."
                sleep 10
                WARNED=0
                > "$MC_LOG"
                MC_PID=$(start_mc)
                echo "Redemarre PID=${MC_PID}"
              fi
            else
              CRASHES=0
            fi

            if [ "$ELAPSED" -ge 20400 ]; then
              echo "[INFO] Relance workflow (${ELAPSED_MIN}min)"
              backup "pre-restart" "1"
              git_sync
              kill "$MONITOR_PID" "$LIVE_PID" 2>/dev/null || true
              gh_dispatch
              sleep 15
              mc_cmd "stop"
              sleep 15
              kill "$MC_PID" 2>/dev/null || true
              exit 0
            fi
          done

      - name: Backup final
        if: always()
        run: |
          set -uo pipefail
          echo "=== BACKUP FINAL $(date '+%H:%M:%S') ==="
          PIDS=()

          get_world_dirs() {
            local DIRS=""
            for d in world world_nether world_the_end; do
              [ -d "$d" ] && DIRS="$DIRS $d"
            done
            for d in $(ls -d world_* 2>/dev/null || true); do
              case "$DIRS" in *"$d"*) ;; *) [ -d "$d" ] && DIRS="$DIRS $d" ;; esac
            done
            echo "$DIRS"
          }

          WORLD_DIRS=$(get_world_dirs)

          if [ -n "${WORLD_DIRS}" ]; then
            echo "Compression world niveau 19..."
            tar -cf - \
              --exclude='*/session.lock' \
              --exclude='*/poi' \
              --exclude='*/poi/*' \
              --exclude='*/entities' \
              --exclude='level.dat_old' \
              --exclude='*.lck' \
              $WORLD_DIRS 2>/dev/null \
            | zstd -19 -T0 --long=27 -fo world.tar.zst

            echo "World: $(du -sh world.tar.zst 2>/dev/null | cut -f1)"

            rclone copy world.tar.zst rclone-mc:mc-backup/ \
              --transfers=8 \
              --multi-thread-streams=8 \
              --buffer-size=256M \
              --retries=3 \
              --checksum \
              2>/dev/null &
            PIDS+=($!)
          fi

          if [ -d plugins ]; then
            JAR_N=$(find plugins -maxdepth 1 -name "*.jar" | wc -l)
            if [ "$JAR_N" -gt 0 ]; then
              find plugins -maxdepth 1 -name "*.jar" -print0 \
                | tar --null -cf - -T - 2>/dev/null \
                | zstd -19 -T0 --long=27 -fo plugins.tar.zst
              echo "Plugins: $(du -sh plugins.tar.zst 2>/dev/null | cut -f1)"
              rclone copy plugins.tar.zst rclone-mc:mc-backup/ \
                --transfers=4 \
                --retries=3 \
                --checksum \
                2>/dev/null &
              PIDS+=($!)
            fi

            find plugins -mindepth 2 -type f \
              \( -name "*.yml" -o -name "*.yaml" -o -name "*.json" \
                 -o -name "*.conf" -o -name "*.properties" -o -name "*.toml" \) \
              ! -name "plugin.yml" ! -name "plugin.yaml" \
              -print0 2>/dev/null \
            | tar --null -cf - -T - 2>/dev/null \
            | zstd -19 -T0 -fo plugins-config.tar.zst 2>/dev/null || true

            if [ -f plugins-config.tar.zst ]; then
              SZ=$(stat -c%s plugins-config.tar.zst 2>/dev/null || echo 0)
              if [ "$SZ" -gt 100 ]; then
                rclone copy plugins-config.tar.zst rclone-mc:mc-backup/ \
                  --transfers=4 \
                  --retries=3 \
                  --checksum \
                  2>/dev/null &
                PIDS+=($!)
                echo "Configs: $(du -sh plugins-config.tar.zst 2>/dev/null | cut -f1)"
              fi
            fi
          fi

          [ "${#PIDS[@]}" -gt 0 ] && wait "${PIDS[@]}" || true

          # Rapport final Drive
          echo "=== Espace Drive utilise ==="
          rclone size rclone-mc:mc-backup/ 2>/dev/null || true
          echo "=== BACKUP FINAL TERMINE ==="
