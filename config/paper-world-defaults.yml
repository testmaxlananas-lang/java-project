_version: 31

anticheat:
  anti-xray:
    enabled: false         # Serveur build privé, inutile
    engine-mode: 1
    hidden-blocks:
    - copper_ore
    - deepslate_copper_ore
    - raw_copper_block
    - gold_ore
    - deepslate_gold_ore
    - iron_ore
    - deepslate_iron_ore
    - raw_iron_block
    - coal_ore
    - deepslate_coal_ore
    - lapis_ore
    - deepslate_lapis_ore
    - mossy_cobblestone
    - obsidian
    - chest
    - diamond_ore
    - deepslate_diamond_ore
    - redstone_ore
    - deepslate_redstone_ore
    - clay
    - emerald_ore
    - deepslate_emerald_ore
    - ender_chest
    lava-obscures: false
    max-block-height: 64
    replacement-blocks:
    - stone
    - oak_planks
    - deepslate
    update-radius: 2
    use-permission: false

chunks:
  auto-save-interval: 6000       # Sauvegarde toutes les 5min (=300s × 20tps)
  delay-chunk-unloads-by: 30s    # Garde les chunks en mémoire plus longtemps → moins de rechargement
  entity-per-chunk-save-limit:
    arrow: -1
    ender_pearl: -1
    experience_orb: -1
    fireball: -1
    small_fireball: -1
    snowball: -1
  fixed-chunk-inhabited-time: -1
  flush-regions-on-save: false
  max-auto-save-chunks-per-tick: 64   # Augmenté : on a les ressources, autant sauvegarder vite
  prevent-moving-into-unloaded-chunks: false

collisions:
  allow-player-cramming-damage: false
  allow-vehicle-collisions: true
  fix-climbing-bypassing-cramming-rule: false
  max-entity-collisions: 2       # Réduit : serveur build, les collisions ne sont pas critiques
  only-players-collide: false

command-blocks:
  force-follow-perm-level: true
  permissions-level: 2

entities:
  armor-stands:
    do-collision-entity-lookups: false  # Pas besoin sur un serveur build
    tick: true
  behavior:
    allow-spider-world-border-climbing: true
    baby-zombie-movement-modifier: 0.5
    cooldown-failed-beehive-releases: true
    disable-chest-cat-detection: true   # Optimisation légère
    disable-creeper-lingering-effect: false
    disable-player-crits: false
    door-breaking-difficulty:
      husk:
      - HARD
      vindicator:
      - NORMAL
      - HARD
      zombie:
      - HARD
      zombie_villager:
      - HARD
      zombified_piglin:
      - HARD
    ender-dragons-death-always-places-dragon-egg: false
    experience-merge-max-value: 1000    # Merge les XP orbs agressivement
    mobs-can-always-pick-up-loot:
      skeletons: false
      zombies: false
    nerf-pigmen-from-nether-portals: false
    only-merge-items-horizontally: false
    parrots-are-unaffected-by-player-movement: false
    phantoms-do-not-spawn-on-creative-players: true
    phantoms-only-attack-insomniacs: true
    phantoms-spawn-attempt-max-seconds: 119
    phantoms-spawn-attempt-min-seconds: 60
    piglins-guard-chests: true
    pillager-patrols:
      disable: true              # Désactivé : serveur build, pas de patrouilles
      spawn-chance: 0.2
      spawn-delay:
        per-player: false
        ticks: 12000
      start:
        day: 5
        per-player: false
    player-insomnia-start-ticks: 72000
    should-remove-dragon: false
    spawner-nerfed-mobs-should-jump: false
    stuck-entity-poi-retry-delay: 200
    zombie-villager-infection-chance: default
    zombies-target-turtle-eggs: true
  markers:
    tick: false                  # Les markers n'ont pas besoin de tick
  mob-effects:
    immune-to-wither-effect:
      wither: true
      wither-skeleton: true
    spiders-immune-to-poison-effect: true
  sniffer:
    boosted-hatch-time: default
    hatch-time: default
  spawning:
    all-chunks-are-slime-chunks: false
    alt-item-despawn-rate:
      enabled: true              # Activer pour nettoyer les items rapidement
      items:
        cobblestone: 300         # 15s au lieu de 5min
        netherrack: 300
        dirt: 300
        gravel: 300
        sand: 300
        andesite: 300
        diorite: 300
        granite: 300
    count-all-mobs-for-spawning: false
    creative-arrow-despawn-rate: 20   # Despawn rapide des flèches en créatif
    despawn-range-shape: ELLIPSOID
    despawn-ranges:
      ambient:
        hard: 128
        soft: 32
      axolotls:
        hard: 128
        soft: 32
      creature:
        hard: 128
        soft: 32
      misc:
        hard: 128
        soft: 32
      monster:
        hard: 128
        soft: 32
      underground_water_creature:
        hard: 128
        soft: 32
      water_ambient:
        hard: 128
        soft: 32
      water_creature:
        hard: 128
        soft: 32
    despawn-time:
      llama_spit: disabled
      snowball: disabled
    disable-mob-spawner-spawn-egg-transformation: false
    duplicate-uuid:
      mode: SAFE_REGEN
      safe-regen-delete-range: 32
    filter-bad-tile-entity-nbt-from-falling-blocks: true
    filtered-entity-tag-nbt-paths:
    - Pos
    - Motion
    - sleeping_pos
    iron-golems-can-spawn-in-air: false
    monster-spawn-max-light-level: default
    non-player-arrow-despawn-rate: 60  # Despawn rapide
    per-player-mob-spawns: true
    scan-for-legacy-ender-dragon: false  # Inutile sur un serveur build récent
    skeleton-horse-thunder-spawn-chance: default
    slime-spawn-height:
      slime-chunk:
        maximum: 40.0
      surface-biome:
        maximum: 70.0
        minimum: 50.0
    spawn-limits:
      ambient: 1                 # Minimal, c'est un serveur build
      axolotls: 1
      creature: 5
      monster: 5
      underground_water_creature: 1
      water_ambient: 1
      water_creature: 1
    ticks-per-spawn:
      ambient: 400
      axolotls: 400
      creature: 400
      monster: 400
      underground_water_creature: 400
      water_ambient: 400
      water_creature: 400
    wandering-trader:
      spawn-chance-failure-increment: 25
      spawn-chance-max: 75
      spawn-chance-min: 25
      spawn-day-length: 24000
      spawn-minute-length: 1200
    wateranimal-spawn-height:
      maximum: default
      minimum: default
  tracking-range-y:
    animal: default
    display: default
    enabled: false
    misc: default
    monster: default
    other: default
    player: default

environment:
  disable-explosion-knockback: false
  disable-ice-and-snow: false
  disable-thunder: false
  fire-tick-delay: 30
  frosted-ice:
    delay:
      max: 40
      min: 20
    enabled: true
  generate-flat-bedrock: false
  locate-structures-outside-world-border: false
  max-block-ticks: 65536
  max-fluid-ticks: 65536
  nether-ceiling-void-damage-height: disabled
  optimize-explosions: true      # ACTIVÉ : optimise le calcul des explosions
  portal-create-radius: 16
  portal-search-radius: 128
  portal-search-vanilla-dimension-scaling: true
  treasure-maps:
    enabled: false               # Désactivé : génère des chunks inutilement
    find-already-discovered:
      loot-tables: default
      villager-trade: false
  void-damage-amount: 4.0
  void-damage-min-build-height-offset: -64.0
  water-over-lava-flow-speed: 5

feature-seeds:
  generate-random-seeds-for-all: false

fishing-time-range:
  maximum: 600
  minimum: 100

fixes:
  disable-unloaded-chunk-enderpearl-exploit: true
  falling-block-height-nerf: disabled
  fix-items-merging-through-walls: true   # Évite des duplication bugs
  prevent-tnt-from-moving-in-water: false
  split-overstacked-loot: true
  tnt-entity-height-nerf: disabled

hopper:
  cooldown-when-full: true
  disable-move-event: true       # GROS gain de performance : désactive les events hopper
  ignore-occluding-blocks: true  # Légère optimisation

lootables:
  auto-replenish: false
  max-refills: -1
  refresh-max: 2d
  refresh-min: 12h
  reset-seed-on-fill: true
  restrict-player-reloot: true
  restrict-player-reloot-time: disabled
  retain-unlooted-shulker-box-loot-table-on-non-player-break: true

maps:
  item-frame-cursor-limit: 128
  item-frame-cursor-update-interval: 10

max-growth-height:
  bamboo:
    max: 16
    min: 11
  cactus: 3
  reeds: 3

misc:
  allow-remote-ender-dragon-respawning: false
  alternate-current-update-order: HORIZONTAL_FIRST_OUTWARD
  disable-end-credits: true      # Inutile
  disable-relative-projectile-velocity: false
  disable-sprint-interruption-on-attack: true  # QoL pour les builders
  legacy-ender-pearl-behavior: false
  max-leash-distance: default
  redstone-implementation: ALTERNATE_CURRENT  # Plus performant que VANILLA
  show-sign-click-command-failure-msgs-to-player: false
  update-pathfinding-on-block-update: false  # Gros gain perf : les mobs ne recalculent pas à chaque bloc placé

scoreboards:
  allow-non-player-entities-on-scoreboards: true
  use-vanilla-world-scoreboard-name-coloring: false

spawn:
  allow-using-signs-inside-spawn-protection: false

tick-rates:
  behavior:
    villager:
      validatenearbypoi: 600     # Toutes les 30s au lieu de chaque tick
  container-update: 1
  dry-farmland: 500              # Très lent, peu important
  grass-spread: 4                # Légèrement ralenti
  mob-spawner: 20                # Spawner tick toutes les 1s (inutile d'être plus rapide)
  sensor:
    villager:
      secondarypoisensor: 80     # Réduit la fréquence de check des villageois
  wet-farmland: 500

unsupported-settings:
  disable-world-ticking-when-empty: true   # ACTIVÉ : économise du CPU quand personne n'est en ligne
  fix-invulnerable-end-crystal-exploit: true
