settings:
  timeout-time: 120
  restart-on-crash: false
  restart-script: ''
  bungeecord: false
  sample-count: 12
  player-shuffle: 0
  user-cache-size: 1000
  save-user-cache-on-stop-only: false
  moved-wrongly-threshold: 0.0625
  moved-too-quickly-multiplier: 10.0
  log-villager-deaths: false
  log-named-deaths: true

world-settings:
  default:
    verbose: false
    view-distance: 20
    simulation-distance: 6        # Réduit de 10 à 6 : les entités n'ont pas besoin de simuler loin sur un serveur build
    thunder-chance: 100000
    mob-spawn-range: 2            # Réduit : moins de mobs = plus de perf
    entity-activation-range:
      animals: 8                  # Réduit drastiquement, pas besoin sur serveur build
      monsters: 8
      raiders: 16
      misc: 2
      water: 2
      villagers: 8
      flying-monsters: 8
      villagers-work-immunity-after: 100
      villagers-work-immunity-for: 20
      ignore-spectators: true     # Les spectateurs n'activent pas les entités
    entity-tracking-range:
      players: 128
      animals: 48
      monsters: 48
      misc: 32
      display: 128
      other: 64
    merge-radius:
      item: 6.0                   # Merge items plus agressivement
      exp: 8.0
    hopper-amount: 1              # Réduit le throughput des hoppers (inutiles sur serveur build)
    hopper-can-load-chunks: false
    dragon-death-sound-radius: 0
    max-tnt-per-tick: 100         # Limite le TNT en même temps
    seed-village: 10387312
    seed-desert: 14357617
    seed-igloo: 14357618
    seed-jungle: 14357619
    seed-swamp: 14357620
    seed-monument: 10387313
